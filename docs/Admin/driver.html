<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Svaadh Delivery</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#222;min-height:100vh;}

  /* ── LOGIN ── */
  #loginWrap{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:100;}
  .login-box{padding:32px 24px;width:100%;max-width:320px;text-align:center;}
  .login-logo{font-size:2rem;margin-bottom:4px;}
  .login-box h1{font-size:1.2rem;font-weight:700;color:#c0392b;margin-bottom:2px;}
  .login-box p{font-size:0.78rem;color:#999;margin-bottom:24px;}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px;}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #ddd;transition:all 0.15s;}
  .pin-dot.filled{background:#c0392b;border-color:#c0392b;}
  .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
  .pk{background:#f5f5f5;border:none;color:#222;font-size:1.5rem;font-weight:600;border-radius:14px;padding:16px;cursor:pointer;transition:background 0.1s;}
  .pk:active{background:#e0e0e0;}
  .pk.del{color:#999;font-size:1.2rem;}
  .pk.span2{grid-column:span 2;}
  .login-err{color:#c0392b;font-size:0.78rem;margin-top:14px;min-height:18px;}

  /* ── SHELL ── */
  #shell{display:none;padding-bottom:100px;}
  #shell.on{display:block;}

  /* ── TOP BAR ── */
  .topbar{background:#c0392b;color:#fff;padding:12px 16px;position:sticky;top:0;z-index:10;}
  .topbar-row1{display:flex;align-items:center;justify-content:space-between;}
  .topbar-title{font-size:1rem;font-weight:700;letter-spacing:0.03em;}
  .sync-badge{font-size:0.65rem;color:rgba(255,255,255,0.65);background:rgba(0,0,0,0.15);padding:2px 8px;border-radius:99px;}
  .topbar-date{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .topbar-date input[type=date]{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 10px;border-radius:8px;font-size:0.8rem;flex:1;}
  .topbar-date input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);}
  .load-btn{background:#fff;color:#c0392b;border:none;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem;white-space:nowrap;}

  /* ── TABS ── */
  .tabs{display:flex;background:#fff;border-bottom:2px solid #eee;position:sticky;top:90px;z-index:9;}
  .tab{flex:1;padding:12px 4px;text-align:center;font-size:0.8rem;font-weight:600;color:#aaa;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s;}
  .tab.active{color:#c0392b;border-bottom-color:#c0392b;}
  .tab-count{display:inline-block;background:#f0f0f0;color:#888;font-size:0.65rem;padding:1px 6px;border-radius:10px;margin-left:4px;}
  .tab.active .tab-count{background:#fde8e8;color:#c0392b;}

  /* ── PROGRESS STRIP ── */
  .progress-strip{background:#fff;border-bottom:1px solid #f0f0f0;padding:8px 14px;display:flex;align-items:center;gap:10px;}
  .progress-bar-wrap{flex:1;height:6px;background:#eee;border-radius:99px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:#27ae60;border-radius:99px;transition:width 0.4s ease;}
  .progress-text{font-size:0.72rem;font-weight:700;color:#555;white-space:nowrap;}
  .progress-text.done{color:#27ae60;}
  .cash-badge{font-size:0.72rem;font-weight:700;color:#e67e22;background:#fff8e1;padding:2px 8px;border-radius:99px;white-space:nowrap;}
  .cash-badge.full{color:#27ae60;background:#eafaf1;}

  /* ── AMOUNT BADGE ── */
  .amount-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .amount-badge{font-size:0.82rem;font-weight:700;padding:5px 12px;border-radius:8px;}
  .amount-badge.collect{background:#fff3cd;color:#856404;}
  .amount-badge.prepaid{background:#eafaf1;color:#27ae60;}

  /* ── CARD ACTIONS (3 buttons) ── */
  .btn-whatsapp{flex:1;background:#25d366;color:#fff;border:none;border-radius:10px;padding:11px;font-size:0.85rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:block;}

  /* ── ALL DONE OVERLAY ── */
  .all-done-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:200;}
  .done-box{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;width:88%;max-width:340px;animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes popIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
  .done-emoji{font-size:3.5rem;margin-bottom:8px;}
  .done-title{font-size:1.3rem;font-weight:800;color:#27ae60;margin-bottom:4px;}
  .done-sub{font-size:0.82rem;color:#888;margin-bottom:20px;}
  .done-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
  .done-stat{background:#f8f8f8;border-radius:12px;padding:12px 8px;}
  .done-stat-val{font-size:1.3rem;font-weight:800;color:#222;}
  .done-stat-lbl{font-size:0.68rem;color:#999;margin-top:2px;}
  .done-close{width:100%;padding:13px;background:#c0392b;color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;}

  /* ── ROUTE BAR ── */
  .route-bar{background:#fff;border-bottom:1px solid #eee;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .route-btn{background:#1a73e8;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:0.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}
  .route-btn:active{background:#1558b0;}
  .route-btn.green{background:#27ae60;}
  .route-info{font-size:0.75rem;color:#555;flex:1;}
  .route-maps-link{font-size:0.78rem;font-weight:700;color:#1a73e8;text-decoration:none;padding:7px 12px;border:1.5px solid #1a73e8;border-radius:8px;white-space:nowrap;}

  /* ── CONTENT ── */
  .meal-panel{display:none;padding:12px 14px;}
  .meal-panel.active{display:block;}

  /* ── ORDER CARD ── */
  .order-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);border-left:4px solid transparent;transition:border-color 0.2s;}
  .order-card.delivered{border-left-color:#27ae60;opacity:0.72;}
  .order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .order-num{font-size:0.65rem;font-weight:700;color:#c0392b;letter-spacing:0.05em;}
  .delivered-time{font-size:0.68rem;font-weight:700;color:#27ae60;background:#eafaf1;padding:2px 8px;border-radius:99px;}
  .cust-name{font-size:1.05rem;font-weight:700;color:#111;margin-bottom:2px;}
  .cust-phone{font-size:0.85rem;color:#666;margin-bottom:10px;}
  .address-box{background:#f9f9f9;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:0.82rem;color:#444;line-height:1.5;}
  .landmark{font-size:0.78rem;color:#888;margin-top:4px;}
  .landmark span{color:#e67e22;font-weight:600;}
  .notes-box{background:#fff8e1;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:0.78rem;color:#856404;}
  .card-actions{display:flex;gap:8px;margin-bottom:10px;}
  .btn-call{flex:1;background:#27ae60;color:#fff;border:none;border-radius:10px;padding:11px;font-size:0.85rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:block;}
  .btn-maps{flex:1;background:#1a73e8;color:#fff;border:none;border-radius:10px;padding:11px;font-size:0.85rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:block;}
  .btn-maps.disabled{background:#ccc;pointer-events:none;}

  /* ── DELIVERED BUTTON ── */
  .btn-delivered{width:100%;padding:12px;border-radius:10px;border:2px dashed #ccc;background:#fafafa;color:#888;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-delivered:active{background:#f0f0f0;}
  .btn-delivered.done{border:2px solid #27ae60;background:#eafaf1;color:#27ae60;cursor:default;}

  /* ── EMPTY / LOADING ── */
  .empty{text-align:center;padding:48px 20px;color:#aaa;}
  .empty-icon{font-size:2.5rem;margin-bottom:8px;}
  .spinner{width:28px;height:28px;border:3px solid #eee;border-top-color:#c0392b;border-radius:50%;animation:spin 0.7s linear infinite;margin:40px auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-logo">🛵</div>
    <h1>Svaadh Delivery</h1>
    <p>Enter PIN to view deliveries</p>
    <div class="pin-dots">
      <div class="pin-dot" id="dd0"></div><div class="pin-dot" id="dd1"></div>
      <div class="pin-dot" id="dd2"></div><div class="pin-dot" id="dd3"></div>
    </div>
    <div class="pin-grid">
      <button class="pk" onclick="dp(1)">1</button><button class="pk" onclick="dp(2)">2</button><button class="pk" onclick="dp(3)">3</button>
      <button class="pk" onclick="dp(4)">4</button><button class="pk" onclick="dp(5)">5</button><button class="pk" onclick="dp(6)">6</button>
      <button class="pk" onclick="dp(7)">7</button><button class="pk" onclick="dp(8)">8</button><button class="pk" onclick="dp(9)">9</button>
      <button class="pk span2" onclick="dp(0)">0</button><button class="pk del" onclick="dx()">⌫</button>
    </div>
    <div class="login-err" id="dErr"></div>
  </div>
</div>

<!-- SHELL -->
<div id="shell">
  <div class="topbar">
    <div class="topbar-row1">
      <div class="topbar-title">🛵 Svaadh Delivery</div>
      <span class="sync-badge" id="syncBadge">—</span>
    </div>
    <div class="topbar-date">
      <input type="date" id="datePicker" onchange="loadOrders()">
      <button class="load-btn" onclick="loadOrders()">↻ Refresh</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" id="tab_Breakfast" onclick="switchTab('Breakfast')">🌅 Breakfast<span class="tab-count" id="cnt_Breakfast">0</span></button>
    <button class="tab" id="tab_Lunch" onclick="switchTab('Lunch')">☀️ Lunch<span class="tab-count" id="cnt_Lunch">0</span></button>
    <button class="tab" id="tab_Dinner" onclick="switchTab('Dinner')">🌙 Dinner<span class="tab-count" id="cnt_Dinner">0</span></button>
  </div>

  <!-- PROGRESS STRIP -->
  <div class="progress-strip" id="progressStrip" style="display:none;">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0 / 0</div>
    <div class="cash-badge" id="cashBadge" style="display:none;"></div>
  </div>

  <!-- ALL DONE OVERLAY -->
  <div class="all-done-overlay" id="allDoneOverlay" style="display:none;">
    <div class="done-box">
      <div class="done-emoji">🎉</div>
      <div class="done-title">All Deliveries Done!</div>
      <div class="done-sub" id="doneSub">Great work today!</div>
      <div class="done-stats" id="doneStats"></div>
      <button class="done-close" onclick="document.getElementById('allDoneOverlay').style.display='none'">✓ Close</button>
    </div>
  </div>

  <!-- PANELS -->
  <div class="meal-panel active" id="panel_Breakfast"></div>
  <div class="meal-panel" id="panel_Lunch"></div>
  <div class="meal-panel" id="panel_Dinner"></div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-wwECc_mSh949babtRt8OAvFbnJJzH5X9JS_PsN-f-IMHeYkQMj54fwXRs6PevK0W/exec";

// ── KITCHEN LOCATION — update to your actual kitchen lat/lng ──────────────────
// Current: approx Bhosale Garden, Hadapsar, Pune
const KITCHEN = { lat: 18.5036109, lng: 73.9310764 };

let D = { pin: "", sessionPin: "" };
let _ordersData = { Breakfast: [], Lunch: [], Dinner: [] };
let _pollTimer  = null;
let _routeDists = { Breakfast: null, Lunch: null, Dinner: null };

// ── RATE LIMITING ──
let attempts = 0;
let lockoutEnd = 0;
function isLocked() {
  if (Date.now() < lockoutEnd) {
    const s = Math.ceil((lockoutEnd - Date.now()) / 1000);
    document.getElementById("dErr").textContent = `Too many attempts. Wait ${s}s.`;
    return true;
  }
  if (lockoutEnd !== 0) {
    lockoutEnd = 0; attempts = 0;
    document.getElementById("dErr").textContent = "";
  }
  return false;
}

// ── PIN ────────────────────────────────────────────────────────────────────────
function dp(n) {
  if (isLocked()) return;
  if (D.pin.length >= 4) return;
  D.pin += String(n);
  renderDots();
  if (D.pin.length === 4) verifyPin();
}
function dx() { D.pin = D.pin.slice(0,-1); renderDots(); document.getElementById("dErr").textContent = ""; }
function renderDots() {
  for (let i=0;i<4;i++) document.getElementById("dd"+i).classList.toggle("filled", i < D.pin.length);
}

async function verifyPin() {
  if (isLocked()) return;
  document.getElementById("dErr").textContent = "Checking...";
  try {
    const today = todayIST();
    const res   = await fetch(`${APPS_SCRIPT_URL}?action=getDriverOrders&date=${today}&pin=${D.pin}&_t=${Date.now()}`);
    const data  = await res.json();
    if (data.error) {
      attempts++;
      if (attempts >= 5) {
        lockoutEnd = Date.now() + 60000;
        document.getElementById("dErr").textContent = "Too many attempts. Wait 60s.";
      } else {
        document.getElementById("dErr").textContent = "Incorrect PIN — Please try again";
      }
      D.pin = ""; renderDots(); return;
    }
    attempts = 0;
    D.sessionPin = D.pin; D.pin = ""; renderDots();
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("shell").classList.add("on");
    document.getElementById("datePicker").value = today;
    renderAll(data);
    autoSwitchMeal();
    startPoll();
  } catch(e) {
    document.getElementById("dErr").textContent = "Error: " + e.message;
    D.pin = ""; renderDots();
  }
}

function todayIST() {
  return new Date(new Date().getTime() + 5.5*3600000).toISOString().slice(0,10);
}
function autoSwitchMeal() {
  const h = new Date(new Date().getTime() + 5.5*3600000).getUTCHours();
  if (h < 10) switchTab("Breakfast");
  else if (h < 15) switchTab("Lunch");
  else switchTab("Dinner");
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadOrders() {
  const date = document.getElementById("datePicker").value;
  if (!date) return;
  ["Breakfast","Lunch","Dinner"].forEach(m => {
    document.getElementById("panel_"+m).innerHTML = `<div class="spinner"></div>`;
  });
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getDriverOrders&date=${date}&pin=${D.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderAll(data);
    setSyncBadge();
  } catch(e) {
    ["Breakfast","Lunch","Dinner"].forEach(m => {
      document.getElementById("panel_"+m).innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`;
    });
  }
}

// ── AUTO-POLL (delivery status sync every 45s) ────────────────────────────────
function startPoll()  { stopPoll(); _pollTimer = setInterval(silentPoll, 45000); }
function stopPoll()   { if (_pollTimer) clearInterval(_pollTimer); }

async function silentPoll() {
  const date = document.getElementById("datePicker").value;
  if (!date || !D.sessionPin) return;
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getDriverOrders&date=${date}&pin=${D.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (data.error) return;
    // Only update delivery badges — don't re-render cards
    let anyUpdate = false;
    ["Breakfast","Lunch","Dinner"].forEach(meal => {
      (data.meals[meal] || []).forEach(o => {
        if (!o.submissionId) return;
        const btn  = document.getElementById("dbtn_"+o.submissionId);
        const card = document.getElementById("dcard_"+o.submissionId);
        if (o.deliveredAt && btn && !btn.classList.contains("done")) {
          btn.className = "btn-delivered done";
          btn.innerHTML = `✅ Delivered at ${fmtTime(o.deliveredAt)}`;
          if (card) { card.classList.add("delivered"); }
          const tBadge = document.getElementById("dtag_"+o.submissionId);
          if (tBadge) { tBadge.style.display=""; tBadge.textContent = `✅ ${fmtTime(o.deliveredAt)}`; }
          // Update local data + push to bottom
          const local = (_ordersData[meal]||[]).find(lo=>lo.submissionId===o.submissionId);
          if (local && !local.deliveredAt) {
            local.deliveredAt = o.deliveredAt;
            setTimeout(()=>{ const panel=document.getElementById("panel_"+meal); if(card&&panel)panel.appendChild(card); }, 300);
            anyUpdate = true;
          }
        }
      });
      if (anyUpdate) updateProgress(meal);
    });
    setSyncBadge();
  } catch(e) {}
}

function setSyncBadge() {
  const now = new Date(new Date().getTime() + 5.5*3600000);
  document.getElementById("syncBadge").textContent =
    `Synced ${now.getUTCHours()}:${String(now.getUTCMinutes()).padStart(2,"0")}`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(data) {
  ["Breakfast","Lunch","Dinner"].forEach(meal => {
    const raw    = (data.meals || {})[meal] || [];
    // Undelivered first, delivered at bottom
    const orders = [...raw.filter(o=>!o.deliveredAt), ...raw.filter(o=>o.deliveredAt)];
    _ordersData[meal] = orders;
    document.getElementById("cnt_"+meal).textContent = orders.length;
    document.getElementById("panel_"+meal).innerHTML = renderMealPanel(orders, meal);
  });
  // Show progress for the currently active tab
  const activeMeal = ["Breakfast","Lunch","Dinner"].find(m =>
    document.getElementById("tab_"+m).classList.contains("active")) || "Breakfast";
  updateProgress(activeMeal);
}

function updateProgress(meal) {
  const orders = _ordersData[meal] || [];
  const total  = orders.length;
  const done   = orders.filter(o => o.deliveredAt).length;
  const strip  = document.getElementById("progressStrip");
  const fill   = document.getElementById("progressFill");
  const text   = document.getElementById("progressText");
  if (!total) { strip.style.display = "none"; return; }
  strip.style.display = "flex";
  const pct = Math.round(done/total*100);
  fill.style.width  = pct + "%";
  text.textContent  = `${done} / ${total} delivered`;
  text.className    = "progress-text" + (done===total ? " done" : "");
  // Tab count shows remaining
  const remaining = total - done;
  document.getElementById("cnt_"+meal).textContent = remaining > 0 ? remaining : "✓";
  // Cash badge — total to collect vs collected so far
  const cashBadge = document.getElementById("cashBadge");
  const totalCash = orders.reduce((s,o) => s + (o.paymentStatus !== "Paid" ? (o.amount||0) : 0), 0);
  if (totalCash > 0) {
    const collected = orders.filter(o=>o.deliveredAt && o.paymentStatus!=="Paid").reduce((s,o)=>s+(o.amount||0),0);
    cashBadge.textContent = `💰 ₹${collected} / ₹${totalCash}`;
    cashBadge.className   = "cash-badge" + (collected===totalCash ? " full" : "");
    cashBadge.style.display = "";
  } else {
    cashBadge.style.display = "none";
  }
  // Check if all done
  if (done === total && total > 0) checkAllDone(meal);
}

function checkAllDone(meal) {
  const orders   = _ordersData[meal] || [];
  const total    = orders.length;
  const totalCash = orders.reduce((s,o) => s + (o.paymentStatus!=="Paid"?(o.amount||0):0), 0);
  const collected = orders.filter(o=>o.deliveredAt && o.paymentStatus!=="Paid").reduce((s,o)=>s+(o.amount||0),0);
  const km        = _routeDists[meal];
  document.getElementById("doneSub").textContent = `${meal} route complete!`;
  document.getElementById("doneStats").innerHTML = `
    <div class="done-stat"><div class="done-stat-val">${total}</div><div class="done-stat-lbl">Deliveries</div></div>
    <div class="done-stat"><div class="done-stat-val" style="color:#27ae60;">₹${collected}</div><div class="done-stat-lbl">Cash Collected</div></div>
    ${km ? `<div class="done-stat"><div class="done-stat-val">~${km} km</div><div class="done-stat-lbl">Estimated Route</div></div>` : ""}
    <div class="done-stat"><div class="done-stat-val">${fmtTime(new Date().toISOString())}</div><div class="done-stat-lbl">Finished At</div></div>
  `;
  document.getElementById("allDoneOverlay").style.display = "flex";
}

function renderMealPanel(orders, meal) {
  if (!orders.length) {
    return `<div class="empty"><div class="empty-icon">😴</div>No deliveries for ${meal}</div>`;
  }

  // Count geocodable orders for route button
  const canOptimize = orders.some(o => extractCoords(o));

  const routeBar = `<div class="route-bar" id="routeBar_${meal}">
    ${canOptimize
      ? `<button class="route-btn" onclick="optimizeRoute('${meal}')">🗺 Optimise Route</button>`
      : `<span style="font-size:0.75rem;color:#aaa;">Add Maps links to enable route optimisation</span>`}
    <span class="route-info" id="routeInfo_${meal}"></span>
    <a id="routeLink_${meal}" class="route-maps-link" style="display:none;" target="_blank">📍 Open in Maps</a>
  </div>`;

  return routeBar + orders.map((o, i) => renderCard(o, i, meal)).join("");
}

function renderCard(o, i, meal) {
  const hasMap      = o.maps && o.maps.startsWith("http");
  const hasPhone    = o.phone && o.phone.length >= 10;
  const isDelivered = !!o.deliveredAt;
  const needsCash   = o.amount > 0 && o.paymentStatus !== "Paid";
  const waText      = encodeURIComponent(`✅ Hi ${o.name}! Your ${meal} has been delivered. Thank you! 🙏`);
  const waNum       = hasPhone ? "91" + o.phone.replace(/\D/g,"").slice(-10) : "";

  return `<div class="order-card${isDelivered?" delivered":""}" id="dcard_${o.submissionId}">
    <div class="order-header">
      <div class="order-num">DELIVERY #${i+1}</div>
      ${isDelivered
        ? `<div class="delivered-time" id="dtag_${o.submissionId}">✅ ${fmtTime(o.deliveredAt)}</div>`
        : `<div class="delivered-time" id="dtag_${o.submissionId}" style="display:none;"></div>`}
    </div>
    <div class="cust-name">${o.name || "—"}</div>
    <div class="cust-phone">${hasPhone ? "📞 "+o.phone : ""}</div>
    <div class="address-box">
      📍 ${o.address || "Address not available"}
      ${o.area ? `<br><span style="color:#888;font-size:0.72rem;">📌 ${o.area}</span>` : ""}
      ${o.landmark ? `<div class="landmark">🏢 Landmark: <span>${o.landmark}</span></div>` : ""}
    </div>
    ${o.notes ? `<div class="notes-box">📝 ${o.notes}</div>` : ""}
    ${o.amount > 0 ? `
    <div class="amount-row">
      <span class="amount-badge ${needsCash?"collect":"prepaid"}">
        ${needsCash ? `💰 Collect ₹${o.amount}` : `✅ Prepaid (₹${o.amount})`}
      </span>
    </div>` : ""}
    <div class="card-actions">
      ${hasPhone
        ? `<a class="btn-call" href="tel:${o.phone}">📞 Call</a>`
        : `<span class="btn-call" style="background:#ccc;pointer-events:none;">No number</span>`}
      ${hasMap
        ? `<a class="btn-maps" href="${o.maps}" target="_blank">🗺 Maps</a>`
        : `<span class="btn-maps disabled">No map</span>`}
      ${hasPhone
        ? `<a class="btn-whatsapp" href="https://wa.me/${waNum}?text=${waText}" target="_blank">💬</a>`
        : ""}
    </div>
    <button class="btn-delivered${isDelivered?" done":""}" id="dbtn_${o.submissionId}"
      onclick="markDelivered('${o.submissionId}','${meal}',this)"
      ${isDelivered?"disabled":""}>
      ${isDelivered ? `✅ Delivered at ${fmtTime(o.deliveredAt)}` : "⬜ Mark as Delivered"}
    </button>
  </div>`;
}

// ── MARK DELIVERED ────────────────────────────────────────────────────────────
async function markDelivered(submissionId, meal, btn) {
  if (!submissionId || btn.classList.contains("done")) return;
  btn.innerHTML = "⏳ Marking…"; btn.disabled = true;
  const deliveredAt = new Date().toISOString(); // proper UTC — fmtTime adds +5:30 for display
  try {
    const res  = await fetch(APPS_SCRIPT_URL, {method:"POST",
      body: JSON.stringify({_action:"markDelivered", pin:D.sessionPin, submissionId, deliveredAt})});
    const data = await res.json();
    if (!data.success) throw new Error(data.error || "Failed");

    // Update button + badge
    btn.className = "btn-delivered done";
    btn.innerHTML = `✅ Delivered at ${fmtTime(deliveredAt)}`;
    const card = document.getElementById("dcard_"+submissionId);
    if (card) card.classList.add("delivered");
    const tag = document.getElementById("dtag_"+submissionId);
    if (tag) { tag.style.display=""; tag.textContent = `✅ ${fmtTime(deliveredAt)}`; }

    // Update local data
    const order = (_ordersData[meal]||[]).find(o=>o.submissionId===submissionId);
    if (order) order.deliveredAt = deliveredAt;

    // Push card to bottom of panel after a short pause so user sees the green flash
    setTimeout(() => {
      const panel = document.getElementById("panel_"+meal);
      if (card && panel) panel.appendChild(card);
    }, 500);

    // Refresh progress strip
    updateProgress(meal);
  } catch(e) {
    btn.innerHTML = "⬜ Mark as Delivered"; btn.disabled = false;
    alert("Error: " + e.message);
  }
}

function fmtTime(isoStr) {
  if (!isoStr) return "";
  try {
    // Always treat stored value as UTC and convert to IST (+5:30)
    const ist = new Date(new Date(isoStr).getTime() + 5.5*3600000);
    const h = ist.getUTCHours(), m = ist.getUTCMinutes();
    return `${h}:${String(m).padStart(2,"0")}`;
  } catch(e) { return isoStr.slice(11,16); }
}

// ── ROUTE OPTIMISATION ────────────────────────────────────────────────────────
// Accepts an order object — checks server-resolved lat/lng first,
// then falls back to regex on the Maps URL (works for non-shortened links).
function extractCoords(o) {
  if (!o) return null;
  // Pre-resolved by server (short URLs like goo.gl / maps.app.goo.gl)
  if (o.lat && o.lng) return { lat: +o.lat, lng: +o.lng };
  // Regex fallback for full URLs
  const url = o.maps || "";
  if (!url) return null;
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: +m[1], lng: +m[2] };
  m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: +m[1], lng: +m[2] };
  m = url.match(/maps\?q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: +m[1], lng: +m[2] };
  return null;
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function nearestNeighbor(orders) {
  const withC = orders.map(o => ({...o, _c: extractCoords(o)}));
  const geo   = withC.filter(o => o._c);
  const noGeo = withC.filter(o => !o._c);
  if (!geo.length) return { route: orders, dist: null };

  const result = [], remaining = [...geo];
  let cur = KITCHEN;
  while (remaining.length) {
    let minD = Infinity, minI = 0;
    remaining.forEach((o,i) => {
      const d = haversine(cur.lat, cur.lng, o._c.lat, o._c.lng);
      if (d < minD) { minD = d; minI = i; }
    });
    result.push(remaining[minI]);
    cur = remaining[minI]._c;
    remaining.splice(minI, 1);
  }

  // Total round-trip distance
  let dist = 0, prev = KITCHEN;
  result.forEach(o => { dist += haversine(prev.lat, prev.lng, o._c.lat, o._c.lng); prev = o._c; });
  dist += haversine(prev.lat, prev.lng, KITCHEN.lat, KITCHEN.lng);

  return { route: [...result, ...noGeo], dist: Math.round(dist*10)/10 };
}

function buildMapsUrl(orders) {
  const stops = orders.filter(o => o._c).map(o => `${o._c.lat},${o._c.lng}`).join("/");
  if (!stops) return null;
  const K = `${KITCHEN.lat},${KITCHEN.lng}`;
  return `https://www.google.com/maps/dir/${K}/${stops}/${K}`;
}

function optimizeRoute(meal) {
  const orders = _ordersData[meal];
  if (!orders || !orders.length) return;

  const { route, dist } = nearestNeighbor(orders);
  _ordersData[meal] = route;
  if (dist) _routeDists[meal] = dist; // save for end-of-day summary

  // Re-number and re-render cards only (keep route bar)
  const cardsHtml = route.map((o,i) => renderCard(o, i, meal)).join("");
  // Replace cards after the route-bar div
  const panel = document.getElementById("panel_"+meal);
  const routeBar = document.getElementById("routeBar_"+meal);
  // Remove all children except routeBar
  [...panel.children].forEach(el => { if (el !== routeBar) el.remove(); });
  panel.insertAdjacentHTML("beforeend", cardsHtml);

  // Update route info
  const infoEl = document.getElementById("routeInfo_"+meal);
  if (infoEl) infoEl.innerHTML = `<span style="color:#27ae60;font-weight:600;">✅ Optimised${dist ? " · ~"+dist+" km" : ""}</span>`;

  // Show Maps link
  const mapsUrl = buildMapsUrl(route);
  const linkEl  = document.getElementById("routeLink_"+meal);
  if (linkEl && mapsUrl) { linkEl.href = mapsUrl; linkEl.style.display = "block"; }
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(meal) {
  ["Breakfast","Lunch","Dinner"].forEach(m => {
    document.getElementById("tab_"+m).classList.toggle("active", m===meal);
    document.getElementById("panel_"+m).classList.toggle("active", m===meal);
  });
  updateProgress(meal);
}

document.getElementById("datePicker").value = todayIST();
