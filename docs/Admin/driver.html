<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Svaadh Delivery</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;color:#222;min-height:100vh;}

  /* ── LOGIN ── */
  #loginWrap{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:100;}
  .login-box{padding:32px 24px;width:100%;max-width:320px;text-align:center;}
  .login-logo{font-size:2rem;margin-bottom:4px;}
  .login-box h1{font-size:1.2rem;font-weight:700;color:#c0392b;margin-bottom:2px;}
  .login-box p{font-size:0.78rem;color:#999;margin-bottom:24px;}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px;}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #ddd;transition:all 0.15s;}
  .pin-dot.filled{background:#c0392b;border-color:#c0392b;}
  .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
  .pk{background:#f5f5f5;border:none;color:#222;font-size:1.5rem;font-weight:600;border-radius:14px;padding:16px;cursor:pointer;transition:background 0.1s;}
  .pk:active{background:#e0e0e0;}
  .pk.del{color:#999;font-size:1.2rem;}
  .pk.span2{grid-column:span 2;}
  .login-err{color:#c0392b;font-size:0.78rem;margin-top:14px;min-height:18px;}

  /* ── SHELL ── */
  #shell{display:none;padding-bottom:80px;}
  #shell.on{display:block;}

  /* ── TOP BAR ── */
  .topbar{background:#c0392b;color:#fff;padding:12px 16px;position:sticky;top:0;z-index:10;}
  .topbar-title{font-size:1rem;font-weight:700;letter-spacing:0.03em;}
  .topbar-date{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .topbar-date input[type=date]{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 10px;border-radius:8px;font-size:0.8rem;flex:1;}
  .topbar-date input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);}
  .load-btn{background:#fff;color:#c0392b;border:none;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem;white-space:nowrap;}

  /* ── TABS ── */
  .tabs{display:flex;background:#fff;border-bottom:2px solid #eee;position:sticky;top:68px;z-index:9;}
  .tab{flex:1;padding:12px 4px;text-align:center;font-size:0.8rem;font-weight:600;color:#aaa;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s;}
  .tab.active{color:#c0392b;border-bottom-color:#c0392b;}
  .tab-count{display:inline-block;background:#f0f0f0;color:#888;font-size:0.65rem;padding:1px 6px;border-radius:10px;margin-left:4px;}
  .tab.active .tab-count{background:#fde8e8;color:#c0392b;}

  /* ── CONTENT ── */
  .meal-panel{display:none;padding:12px 14px;}
  .meal-panel.active{display:block;}

  /* ── ORDER CARD ── */
  .order-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
  .order-num{font-size:0.65rem;font-weight:700;color:#c0392b;letter-spacing:0.05em;margin-bottom:6px;}
  .cust-name{font-size:1.05rem;font-weight:700;color:#111;margin-bottom:2px;}
  .cust-phone{font-size:0.85rem;color:#666;margin-bottom:10px;}
  .address-box{background:#f9f9f9;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:0.82rem;color:#444;line-height:1.5;}
  .landmark{font-size:0.78rem;color:#888;margin-top:4px;}
  .landmark span{color:#e67e22;font-weight:600;}
  .notes-box{background:#fff8e1;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:0.78rem;color:#856404;}
  .card-actions{display:flex;gap:8px;}
  .btn-call{flex:1;background:#27ae60;color:#fff;border:none;border-radius:10px;padding:11px;font-size:0.85rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:block;}
  .btn-maps{flex:1;background:#1a73e8;color:#fff;border:none;border-radius:10px;padding:11px;font-size:0.85rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:block;}
  .btn-maps.disabled{background:#ccc;pointer-events:none;}

  /* ── EMPTY / LOADING ── */
  .empty{text-align:center;padding:48px 20px;color:#aaa;}
  .empty-icon{font-size:2.5rem;margin-bottom:8px;}
  .spinner{width:28px;height:28px;border:3px solid #eee;border-top-color:#c0392b;border-radius:50%;animation:spin 0.7s linear infinite;margin:40px auto;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── SUMMARY BAR ── */
  .summary-bar{background:#fff;padding:10px 16px;margin-bottom:0;border-bottom:1px solid #eee;display:flex;gap:16px;font-size:0.75rem;color:#888;}
  .summary-bar strong{color:#222;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-logo">🛵</div>
    <h1>Svaadh Delivery</h1>
    <p>PIN टाका</p>
    <div class="pin-dots">
      <div class="pin-dot" id="dd0"></div>
      <div class="pin-dot" id="dd1"></div>
      <div class="pin-dot" id="dd2"></div>
      <div class="pin-dot" id="dd3"></div>
    </div>
    <div class="pin-grid">
      <button class="pk" onclick="dp(1)">1</button><button class="pk" onclick="dp(2)">2</button><button class="pk" onclick="dp(3)">3</button>
      <button class="pk" onclick="dp(4)">4</button><button class="pk" onclick="dp(5)">5</button><button class="pk" onclick="dp(6)">6</button>
      <button class="pk" onclick="dp(7)">7</button><button class="pk" onclick="dp(8)">8</button><button class="pk" onclick="dp(9)">9</button>
      <button class="pk span2" onclick="dp(0)">0</button><button class="pk del" onclick="dx()">⌫</button>
    </div>
    <div class="login-err" id="dErr"></div>
  </div>
</div>

<!-- SHELL -->
<div id="shell">
  <div class="topbar">
    <div class="topbar-title">🛵 Svaadh Delivery</div>
    <div class="topbar-date">
      <input type="date" id="datePicker" onchange="loadOrders()">
      <button class="load-btn" onclick="loadOrders()">↻ Refresh</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" id="tab_Breakfast" onclick="switchTab('Breakfast')">🌅 न्याहारी<span class="tab-count" id="cnt_Breakfast">0</span></button>
    <button class="tab" id="tab_Lunch" onclick="switchTab('Lunch')">☀️ दुपार<span class="tab-count" id="cnt_Lunch">0</span></button>
    <button class="tab" id="tab_Dinner" onclick="switchTab('Dinner')">🌙 रात्र<span class="tab-count" id="cnt_Dinner">0</span></button>
  </div>

  <!-- PANELS -->
  <div class="meal-panel active" id="panel_Breakfast"></div>
  <div class="meal-panel" id="panel_Lunch"></div>
  <div class="meal-panel" id="panel_Dinner"></div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-wwECc_mSh949babtRt8OAvFbnJJzH5X9JS_PsN-f-IMHeYkQMj54fwXRs6PevK0W/exec";
let D = { pin: "", sessionPin: "" };

// ── PIN ──
function dp(n) {
  if (D.pin.length >= 4) return;
  D.pin += String(n);
  renderDots();
  if (D.pin.length === 4) verifyPin();
}
function dx() {
  D.pin = D.pin.slice(0,-1);
  renderDots();
  document.getElementById("dErr").textContent = "";
}
function renderDots() {
  for (let i=0;i<4;i++) document.getElementById("dd"+i).classList.toggle("filled", i < D.pin.length);
}

async function verifyPin() {
  document.getElementById("dErr").textContent = "जाँच करत आहे…";
  try {
    const today = todayIST();
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getDriverOrders&date=${today}&pin=${D.pin}&_t=${Date.now()}`);
    const data = await res.json();
    if (data.error) {
      document.getElementById("dErr").textContent = "चुकीचा PIN — पुन्हा प्रयत्न करा";
      D.pin = ""; renderDots(); return;
    }
    D.sessionPin = D.pin;
    D.pin = ""; renderDots();
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("shell").classList.add("on");
    document.getElementById("datePicker").value = today;
    renderAll(data);
    // Auto-switch to current meal
    autoSwitchMeal();
  } catch(e) {
    document.getElementById("dErr").textContent = "Error: " + e.message;
    D.pin = ""; renderDots();
  }
}

function todayIST() {
  const ist = new Date(new Date().getTime() + 5.5*3600000);
  return ist.toISOString().slice(0,10);
}

function autoSwitchMeal() {
  const h = new Date(new Date().getTime() + 5.5*3600000).getUTCHours();
  if (h < 10) switchTab("Breakfast");
  else if (h < 15) switchTab("Lunch");
  else switchTab("Dinner");
}

// ── LOAD ──
async function loadOrders() {
  const date = document.getElementById("datePicker").value;
  if (!date) return;
  ["Breakfast","Lunch","Dinner"].forEach(m => {
    document.getElementById("panel_"+m).innerHTML = `<div class="spinner"></div>`;
  });
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getDriverOrders&date=${date}&pin=${D.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderAll(data);
  } catch(e) {
    ["Breakfast","Lunch","Dinner"].forEach(m => {
      document.getElementById("panel_"+m).innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`;
    });
  }
}

// ── RENDER ──
function renderAll(data) {
  ["Breakfast","Lunch","Dinner"].forEach(meal => {
    const orders = (data.meals || {})[meal] || [];
    document.getElementById("cnt_"+meal).textContent = orders.length;
    document.getElementById("panel_"+meal).innerHTML = renderMeal(orders, meal);
  });
}

function renderMeal(orders, meal) {
  if (!orders.length) {
    const labels = {Breakfast:"न्याहारी", Lunch:"दुपारचे जेवण", Dinner:"रात्रीचे जेवण"};
    return `<div class="empty"><div class="empty-icon">😴</div>${labels[meal]} साठी कोणतेही delivery नाही</div>`;
  }

  return orders.map((o, i) => {
    const hasMap  = o.maps && o.maps.startsWith("http");
    const hasPhone = o.phone && o.phone.length >= 10;
    return `<div class="order-card">
      <div class="order-num">DELIVERY #${i+1}</div>
      <div class="cust-name">${o.name || "—"}</div>
      <div class="cust-phone">${o.phone ? "📞 "+o.phone : ""}</div>
      <div class="address-box">
        📍 ${o.address || "Address not available"}
        ${o.area ? `<br><span style="color:#888;font-size:0.72rem;">📌 ${o.area}</span>` : ""}
        ${o.landmark ? `<div class="landmark">🏢 Landmark: <span>${o.landmark}</span></div>` : ""}
      </div>
      ${o.notes ? `<div class="notes-box">📝 ${o.notes}</div>` : ""}
      <div class="card-actions">
        ${hasPhone
          ? `<a class="btn-call" href="tel:${o.phone}">📞 Call</a>`
          : `<span class="btn-call" style="background:#ccc;pointer-events:none;">No number</span>`}
        ${hasMap
          ? `<a class="btn-maps" href="${o.maps}" target="_blank">🗺 Maps</a>`
          : `<span class="btn-maps disabled">No map</span>`}
      </div>
    </div>`;
  }).join("");
}

// ── TABS ──
function switchTab(meal) {
  ["Breakfast","Lunch","Dinner"].forEach(m => {
    document.getElementById("tab_"+m).classList.toggle("active", m===meal);
    document.getElementById("panel_"+m).classList.toggle("active", m===meal);
  });
}

// Set today on page load
document.getElementById("datePicker").value = todayIST();
</script>
</body>
</html>
