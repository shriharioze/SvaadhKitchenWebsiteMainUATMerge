function renderOOSPanel() {
  const bfItems = S.bfMaster
    .filter(m => S.checkedBf[m.id])
    .map(m => ({ label: m.name, colKey: m.name }));
  renderOOSGrid("Breakfast", "oosBreakfastGrid", bfItems);
  renderOOSGrid("Lunch",     "oosLunchGrid",     OOS_FIXED_ITEMS);
  renderOOSGrid("Dinner",    "oosDinnerGrid",     OOS_FIXED_ITEMS);
}

function renderOOSGrid(meal, gridId, items) {
  const grid = document.getElementById(gridId);
  if (!grid) return;
  if (!items.length) {
    grid.innerHTML = `<div style="font-size:.75rem;color:var(--muted);padding:4px 0;">No items set for this date yet.</div>`;
    return;
  }
  const mealOOS = (S.oosItems[meal] || []);
  grid.innerHTML = items.map(item => {
    const isOOS     = mealOOS.includes(item.colKey);
    const safeKey   = item.colKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const limit     = (S.stockLimits[meal]  || {})[item.colKey];
    const ordered   = (S.unitsOrdered[meal] || {})[item.colKey] || 0;
    const remaining = (limit !== undefined) ? Math.max(0, limit - ordered) : null;
    const stockTag  = (limit !== undefined)
      ? `<div style="font-size:.62rem;color:var(--muted);margin-top:2px;white-space:nowrap;text-align:right;">
           ${limit} set · ${ordered} ordered ·
           <b style="color:${remaining<=10?'#e74c3c':'var(--green,#27ae60)'};">${remaining} left</b>
         </div>`
      : ``;
    return `<div class="bf-item ${isOOS ? 'on' : ''}"
                 style="${isOOS ? 'border-color:#e74c3c;background:#fdf0ee;' : ''}margin-bottom:6px;cursor:pointer;">
      <div class="bf-check" onclick="toggleOOS('${meal}','${safeKey}')" style="${isOOS ? 'background:#e74c3c;color:#fff;' : ''}">${isOOS ? '✕' : ''}</div>
      <div class="bf-item-info" onclick="toggleOOS('${meal}','${safeKey}')" style="flex:1;">
        <div class="name">${item.label}</div>
        <div class="price" style="color:${isOOS ? '#e74c3c' : 'var(--muted)'};">${isOOS ? 'Sold Out' : 'In Stock'}</div>
      </div>
      <div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px;padding-left:8px;" onclick="event.stopPropagation()">
        <input type="number" min="1" placeholder="∞"
          value="${limit != null ? limit : ''}"
          style="width:52px;text-align:center;border:1px solid #ddd;border-radius:6px;padding:2px 4px;font-size:.75rem;background:var(--bg);"
          oninput="setStockLimit('${meal}','${safeKey}',this.value)"
          onclick="event.stopPropagation()"
          title="Max units (blank = unlimited)">
        ${stockTag}
      </div>
    </div>`;
  }).join("");
}

function setStockLimit(meal, colKey, value) {
  const v = parseInt(value);
  if (!S.stockLimits[meal]) S.stockLimits[meal] = {};
  if (!value || isNaN(v) || v <= 0) delete S.stockLimits[meal][colKey];
  else S.stockLimits[meal][colKey] = v;
  setMenuDirty(true);
}

function toggleOOS(meal, colKey) {
  if (!S.oosItems[meal]) S.oosItems[meal] = [];
  const idx = S.oosItems[meal].indexOf(colKey);
  if (idx >= 0) S.oosItems[meal].splice(idx, 1);
  else S.oosItems[meal].push(colKey);
  setMenuDirty(true);
  const gridId = meal === "Breakfast" ? "oosBreakfastGrid"
               : meal === "Lunch"     ? "oosLunchGrid"
               :                        "oosDinnerGrid";
  const items = meal === "Breakfast"
    ? S.bfMaster.filter(m => S.checkedBf[m.id]).map(m => ({ label: m.name, colKey: m.name }))
    : OOS_FIXED_ITEMS;
  renderOOSGrid(meal, gridId, items);
}

// ════════════════════════════════════════════════════════
async function saveCurrentMenu() {
  const btn = document.getElementById("saveHeroBtn");
  sBtnLoading(btn, true, "Saving");

  // Build breakfast array from checked items
  const breakfast = S.bfMaster
    .filter(m => S.checkedBf[m.id])
    .map(m => ({ name: m.name, price: m.price }));

  const payload = {
    _action:            "saveMenu",
    pin:                S.sessionPin,
    date:               S.selectedDate,
    breakfast,
    lunch_dry:          S.lunchDry,
    lunch_curry:        S.lunchCurry,
    dinner_dry:         S.dinnerDry,
    dinner_curry:       S.dinnerCurry,
    cutoff_breakfast:   timeToDecimal(document.getElementById("cutoffBf").value) || null,
    cutoff_lunch:       timeToDecimal(document.getElementById("cutoffL").value)  || null,
    cutoff_dinner:      timeToDecimal(document.getElementById("cutoffD").value)  || null,
    oos_items:          S.oosItems,
    orders_closed:      S.ordersClosed,
    stock_limits:       S.stockLimits,
  };

  try {
    console.log("Saving menu payload:", payload);
    const res  = await fetch(APPS_SCRIPT_URL, {
      method: "POST", body: JSON.stringify(payload)
    });
    
    if (!res.ok) {
      const text = await res.text();
      console.error("Server error response:", text);
      throw new Error(`Server returned ${res.status}: ${text.slice(0, 100)}`);
    }

    const data = await res.json();
    if (!data.success) throw new Error(data.error || "Unknown server error");

    // Update local cache
    const cutoffOverrides = {};
    const cbf = document.getElementById("cutoffBf").value;
    const cl  = document.getElementById("cutoffL").value;
    const cd  = document.getElementById("cutoffD").value;
    if (cbf) cutoffOverrides.Breakfast = Number(cbf);
    if (cl)  cutoffOverrides.Lunch     = Number(cl);
    if (cd)  cutoffOverrides.Dinner    = Number(cd);

    const idx   = S.menuEntries.findIndex(e => e.date === S.selectedDate);
    const entry = {
      date:             S.selectedDate,
      breakfast,
      lunch_dry:        S.lunchDry,
      lunch_curry:      S.lunchCurry,
      dinner_dry:       S.dinnerDry,
      dinner_curry:     S.dinnerCurry,
      cutoff_overrides: cutoffOverrides,
      oos_items:        S.oosItems,
      orders_closed:    S.ordersClosed,
      stock_limits:     S.stockLimits,
      units_remaining:  (() => {
        const out = {};
        ["Breakfast","Lunch","Dinner"].forEach(meal => {
          Object.entries(S.stockLimits[meal] || {}).forEach(([k, lim]) => {
            if (!out[meal]) out[meal] = {};
            out[meal][k] = Math.max(0, lim - ((S.unitsOrdered[meal] || {})[k] || 0));
          });
        });
        return out;
      })(),
    };
    if (idx >= 0) S.menuEntries[idx] = entry; else S.menuEntries.push(entry);

    sBtnLoading(btn, false);
    toast(`✅ Menu saved for ${S.selectedDate}`);
    setMenuDirty(false);
    selectDate(S.selectedDate); // refresh badges
    renderSidebar();
  } catch(e) {
    sBtnLoading(btn, false);
    toast("Error: " + e.message, 4000);
  }
}

// ORDERS AUTO-REFRESH (5 min, today only)
// ════════════════════════════════════════════════════════
let _ordersTimer = null, _ordersNextAt = null, _ordersTick = null;

function startOrdersAutoRefresh() {
  stopOrdersAutoRefresh();
  _ordersNextAt = Date.now() + 5 * 60 * 1000;
  _ordersTimer  = setTimeout(async () => {
    const date  = document.getElementById("orderDatePicker").value;
    const today = toISO(getIST());
    if (date === today && document.getElementById("pageOrders").classList.contains("on")) {
      await loadOrderSummary();
    } else {
      startOrdersAutoRefresh(); // keep timer going even if not reloading
    }
  }, 5 * 60 * 1000);

  _ordersTick = setInterval(() => {
    const badge = document.getElementById("ordersRefreshBadge");
    if (!badge) return;
    const today = toISO(getIST());
    if (document.getElementById("orderDatePicker").value !== today) {
      badge.textContent = ""; return;
    }
    const secs = Math.max(0, Math.round((_ordersNextAt - Date.now()) / 1000));
    badge.textContent = `↻ auto in ${Math.floor(secs/60)}:${String(secs%60).padStart(2,"0")}`;
  }, 1000);
}

function stopOrdersAutoRefresh() {
  if (_ordersTimer) { clearTimeout(_ordersTimer);  _ordersTimer = null; }
  if (_ordersTick)  { clearInterval(_ordersTick);  _ordersTick  = null; }
  const badge = document.getElementById("ordersRefreshBadge");
  if (badge) badge.textContent = "";
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) stopOrdersAutoRefresh();
  else if (document.getElementById("pageOrders")?.classList.contains("on") && S.sessionPin) {
    startOrdersAutoRefresh();
  }
});

// ════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════
function getIST() {
  const now = new Date();
  return new Date(now.getTime() + (now.getTimezoneOffset() + 330) * 60000);
}
function toISO(d) {
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function isMealCancellable(dateStr, meal) {
  const now = getIST();
  const todayStr = toISO(now);
  
  // Future dates are always cancellable
  if (dateStr > todayStr) return true;
  // Past dates are NEVER cancellable
  if (dateStr < todayStr) return false;
  
  // Today: check hour/minute cutoff
  const time = now.getHours() * 60 + now.getMinutes();
  const cutoffs = {
    "Breakfast": 7 * 60,      // 7:00 AM
    "Lunch":     9 * 60 + 30, // 9:30 AM
    "Dinner":    17 * 60      // 5:00 PM (17:00)
  };
  return time < (cutoffs[meal] || 0);
}
// ── CUTOFF TIME HELPERS ─────────────────────────────────────
// Convert "HH:MM" → decimal hours  e.g. "09:00" → 9, "16:30" → 16.5
function timeToDecimal(val) {
  if (!val) return null;
  const [h, m] = val.split(":").map(Number);
  if (isNaN(h)) return null;
  return h + (m || 0) / 60;
}
// Convert decimal hours → "HH:MM"  e.g. 16.5 → "16:30", 9 → "09:00"
function decimalToTime(dec) {
  if (dec === null || dec === undefined || dec === "") return "";
  const h = Math.floor(dec);
  const m = Math.round((dec - h) * 60);
  return String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
}
// Show ⚡ Early / 🔓 Extended / ✅ Default badge next to each time input
function updateCutoffBadge(inputId, badgeId, defaultDecimal) {
  const val = document.getElementById(inputId).value;
  const badge = document.getElementById(badgeId);
  if (!val) { badge.innerHTML = ""; return; }
  const dec = timeToDecimal(val);
  if (dec === null) { badge.innerHTML = ""; return; }
  if (dec < defaultDecimal) {
    badge.innerHTML = '<span style="color:#e67e22;background:#fff3e0;padding:2px 8px;border-radius:99px;">⚡ Early cutoff</span>';
  } else if (dec > defaultDecimal) {
    badge.innerHTML = '<span style="color:#27ae60;background:#e8f5e9;padding:2px 8px;border-radius:99px;">🔓 Extended</span>';
  } else {
    badge.innerHTML = '<span style="color:#888;background:#f5f5f5;padding:2px 8px;border-radius:99px;">✅ Same as default</span>';
  }
}

function toast(msg, ms=2500) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), ms);
}

// PACKAGING EXPENSES PAGE
// ════════════════════════════════════════════════════════
// ── PACKAGING: helpers ──────────────────────────────────────
let _pkgMode = "day";   // "day" | "range"
let _pkgData = null;    // last fetched data (for re-sort)

function pkgISO(d) { return d.toISOString().slice(0,10); }
function pkgAddDays(d, n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }

function pkgSetRange(mode) {
  _pkgMode = mode;
  const now = new Date();
  const toISO = d => pkgISO(d);
  const single = document.getElementById("pkgSingleWrap");
  const range  = document.getElementById("pkgRangeWrap");
  const from   = document.getElementById("pkgFrom");
  const to     = document.getElementById("pkgTo");
  const date   = document.getElementById("pkgDatePicker");

  document.querySelectorAll("#pagePackaging .chip").forEach(c => c.classList.remove("active"));
  event.target.classList.add("active");

  if (mode === "day") {
    single.style.display = "flex"; range.style.display = "none";
    date.value = toISO(now);
  } else {
    single.style.display = "none"; range.style.display = "flex";
    const today = now;
    if (mode === "week") {
      const dow = today.getDay() || 7;
      from.value = toISO(pkgAddDays(today, 1-dow));
      to.value   = toISO(today);
    } else if (mode === "15days") {
      from.value = toISO(pkgAddDays(today, -14));
      to.value   = toISO(today);
    } else if (mode === "month") {
      from.value = toISO(new Date(today.getFullYear(), today.getMonth(), 1));
      to.value   = toISO(today);
    } else if (mode === "lastmonth") {
      const lm = new Date(today.getFullYear(), today.getMonth()-1, 1);
      from.value = toISO(lm);
      to.value   = toISO(new Date(today.getFullYear(), today.getMonth(), 0));
    } else if (mode === "year") {
      from.value = toISO(new Date(today.getFullYear(), 0, 1));
      to.value   = toISO(today);
    }
  }
}

// Abbreviation tables — mirrors label_generator.py
const ABBREV_EN = {
  "Chapati":"CH","Without_Oil_Chapati":"CH(O)","Phulka":"PH","Ghee_Phulka":"GPH",
  "Jowar_Bhakri":"J","Bajra_Bhakri":"B",
  "Dry_Sabji_Mini":"D100","Dry_Sabji_Full":"D250",
  "Curry_Sabji_Mini":"C100","Curry_Sabji_Full":"C250",
  "Dal":"DAL","Rice":"R","Salad":"S","Curd":"CU",
  "Kanda Poha":"KP","Ghee Upma":"GU","Thalipeeth":"TP",
  "Paneer Paratha":"PP","Methi Thepla":"MT","Sabudana Khichdi":"SK",
};
const ABBREV_MR = {
  "Chapati":"च","Without_Oil_Chapati":"च बिनतेल","Phulka":"फु","Ghee_Phulka":"घी फु",
  "Jowar_Bhakri":"जो","Bajra_Bhakri":"बाज",
  "Dry_Sabji_Mini":"सु १००","Dry_Sabji_Full":"सु २५०",
  "Curry_Sabji_Mini":"र १००","Curry_Sabji_Full":"र २५०",
  "Dal":"दाल","Rice":"भात","Salad":"स","Curd":"दही",
  "Kanda Poha":"कांपो","Ghee Upma":"घीऊ","Thalipeeth":"था",
  "Paneer Paratha":"पनपरा","Methi Thepla":"मेथी","Sabudana Khichdi":"साबु",
};

let _labelData = []; // stored for PDF generation

function abbr(key, dict) {
  if (dict[key]) return dict[key];
  for (const [k,v] of Object.entries(dict)) if (k.toLowerCase()===key.toLowerCase()) return v;
  return key;
}

function buildSummary(order, meal, dict) {
  const parts = [];
  if (meal === "Breakfast") {
    for (let n=1;n<=4;n++) {
      const item = order[`BF_Item_${n}`]||""; const qty = Number(order[`BF_Qty_${n}`])||0;
      if (item && qty > 0) parts.push(`${qty}×${abbr(item, dict)}`);
    }
    const curd = Number(order.Curd)||0;
    if (curd > 0) parts.push(`${curd}×${abbr("Curd", dict)}`);
  } else {
    const cols = ["Chapati","Without_Oil_Chapati","Phulka","Ghee_Phulka",
                  "Jowar_Bhakri","Bajra_Bhakri","Dry_Sabji_Mini","Dry_Sabji_Full",
                  "Curry_Sabji_Mini","Curry_Sabji_Full","Dal","Rice","Salad","Curd"];
    cols.forEach(c => { const q=Number(order[c])||0; if(q>0) parts.push(`${q}×${abbr(c,dict)}`); });
  }
  // Fallback to Items_JSON
  if (!parts.length && order.Items_JSON) {
    try {
      Object.entries(JSON.parse(order.Items_JSON)).forEach(([k,q]) => {
        if (Number(q)>0) parts.push(`${q}×${abbr(k,dict)}`);
      });
    } catch(e){}
  }
  return parts.join(", ");
}

async function generateLabels() {

  const lang = document.getElementById("labelLang").value;
  if (!date) { sAlert("Please pick a date first."); return; }

  const el = document.getElementById("labelPreview");
  el.innerHTML = `<div style="text-align:center;padding:30px;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  document.getElementById("downloadLabelBtn").style.display = "none";

  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getLabelOrders&date=${date}&meal=${meal}&pin=${S.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (!data.orders || !data.orders.length) {
      el.innerHTML = `<div style="text-align:center;padding:30px;color:#aaa;">No ${meal} orders on this date</div>`;
      return;
    }

    const dict = lang === "Devanagari" ? ABBREV_MR : ABBREV_EN;
    _labelData = [];

    data.orders.forEach(order => {
      if (!order.name || order.name.toLowerCase() === "nan") return;
      const parts = [];

      if (meal === "Breakfast") {
        for (let n=1;n<=4;n++) {
          const item = order[`BF_Item_${n}`]||"";
          const qty  = Number(order[`BF_Qty_${n}`])||0;
          if (item && qty > 0) parts.push(`${qty}×${abbr(item, dict)}`);
        }
        if (order.Curd > 0) parts.push(`${order.Curd}×${abbr("Curd", dict)}`);
      } else {
        const cols = ["Chapati","Without_Oil_Chapati","Phulka","Ghee_Phulka",
                      "Jowar_Bhakri","Bajra_Bhakri","Dry_Sabji_Mini","Dry_Sabji_Full",
                      "Curry_Sabji_Mini","Curry_Sabji_Full","Dal","Rice","Salad","Curd"];
        cols.forEach(c => { const q=Number(order[c])||0; if(q>0) parts.push(`${q}×${abbr(c,dict)}`); });
      }

      if (!parts.length) return;
      _labelData.push({
        name:    order.name,
        summary: parts.join(", "),
        notes:   (order.notes && order.notes.toLowerCase() !== "nan") ? order.notes : "",
      });
    });

    if (!_labelData.length) {
      el.innerHTML = `<div style="text-align:center;padding:30px;color:#aaa;">No valid labels found</div>`;
      return;
    }

    const fmtDate = d => { const p=d.split("-"); return `${p[2]}/${p[1]}/${p[0]}`; };
    let html = `<h3>${_labelData.length} Labels · ${meal} · ${fmtDate(date)}</h3>`;
    _labelData.forEach((l,i) => {
      html += `<div class="label-card">
        <div>
          <div class="lname">${l.name}</div>
          <div class="lsummary">${l.summary}</div>
          <div class="larea">${l.area || ""}</div>
          ${l.notes ? `<div class="lnotes">📝 ${l.notes}</div>` : ""}
        </div>
        <div class="lnum">#${i+1}</div>
      </div>`;
    });
    el.innerHTML = html;
    document.getElementById("downloadLabelBtn").style.display = "inline-block";
    document.getElementById("downloadLabelBtn").dataset.date = date;
    document.getElementById("downloadLabelBtn").dataset.meal = meal;
    document.getElementById("downloadLabelBtn").dataset.lang = lang;

  } catch(e) {
    el.innerHTML = `<p style="color:#c0392b;padding:20px;">Error: ${e.message}</p>`;
  }
}

async function saveLabelsToDrive() {
  if (!_labelData.length) { sAlert("Please generate labels first."); return; }

  const btn  = document.getElementById("downloadLabelBtn");
  const date = btn.dataset.date;
  const meal = btn.dataset.meal;
  const lang = btn.dataset.lang;
  const isMR = lang === "Devanagari";

  btn.textContent = "⏳ Generating PDF…";
  btn.disabled = true;

  try {
    // Load jsPDF on demand
    if (!window.jspdf) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    const { jsPDF } = window.jspdf;

    const LW = 50, LH = 25;           // label size in mm
    const SCALE = 10;                  // px per mm = ~254 dpi
    const PW = LW * SCALE, PH = LH * SCALE;
    const font = isMR ? "'Hind','Noto Sans Devanagari',sans-serif" : "'Segoe UI',Arial,sans-serif";
    const mm = v => v * SCALE;

    const doc = new jsPDF({ unit: 'mm', format: [LW, LH] });

    for (let i = 0; i < _labelData.length; i++) {
      if (i > 0) doc.addPage([LW, LH]);
      const l = _labelData[i];

      const cv = document.createElement('canvas');
      cv.width = PW; cv.height = PH;
      const ctx = cv.getContext('2d');

      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, PW, PH);

      // Name
      ctx.fillStyle = '#000';
      ctx.font = `bold ${mm(3.2)}px ${font}`;
      ctx.fillText(l.name, mm(2), mm(6.5));

      // Summary — wrap by comma-separated tokens
      ctx.fillStyle = '#222';
      ctx.font = `${mm(2.7)}px ${font}`;
      const maxW = mm(46), lineH = mm(3.8);
      const tokens = l.summary.split(', ');
      let line = '', y = mm(12);
      for (const tok of tokens) {
        const test = line ? line + ', ' + tok : tok;
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line, mm(2), y); y += lineH; line = tok;
        } else { line = test; }
      }
      if (line) { ctx.fillText(line, mm(2), y); y += lineH; }

      // Notes
      if (l.notes) {
        ctx.fillStyle = '#b86000';
        ctx.font = `${mm(2.2)}px ${font}`;
        ctx.fillText('📝 ' + l.notes, mm(2), y);
      }

      doc.addImage(cv.toDataURL('image/png'), 'PNG', 0, 0, LW, LH);
    }

    const pdfB64 = doc.output('datauristring').split(',')[1];
    sBtnLoading(btn, true, "Saving to Drive");

    const res  = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ _action: 'saveLabels', pin: S.sessionPin, date, meal, lang, pdf: pdfB64 })
    });
    const data = await res.json();
    sBtnLoading(btn, false);
    if (!data.success) throw new Error(data.error || "Failed to save");

    toast(`Saved to Drive ✅ — ${data.name}`, 4000);
    btn.textContent = "✅ Saved — Open in Drive";
    btn.disabled = false;
    btn.onclick = () => { window.open(data.url, '_blank'); btn.textContent = "💾 Save to Drive"; btn.onclick = saveLabelsToDrive; };
  } catch(e) {
    sBtnLoading(btn, false);
    await sAlert("Error: " + e.message, "Upload Failed", "❌");
    btn.textContent = "💾 Save to Drive";
  }
}

      if (isPaidStatus(s)) return `<span class="pay-badge paid">✓ Paid</span>`;

    };

    // Item totals chips

      .sort((a,b) => b[1]-a[1])
      .map(([name,qty]) => `<div class="item-total-chip"><span class="iname">${name}</span><span class="iqty">${qty}</span></div>`)
      .join("");

    // Customer rows
    const custRows = m.customers.map(c => {
      const itemList = Object.entries(c.items).filter(([,q])=>q>0).map(([n,q])=>`${q}×${n}`).join(", ");
      return `<tr data-cust="${(c.name+' '+c.phone).replace(/"/g,'&quot;')}">

        <td style="text-align:right;white-space:nowrap;">

          ${payBadge(c.payStatus)}
          ${c.notes ? `<br><span class="notes-badge">📝 ${c.notes}</span>` : ""}
        </td>
        <td style="text-align:center;">
          ${isMealCancellable(date, meal) 
            ? `<button class="cancel-order-btn" onclick="adminCancelMealOrder('${c.phone}','${date}','${meal}')" title="Cancel this order">✕ Cancel</button>`
            : `<span style="color:#aaa;font-size:0.65rem;font-weight:700;background:#f8f8f8;padding:4px 8px;border:1px solid #eee;border-radius:6px;display:inline-block;cursor:not-allowed;">🔒 Locked</span>`
          }
        </td>
      </tr>`;
    }).join("");

    html += `<div class="meal-section">
      <div class="meal-section-head" onclick="toggleMealSection('${meal}')">
        <h3>${MEAL_ICONS[meal]} ${meal} <span style="font-weight:400;font-size:0.82rem;color:#888;">(${m.count} order${m.count>1?"s":""})</span></h3>
        <div class="meal-stats">
          <span>💰 ${fmtMoney(m.revenue)}</span>
          <span style="color:#27ae60;">✓ ${fmtMoney(m.paid)}</span>
          <span style="color:#e67e22;">⏳ ${fmtMoney(m.pending)}</span>
          <span id="chevron_${meal}" style="transition:transform 0.2s;">▼</span>
        </div>
      </div>
      <div class="meal-section-body" id="mealBody_${meal}">
        <div style="font-size:0.75rem;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;">Item Totals</div>
        <div class="item-totals-grid">${itemChips}</div>
        <div style="font-size:0.75rem;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;">Customer Details</div>
        <div style="overflow-x:auto;">
          <table class="cust-table">
            <thead><tr><th>Customer</th><th>Items</th><th>Address</th><th style="text-align:right;">Amount</th><th></th></tr></thead>
            <tbody>${custRows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  });

  return html;
}

const LABEL_EN = {

  Curry_Sabji_Mini:"C100", Curry_Sabji_Full:"C250",
  Dal:"DAL", Rice:"R", Salad:"S", Curd:"CU",
  "Kanda Poha":"KP", "Ghee Upma":"GU", "Thalipeeth":"TP",
  "Paneer Paratha":"PP", "Methi Thepla":"MT", "Sabudana Khichdi":"SK",
};
const LABEL_MR = {
  Chapati:"च", Without_Oil_Chapati:"च बिनतेल", Phulka:"फु", Ghee_Phulka:"घी फु",
  Jowar_Bhakri:"जो", Bajra_Bhakri:"बाज",
  Dry_Sabji_Mini:"सु १००", Dry_Sabji_Full:"सु २५०",
  Curry_Sabji_Mini:"र १००", Curry_Sabji_Full:"र २५०",
  Dal:"दाल", Rice:"भात", Salad:"स", Curd:"दही",
  "Kanda Poha":"कांपो", "Ghee Upma":"घीऊ", "Thalipeeth":"था",
  "Paneer Paratha":"पनपरा", "Methi Thepla":"मेथी", "Sabudana Khichdi":"साबु",
};
const LD_COLS = ["Chapati","Without_Oil_Chapati","Phulka","Ghee_Phulka","Jowar_Bhakri","Bajra_Bhakri",
                 "Dry_Sabji_Mini","Dry_Sabji_Full","Curry_Sabji_Mini","Curry_Sabji_Full","Dal","Rice","Salad","Curd"];

function getItemSummary(order, meal, lang) {
  const lbl = lang === "Devanagari" ? LABEL_MR : LABEL_EN;
  const parts = [];
  if (meal === "Breakfast") {
    for (let n = 1; n <= 4; n++) {
      const item = order["BF_Item_"+n], qty = Number(order["BF_Qty_"+n]) || 0;
      if (item && qty > 0) {
        // look up by name or name-with-underscores
        const a = lbl[item] || lbl[item.replace(/ /g,"_")] || item;
        parts.push(qty + "x" + a);
      }
    }
    const curdQty = Number(order.Curd) || 0;
    if (curdQty > 0) parts.push(curdQty + "x" + lbl.Curd);
  } else {
    LD_COLS.forEach(col => {
      const q = Number(order[col]) || 0;
      if (q > 0) parts.push(q + "x" + (lbl[col] || col));
    });
  }
  return parts.join(", ");
}

function renderLabelPreview(orders, meal, lang, date) {
  const preview  = document.getElementById("labelPreview");

function wrapTextCanvas(ctx, text, x, y, maxW, lineH) {
  const words = text.split(" ");
  let line = "";
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + " ";
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line.trim(), x, y);
      line = words[i] + " ";
      y += lineH;
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(), x, y);
}

async function saveLabelsToDrive() {
  const date = document.getElementById("labelDate").value;
  const meal = document.getElementById("labelMeal").value;
  const lang = document.getElementById("labelLang").value;
  const btn  = document.getElementById("downloadLabelBtn");

  if (!labelOrders.length) { showToast("Generate labels first"); return; }

  btn.disabled    = true;
  btn.textContent = "⏳ Generating PDF…";

  // Load jsPDF if not already loaded
  if (!window.jspdf) {
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  try {
    const { jsPDF } = window.jspdf;
    const W   = 50;            // label width mm
    const LH  = 25;            // label height mm
    const customGap = parseFloat(document.getElementById('labelGap').value) || 2.7;
    const GAP = customGap;     // dynamic gap between labels mm
    const isTest = document.getElementById('labelMode').value === "Test";
    
    // Test mode: print top 5 labels
    const currentLabels = isTest ? labelOrders.slice(0, 5) : labelOrders;
    
    const BLOCK = LH + GAP;    
    const n     = currentLabels.length;
    const totalH = n * BLOCK;  // single tall page — all labels stacked
    const isMR   = lang === "Devanagari";
    const TW = W - 4, LM = 2;  // 46mm text width, 2mm left margin

    // Single page, portrait for tall stacks
    const orient = totalH >= W ? "portrait" : "landscape";
    const doc = new jsPDF({ unit:"mm", format:[W, totalH], orientation: orient });

    if (!isMR) {
      // ── English: jsPDF native text per label block ──
      currentLabels.forEach((order, idx) => {
        const BY = idx * BLOCK;   // block top y
        const summary = getItemSummary(order, meal, lang);

        doc.setFont("helvetica", "bold");
        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0);
        const nameLines = doc.splitTextToSize("Name: " + order.name, TW);
        let y = BY + 6;
        doc.text(nameLines, LM, y);
        y += nameLines.length * 5 + 0.5;

        // Summary
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        const sumLines = doc.splitTextToSize(summary, TW);
        doc.text(sumLines, LM, y);
        y += sumLines.length * 4 + 1;

        // Area
        doc.setFont("helvetica", "bold");
        doc.setFontSize(9.5);
        doc.text(order.area || "", LM, y);
        y += 4;

        // Notes
        if (order.notes) {
          doc.setFontSize(8);
          doc.setTextColor(184, 96, 0);
          doc.text("* " + order.notes, LM, Math.min(y, BY + LH - 2));
          doc.setTextColor(0, 0, 0);
        }

        // Separator line in the gap (not after last label)
        if (idx < n - 1) {
          doc.setDrawColor(0, 0, 0);
          doc.setLineWidth(0.2);
          doc.line(1, BY + LH + GAP / 2, W - 1, BY + LH + GAP / 2);
        }
      });

    } else {
      // ── Devanagari: single tall canvas, all labels drawn into it ──
      const SCALE = 10;
      const PW = Math.round(W * SCALE);
      const PH = Math.round(totalH * SCALE);
      const mm = v => Math.round(v * SCALE);
      const maxW = mm(TW);
      const devFont = "'Hind','Noto Sans Devanagari',sans-serif";

      const cv = document.createElement("canvas");
      cv.width = PW; cv.height = PH;
      const ctx = cv.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, PW, PH);

      function cvWrap(text, bold, fSize, x, startY, lH) {
        ctx.font = (bold ? "bold " : "") + `${fSize}px ${devFont}`;
        const words = text.split(" ");
        let line = "", cy = startY;
        for (const w of words) {
          const test = line ? line + " " + w : w;
          if (ctx.measureText(test).width > maxW && line) {
            ctx.fillText(line, x, cy); cy += lH; line = w;
          } else line = test;
        }
        if (line) { ctx.fillText(line, x, cy); cy += lH; }
        return cy;
      }

      currentLabels.forEach((order, idx) => {
        const BY = mm(idx * BLOCK);
        const summary = getItemSummary(order, meal, lang);

        // Name
        ctx.fillStyle = "#000";
        let y = cvWrap("Name: " + order.name, true, mm(3.0), mm(LM), BY + mm(5.0), mm(4.2));
        y += mm(0.5);

        // Summary
        ctx.fillStyle = "#222";
        y = cvWrap(summary, false, mm(2.6), mm(LM), y, mm(3.6));
        y += mm(0.5);

        // Area
        ctx.fillStyle = "#000";
        y = cvWrap(order.area || "", true, mm(2.8), mm(LM), y, mm(3.8));

        // Notes
        if (order.notes) {
          ctx.fillStyle = "#b86000";
          ctx.font = `${mm(2.2)}px ${devFont}`;
          ctx.fillText("* " + order.notes, mm(LM), Math.min(y, BY + mm(LH - 2)));
        }

        // Separator line
        if (idx < n - 1) {
          const lineY = BY + mm(LH) + mm(GAP / 2);
          ctx.strokeStyle = "#000";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(mm(1), lineY);
          ctx.lineTo(PW - mm(1), lineY);
          ctx.stroke();
        }
      });

      doc.addImage(cv.toDataURL("image/png"), "PNG", 0, 0, W, totalH);
    }

    btn.textContent = "⏳ Saving to Drive…";

    const pdfB64 = doc.output("datauristring").split(",")[1];
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ _action:"saveLabels", pin:S.sessionPin, date, meal, lang, pdf:pdfB64 })
    });
    const data = await res.json();

    if (data.url) {
      btn.innerHTML = `<a href="${data.url}" target="_blank" style="color:#fff;text-decoration:none;">✅ Saved — Open in Drive (${data.name})</a>`;
      btn.disabled = false;
    } else {
      showToast("Error: " + (data.error || "Unknown error"));
      btn.textContent = "💾 Save to Drive";
      btn.disabled = false;
    }
  } catch(e) {
    showToast("PDF error: " + e.message);
    btn.textContent = "💾 Save to Drive";
    btn.disabled = false;
  }
}

let _tendayData = null;
function tendayAutoSelect() {

function tendaySetPeriod(period) {
  const ist=getIST(), y=ist.getFullYear(), m=ist.getMonth();
  let from, to;
  if      (period==="1-10")  { from=new Date(y,m,1);  to=new Date(y,m,10); }
  else if (period==="11-20") { from=new Date(y,m,11); to=new Date(y,m,20); }
  else                       { from=new Date(y,m,21); to=new Date(y,m+1,0); }

async function loadTenday() {
  const from = document.getElementById("tendayFrom").value;
  const to   = document.getElementById("tendayTo").value;
  if (!from || !to) { toast("Set a date range"); return; }
  const el = document.getElementById("tendayContent");
  el.innerHTML = `<div style="text-align:center;padding:40px;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  document.getElementById("tendayWaBtn").style.display = "none";
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=get10DayBilling&dateFrom=${from}&dateTo=${to}&pin=${S.sessionPin}&_t=${Date.now()}`);

function renderTenday(data) {
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
  const fmtD = d => d?(p=>p[2]+"/"+p[1]+"/"+p[0])(d.split("-")):"—";
  if (!data.customers.length) return `<div class="no-orders-msg">😴 No orders for this period.</div>`;

  const summary = `<div class="pay-summary-strip">
    <div class="pay-sum-card"><div class="sv">${fmtM(data.grandTotal)}</div><div class="sl">Total Billed</div></div>
    <div class="pay-sum-card" style="border-color:var(--green-border);"><div class="sv" style="color:var(--green);">${fmtM(data.grandPaid)}</div><div class="sl">Collected</div></div>
    <div class="pay-sum-card" style="border-color:var(--gold-border);"><div class="sv" style="color:var(--gold);">${fmtM(data.grandPending)}</div><div class="sl">Outstanding</div></div>
    <div class="pay-sum-card"><div class="sv">${data.customers.length}</div><div class="sl">Customers</div></div>
  </div>`;

  const rows = data.customers.map(c => {
    const isPaid = isPaidStatus(c.status);
    return `<tr>
      <td><strong>${c.name}</strong><br><span style="font-size:.7rem;color:var(--muted);">${c.phone}</span></td>
      <td style="text-align:center;">${c.orders}</td>

      <td style="text-align:right;color:var(--green);font-weight:600;">${fmtM(c.paid)}</td>
      <td style="text-align:right;color:var(--gold);font-weight:700;">${c.pending>0?fmtM(c.pending):"—"}</td>
      <td><button class="pay-toggle ${isPaid?"paid":"pending"}" id="tdpaybtn_${c.phone}"
          onclick="tendayToggle('${c.phone}','${c.status}')">${isPaid?"✓ Paid":"⏳ Pending"}</button></td>
    </tr>`;
  }).join("");

  const tfoot = `<tr>
    <td>Total (${data.customers.length} customers)</td>
    <td></td>
    <td style="text-align:right;">${fmtM(data.grandTotal)}</td>
    <td style="text-align:right;color:var(--green);">${fmtM(data.grandPaid)}</td>
    <td style="text-align:right;color:var(--gold);font-weight:700;">${fmtM(data.grandPending)}</td>
    <td></td>
  </tr>`;

  return summary + `<div class="billing-table-wrap"><table class="billing-table">
    <thead><tr><th>Customer</th><th style="text-align:center;">Orders</th><th style="text-align:right;">Total</th><th style="text-align:right;">Paid</th><th style="text-align:right;">Due</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody><tfoot>${tfoot}</tfoot>

async function tendayToggle(phone, currentStatus) {
  const from = document.getElementById("tendayFrom").value;
  const to   = document.getElementById("tendayTo").value;
  const newStatus = currentStatus==="Paid" ? "Pending" : "Paid";
  const btn = document.getElementById(`tdpaybtn_${phone}`);
  btn.disabled = true; btn.textContent = "…";
  try {
    const res = await fetch(APPS_SCRIPT_URL, {method:"POST",
      body:JSON.stringify({_action:"markCustomersPaid", pin:S.sessionPin,
        phones:[phone], dateFrom:from, dateTo:to,
        ...(newStatus==="Pending"&&{reverseToPending:true})})});
    // For "Pending" we use markOrdersStatus across the range instead
    if (newStatus==="Pending") {
      // Call markOrdersStatus for each date in range — simpler: reload
      await fetch(APPS_SCRIPT_URL, {method:"POST",
        body:JSON.stringify({_action:"markCustomersPaid", pin:S.sessionPin, phones:[phone], dateFrom:from, dateTo:to})});
    }
    toast(`${newStatus==="Paid"?"✅":"⏳"} ${newStatus}`);
    loadTenday();
  } catch(e) { toast("Error: "+e.message); btn.disabled=false; btn.textContent=currentStatus==="Paid"?"✓ Paid":"⏳ Pending"; }
}
function tendayShareWhatsApp() {
  if (!_tendayData) return;
  const fmtD = d => d?(p=>p[2]+"/"+p[1]+"/"+p[0])(d.split("-")):"—";

let _histView = "table"; // "table" | "list"

function histSetView(v) {

function histQuickRange(mode) {
  const now = getIST();
  const y = now.getFullYear(), mo = now.getMonth();
  let from, to = now;
  if      (mode === "today")     { from = now; }
  else if (mode === "week")      { const dow = now.getDay()||7; from = new Date(now); from.setDate(now.getDate()-(dow-1)); }
  else if (mode === "15days")    { from = new Date(now); from.setDate(now.getDate()-14); }
  else if (mode === "month")     { from = new Date(y, mo, 1); }
  else if (mode === "lastmonth") { from = new Date(y, mo-1, 1); to = new Date(y, mo, 0); }
  else if (mode === "year")      { from = new Date(y, 0, 1); }
  document.getElementById("histFrom").value = toISO(from);
  document.getElementById("histTo").value   = toISO(to);
  document.querySelectorAll("#pageHistory .range-chips .chip").forEach(c => c.classList.remove("active"));
  event.target.classList.add("active");
  loadHistory();
}
function histSetRange(daysBack) {
  const today = getIST();
  const from  = new Date(today); from.setDate(from.getDate() - daysBack);
  document.getElementById("histFrom").value = toISO(from);
  document.getElementById("histTo").value   = toISO(today);
  loadHistory();
}
function histSetPeriod(period) {
  const ist = getIST();
  const y = ist.getFullYear(), m = ist.getMonth();
  let from, to;
  if      (period==="1-10")   { from=new Date(y,m,1);  to=new Date(y,m,10); }
  else if (period==="11-20")  { from=new Date(y,m,11); to=new Date(y,m,20); }
  else                        { from=new Date(y,m,21); to=new Date(y,m+1,0); }
  document.getElementById("histFrom").value = toISO(from);
  document.getElementById("histTo").value   = toISO(to);
  loadHistory();
}
function histApplySortSel() {
  const val = document.getElementById("histSortSel")?.value || "date_asc";
  const parts = val.split("_");
  const dir = parts.pop();
  const col = parts.join("_");
  _histSort = { col, dir };
  renderHistTable();
}
function histApplyFilters() { renderHistTable(); }
function histResetFilters() {
  ["histMeal","histPayStatus","histPayMethod","histAreaSel"].forEach(id => { const el=document.getElementById(id); if(el) el.value=""; });
  const s = document.getElementById("histSearch"); if(s) s.value="";

  ["all","paid","pending"].forEach(id => document.getElementById("hf-"+id)?.classList.remove("sel"));

let _histAllOrders = [];
let _histSort = {col:'date', dir:'asc'};
let _histFilter = 'all';

async function loadHistory() {
  const from = document.getElementById("histFrom").value;

    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getOrderHistory&dateFrom=${from}&dateTo=${to}&pin=${S.sessionPin}&_t=${Date.now()}`);

    _histAllOrders = data.orders;

function setHistFilter(f) {
  _histFilter = f;
  ["all","paid","pending","tenday"].forEach(id => document.getElementById("hf-"+id)?.classList.remove("sel"));
  const map = {all:"hf-all", Paid:"hf-paid", Pending:"hf-pending"};
  document.getElementById(map[f] || "hf-all")?.classList.add("sel");
  renderHistTable();
}

function histSortBy(col) {
  if (_histSort.col === col) _histSort.dir = _histSort.dir==="asc" ? "desc" : "asc";
  else { _histSort.col = col; _histSort.dir = "asc"; }
  // Sync dropdown
  const sel = document.getElementById("histSortSel");
  const key = col === "amount" ? "amount" : col;
  const opt = `${key}_${_histSort.dir}`;
  if (sel && [...sel.options].some(o => o.value === opt)) sel.value = opt;
  renderHistTable();
}

function renderHistTable() {
  const el = document.getElementById("histTableWrap");
  // Apply all filters
  const statusChipFilter = _histFilter;
  const mealF    = document.getElementById("histMeal")?.value || "";
  const statusF  = document.getElementById("histPayStatus")?.value || "";
  const methodF  = document.getElementById("histPayMethod")?.value || "";
  const areaF    = document.getElementById("histAreaSel")?.value || "";
  const searchF  = (document.getElementById("histSearch")?.value || "").toLowerCase().trim();

  let list = _histAllOrders.filter(o => {
    if (statusChipFilter !== "all" && o.status !== statusChipFilter) return false;
    if (mealF   && o.meal   !== mealF)   return false;
    if (statusF && o.status !== statusF) return false;
    if (methodF && (o.payment_method||"") !== methodF) return false;
    if (areaF   && o.area   !== areaF)   return false;
    if (searchF && !o.name.toLowerCase().includes(searchF) && !String(o.phone).includes(searchF)) return false;
    return true;
  });

  // Apply sort
  const {col, dir} = _histSort;
  const mul = dir==="asc" ? 1 : -1;
  list.sort((a,b) => {
    if (col==="date")   return mul * a.date.localeCompare(b.date);
    if (col==="meal")   return mul * a.meal.localeCompare(b.meal);
    if (col==="name")   return mul * a.name.localeCompare(b.name);
    if (col==="area")   return mul * (a.area||"").localeCompare(b.area||"");
    if (col==="amount") return mul * (a.total - b.total);
    if (col==="status") return mul * a.status.localeCompare(b.status);
    return 0;
  });
  document.getElementById("histRowCount").textContent = `${list.length} order${list.length!==1?"s":""}`;
  if (!list.length) { el.innerHTML=`<div class="no-orders-msg">No orders match the current filters.</div>`; return; }

  if (_histView === "list") { el.innerHTML = renderHistList(list); return; }

  const fmtD = d => { const p=d.split("-"); return `${p[2]}/${p[1]}/${p[0]}`; };
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
  const mChip = m => { const c=m==="Breakfast"?"bf":m==="Lunch"?"ln":"dn"; return `<span class="meal-chip ${c}">${m}</span>`; };
  const pBadge = s => {
    if (s==="Paid" || s==="Wallet Paid") return `<span class="pay-badge paid">✓ Paid</span>`;
    return `<span class="pay-badge pending">⏳ Pending</span>`;
  };
  const th = (label, colKey, align="") => {
    const active = _histSort.col === colKey;
    const arrow  = active ? (_histSort.dir==="asc" ? "↑" : "↓") : "↕";
    const cls    = `sortable${active ? " sort-"+_histSort.dir : ""}`;
    return `<th class="${cls}" style="${align}" onclick="histSortBy('${colKey}')">${label} <span class="sort-arrow">${arrow}</span></th>`;
  };
  const rows = list.map(o => `<tr>
    <td style="white-space:nowrap;">${fmtD(o.date)}</td>
    <td>${mChip(o.meal)}</td>
    <td><strong>${o.name}</strong><br><span style="font-size:.7rem;color:var(--muted);">${o.phone}</span></td>
    <td><span class="area-chip">${o.area||'—'}</span></td>
    <td style="text-align:right;font-weight:700;white-space:nowrap;">${fmtM(o.total)}</td>
    <td>${pBadge(o.status)}</td>
    <td style="font-size:.72rem;color:var(--muted);">${o.payment_method||'UPI'}</td>
  </tr>`).join("");
  el.innerHTML = `<div class="hist-table-wrap"><table class="hist-table">
    <thead><tr>
      ${th("Date","date")}${th("Meal","meal")}${th("Customer","name")}${th("Area","area")}
      ${th("Amount","amount","text-align:right;")}${th("Status","status")}<th>Method</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderHistList(list) {
  const fmtD = d => { const p=d.split("-"); return `${p[2]}/${p[1]}/${p[0]}`; };
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
  const mColor = m => m==="Breakfast"?"#e67e22":m==="Lunch"?"#27ae60":"#8e44ad";
  const mIcon  = m => m==="Breakfast"?"🌅":m==="Lunch"?"☀️":"🌙";
  const pBg    = s => (s==="Paid"||s==="Wallet Paid") ? "#e8f5e9" : "#fff8ec";
  const pColor = s => (s==="Paid"||s==="Wallet Paid") ? "#27ae60" : "#e67e22";
  const pIcon  = s => (s==="Paid"||s==="Wallet Paid") ? "✓" : "⏳";
  const methodIcon = m => m==="Wallet"?"💳":m==="Split"?"🔀":m==="On Account"?"📋":"📲";

  const cards = list.map(o => {
    const itemsHtml = o.items && Object.keys(o.items).length
      ? Object.entries(o.items).filter(([,q])=>Number(q)>0)
          .map(([name,qty])=>`<span style="display:inline-flex;align-items:center;gap:3px;background:#f5f5f5;border-radius:20px;padding:2px 8px;font-size:.72rem;margin:2px;">${qty}× ${name}</span>`).join("")
      : `<span style="font-size:.72rem;color:var(--muted);">—</span>`;

    const notesHtml = o.notes ? `<div style="font-size:.72rem;color:#e67e22;margin-top:6px;padding:4px 8px;background:#fff8ec;border-radius:6px;border-left:3px solid #f39c12;">📝 ${o.notes}</div>` : "";

    return `<div style="background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,0.07);border-left:4px solid ${mColor(o.meal)};">
      <div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;">
        <!-- Left: meal + date -->
        <div style="flex-shrink:0;text-align:center;min-width:60px;">
          <div style="font-size:1.4rem;">${mIcon(o.meal)}</div>
          <div style="font-size:.65rem;font-weight:700;color:${mColor(o.meal)};text-transform:uppercase;">${o.meal}</div>
          <div style="font-size:.68rem;color:var(--muted);margin-top:2px;white-space:nowrap;">${fmtD(o.date)}</div>
        </div>
        <!-- Middle: customer + items -->
        <div style="flex:1;min-width:180px;">
          <div style="font-weight:800;font-size:.92rem;color:var(--fg);">${o.name}</div>
          <div style="font-size:.72rem;color:var(--muted);margin-bottom:6px;">${o.phone}${o.area?` · <span style="font-weight:600;color:#555;">${o.area}</span>`:''}${o.wing||o.flat?` · ${[o.wing,o.flat].filter(Boolean).join(' ')}`:''}</div>
          <div>${itemsHtml}</div>
          ${notesHtml}
        </div>
        <!-- Right: amount + status + method -->
        <div style="flex-shrink:0;text-align:right;">
          <div style="font-size:1.2rem;font-weight:900;color:var(--fg);">${fmtM(o.total)}</div>
          <div style="margin-top:4px;display:inline-block;background:${pBg(o.status)};color:${pColor(o.status)};border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:700;">${pIcon(o.status)} ${o.status}</div>
          <div style="font-size:.7rem;color:var(--muted);margin-top:4px;">${methodIcon(o.payment_method)} ${o.payment_method||'UPI'}</div>
          ${o.discount ? `<div style="font-size:.68rem;color:#27ae60;margin-top:2px;">−${fmtM(o.discount)} discount</div>` : ""}
          ${o.delivery ? `<div style="font-size:.68rem;color:var(--muted);">+${fmtM(o.delivery)} delivery</div>` : ""}
        </div>
      </div>
    </div>`;
  }).join("");

  return `<div style="margin-top:4px;">${cards}</div>`;
}

let _custData = [];

async function adminAddWalletCredit() {
  const phone  = document.getElementById("wcPhone").value.trim();
  const amount = parseFloat(document.getElementById("wcAmount").value);
  const status = document.getElementById("wcStatus");
  if (phone.length < 10) { status.innerHTML = `<span style="color:#dc2626;">⚠ Enter a valid 10-digit phone number.</span>`; return; }
  if (!amount || amount <= 0) { status.innerHTML = `<span style="color:#dc2626;">⚠ Enter a valid amount.</span>`; return; }
  status.innerHTML = `<span style="color:#166534;">Adding ₹${amount} to ${phone}…</span>`;
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify({ _action:"adminCreditWallet", phone, amount, pin: S.sessionPin }) });
    const data = await res.json();
    if (data.success) {
      status.innerHTML = `<span style="color:#16a34a;font-weight:700;">✅ ₹${amount} credited to ${phone}. New balance: ₹${data.newBalance}</span>`;
      document.getElementById("wcPhone").value  = "";
      document.getElementById("wcAmount").value = "";
    } else {
      status.innerHTML = `<span style="color:#dc2626;">❌ ${data.error || "Failed"}</span>`;
    }
  } catch(e) {
    status.innerHTML = `<span style="color:#dc2626;">❌ Network error: ${e.message}</span>`;
  }
}

async function loadCustomers() {
  const el = document.getElementById("custGridWrap");
  el.innerHTML = `<div style="text-align:center;padding:40px;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  document.getElementById("custDetailWrap").innerHTML = "";

  ["cpf-all","cpf-pending","cpf-paid"].forEach(id=>document.getElementById(id)?.classList.remove("sel"));
  document.getElementById("cpf-all")?.classList.add("sel");

function setCustPayFilter(f) {
  _custPayFilter = f;
  ["cpf-all","cpf-pending","cpf-paid"].forEach(id=>document.getElementById(id)?.classList.remove("sel"));
  document.getElementById(`cpf-${f}`)?.classList.add("sel");
  applyCustomerFilters();
}
function setCustSort(key) {
  _custSortKey = key;
  ["csort-recent","csort-name","csort-spent","csort-pending"].forEach(id=>document.getElementById(id)?.classList.remove("sel"));
  document.getElementById(`csort-${key}`)?.classList.add("sel");
  applyCustomerFilters();
}
function filterCustomers() { applyCustomerFilters(); }
function applyCustomerFilters() {
  const q = (document.getElementById("custSearch").value||"").toLowerCase().trim();
  let list = [..._custData];
  // Search
  if (q) list = list.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q));
  // Payment filter
  if (_custPayFilter==="pending") list = list.filter(c=>c.pendingAmt>0);
  else if (_custPayFilter==="paid") list = list.filter(c=>c.pendingAmt===0);
  // Sort
  if      (_custSortKey==="recent")  list.sort((a,b)=>b.lastDate.localeCompare(a.lastDate));
  else if (_custSortKey==="name")    list.sort((a,b)=>a.name.localeCompare(b.name));
  else if (_custSortKey==="spent")   list.sort((a,b)=>b.totalSpent-a.totalSpent);
  else if (_custSortKey==="pending") list.sort((a,b)=>b.pendingAmt-a.pendingAmt);
  renderCustomerGrid(list);
}
function renderCustomerGrid(list) {
  const el = document.getElementById("custGridWrap");
  const fmtD = d => d ? (p=>p[2]+"/"+p[1]+"/"+p[0])(d.split("-")) : "—";
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
  if (!list.length) { el.innerHTML=`<div class="no-orders-msg">No customers found.</div>`; return; }
  el.innerHTML = `<div class="cust-grid">${list.map(c=>`
    <div class="cust-card" onclick="loadCustomerDetail('${c.phone}')">
      <div class="cust-card-name">
        ${c.name} 
        ${c.Fee_Exempt === 'Yes' ? '<span class="vip-chip">🌟 VIP</span>' : ''}
        ${c.onAccount === 'Yes' ? '<span class="on-account-chip">💳 On Account</span>' : ''}
      </div>
      <div class="cust-card-phone">📱 ${c.phone} &nbsp;·&nbsp; <span class="area-chip" style="font-size:.68rem;">${c.area}</span></div>
      <div class="cust-card-meta">
        <div class="cust-card-stat"><strong>${c.orderCount}</strong> orders</div>
        <div class="cust-card-stat"><strong>${fmtM(c.totalSpent)}</strong> total</div>
        <div class="cust-card-stat">Last: <strong>${fmtD(c.lastDate)}</strong></div>
      </div>
      ${c.pendingAmt>0?`<div class="pending-tag">⏳ ${fmtM(c.pendingAmt)} pending</div>`:""}
    </div>`).join("")}</div>`;
}

}

          <button class="btn-primary" style="width:100%; padding:10px; background:var(--red); border-color:var(--red);" onclick="handleBulkOrderTrigger('${data.phone}', '${data.name.replace(/'/g, "\\'")}')">🚚 Place Bulk Orders</button>
          <div style="font-size:0.68rem; color:var(--muted); margin-top:10px; line-height:1.2;">
            Selected dates will be cross-referenced with your ticked favorites.
          </div>
        </div>
      </div>
    </div>
  `;

  window._bulkSelected = [];
  window.toggleBulkDate = (el, iso) => {
    const idx = window._bulkSelected.indexOf(iso);
    if (idx === -1) {
      window._bulkSelected.push(iso);
      el.classList.add('active');
    } else {
      window._bulkSelected.splice(idx, 1);
      el.classList.remove('active');
    }
  };

  function syncFavToggles(chk) {
    const meal = chk.dataset.meal;
    if (!chk.checked || meal === "Other") return;
    document.querySelectorAll(`.fav-bulk-check[data-meal="${meal}"]`).forEach(c => {
      if (c !== chk) c.checked = false;
    });
  }

  async function handleBulkOrderTrigger(phone, name) {
    const selectedDates = [...document.querySelectorAll(".cal-day.active")].map(d => d.dataset.date);
    if (!selectedDates.length) { toast("Please select at least one date on the calendar."); return; }
    const selectedFavs = [...document.querySelectorAll(".fav-bulk-check:checked")];
    if (!selectedFavs.length) { toast("Please select at least one favorite template (tick the boxes)."); return; }
    const counts = { Breakfast: 0, Lunch: 0, Dinner: 0, Other: 0 };
    selectedFavs.forEach(f => counts[f.dataset.meal]++);
    if (counts.Breakfast > 1 || counts.Lunch > 1 || counts.Dinner > 1) {
      toast("Error: Maximum one favorite per meal type (Breakfast/Lunch/Dinner) allowed.");
      return;
    }
    if (!(await showUIConfirm(`Place orders for ${selectedDates.length} days using ${selectedFavs.length} template(s)?`, "Confirm Bulk Order", "🚚"))) return;
    sLoading(true, `Placing orders for ${selectedDates.length} days...`);
    try {
      const templates = selectedFavs.map(chk => ({ name: chk.value, items: JSON.parse(chk.dataset.raw), meal: chk.dataset.meal }));
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ _action: "placeBulkOrders", pin: S.sessionPin, phone, name, templates, dates: selectedDates })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      toast(`✅ Successfully placed ${data.count} orders!`);
      loadCustomerDetail(phone);
    } catch(e) {
      toast("Error: " + e.message);
    } finally {
      sLoading(false);
    }
  }

  return `<div class="cust-detail-wrap">
    <div class="cust-detail-head">
      <div>
        <div class="cust-detail-title">${data.name}</div>
        <div style="font-size:.75rem; color:var(--muted); margin-top:2px;">📱 ${data.phone} &nbsp;·&nbsp; ${data.area} &nbsp;·&nbsp; ${data.orderCount} orders</div>
      </div>
      <div style="display:flex; gap:14px; align-items:center;">
        <div style="text-align:right;">
          <div style="font-size:1.05rem; font-weight:700;">${fmtM(data.totalSpent)} total</div>
          <div style="font-size:.8rem; margin-top:2px;">
            ${data.pending>0?`<span style="color:var(--gold);">⏳ ${fmtM(data.pending)} pending</span>`:`<span style="color:var(--green);">✓ Fully paid</span>`}
          </div>
        </div>
        <button class="cust-detail-close" onclick="document.getElementById('custDetailWrap').innerHTML=''" title="Close">✕</button>
      </div>
    </div>
    
    <div style="background:var(--bg2); padding:12px 16px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border);">
       <div>
         <div style="font-size:.65rem; color:var(--muted); font-weight:700; text-transform:uppercase; margin-bottom:4px;">VIP Exemption Status</div>
         <div style="font-size:.9rem; font-weight:700;">
           ${data.Fee_Exempt === 'Yes' ? '<span style="color:var(--green);">🌟 VIP - Free Delivery & No Small Fee</span>' : '<span style="color:var(--muted);">Standard - Normal Charges Apply</span>'}
         </div>
       </div>
       <button class="btn-set-fav" style="padding:8px 16px; font-weight:700; border-color:${data.Fee_Exempt === 'Yes' ? 'var(--red-border)' : 'var(--gold)'}; color:${data.Fee_Exempt === 'Yes' ? 'var(--red)' : 'var(--gold)'};" 
         onclick="toggleVIP('${data.phone}', ${data.Fee_Exempt !== 'Yes'})">
         ${data.Fee_Exempt === 'Yes' ? 'Remove VIP Status' : '🌟 Make VIP (Fee Exempt)'}
       </button>
    </div>
    
    <div style="background:#eef4fd; padding:12px 16px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; border:1px solid #90caf9;">
       <div>
         <div style="font-size:.65rem; color:#5c6bc0; font-weight:700; text-transform:uppercase; margin-bottom:4px;">On Account Authorization</div>
         <div style="font-size:.9rem; font-weight:700;">
           ${data.On_Account === 'Yes' ? `<span style="color:#0d47a1;">💳 Authorized (${data.Billing_Cycle || 'Daily'})</span>` : '<span style="color:var(--muted);">Unauthorized</span>'}
         </div>
       </div>
       <button class="btn-set-fav" style="padding:8px 16px; font-weight:700; border-color:${data.On_Account === 'Yes' ? 'var(--red-border)' : '#1e5fa8'}; color:${data.On_Account === 'Yes' ? 'var(--red)' : '#1e5fa8'};" 
         onclick="toggleOnAccount('${data.phone}', ${data.On_Account !== 'Yes'})">
         ${data.On_Account === 'Yes' ? 'Remove On Account' : '💳 Authorize On Account'}
       </button>
    </div>
    
    ${stdOrderHtml}
    ${bulkTool}

    <div style="font-size:0.75rem; font-weight:700; text-transform:uppercase; color:var(--muted); margin: 30px 0 10px;">📜 Order History</div>

      <table class="hist-table">
        <thead><tr><th>Date</th><th>Meal</th><th>Items</th><th style="text-align:right;">Amount</th><th>Status</th><th style="text-align:right;">Fav</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
  </div>`;
}

let _payDate = "";
async function loadPayments() {
  const date = document.getElementById("payDate").value;
  if (!date) { toast("Pick a date first"); return; }
  _payDate = date;
  const el = document.getElementById("payContent");
  el.innerHTML = `<div style="text-align:center;padding:40px;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getDatePayments&date=${date}&pin=${S.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    el.innerHTML = renderPayments(data);
  } catch(e) {
    el.innerHTML = `<p style="color:#c0392b;text-align:center;padding:30px;">Error: ${e.message}</p>`;
  }
}
function renderPayments(data) {
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
  const fmtD = d => { const p=d.split("-"); return `${p[2]}/${p[1]}/${p[0]}`; };
  if (!data.customers.length) return `<div class="no-orders-msg">😴 No orders found for ${fmtD(data.date)}</div>`;
  const summary = `<div class="pay-summary-strip">
    <div class="pay-sum-card"><div class="sv">${fmtM(data.grandTotal)}</div><div class="sl">Total</div></div>
    <div class="pay-sum-card" style="border-color:var(--green-border);"><div class="sv" style="color:var(--green);">${fmtM(data.grandPaid)}</div><div class="sl">Collected</div></div>
    <div class="pay-sum-card" style="border-color:var(--gold-border);"><div class="sv" style="color:var(--gold);">${fmtM(data.grandPending)}</div><div class="sl">Pending</div></div>
    <div class="pay-sum-card"><div class="sv">${data.customers.length}</div><div class="sl">Customers</div></div>
  </div>`;
  const rows = data.customers.map(c => {
    const isPaid = isPaidStatus(c.status);
    return `<tr id="payrow_${c.phone}">
      <td><strong>${c.name}</strong><br><span style="font-size:.7rem;color:var(--muted);">${c.phone}</span></td>
      <td style="font-size:.8rem;">${c.meals.join(", ")}</td>
      <td style="text-align:right;font-weight:700;">${fmtM(c.total)}</td>
      <td style="text-align:center;">${c.daily?'<span style="color:var(--green);font-weight:700;font-size:.9rem;">✓</span>':'<span style="color:var(--muted);">—</span>'}</td>
      <td><button class="pay-toggle ${isPaid?"paid":"pending"}" id="paybtn_${c.phone}"
          onclick="togglePayment('${c.phone}','${c.status}')">${isPaid?"✓ Paid":"⏳ Pending"}</button></td>
    </tr>`;
  }).join("");
  const tfoot = `<tr><td colspan="2" style="font-size:.8rem;color:var(--muted);">Total — ${data.customers.length} customers</td>
    <td style="text-align:right;">${fmtM(data.grandTotal)}</td><td></td><td></td></tr>`;
  return summary + `<div class="pay-table-wrap"><table class="pay-table">
    <thead><tr><th>Customer</th><th>Meals</th><th style="text-align:right;">Amount</th><th style="text-align:center;">Daily?</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody><tfoot>${tfoot}</tfoot>
  </table></div>`;
}
async function togglePayment(phone, currentStatus) {
  const newStatus = currentStatus==="Paid" ? "Pending" : "Paid";
  const btn = document.getElementById(`paybtn_${phone}`);
  btn.disabled = true; btn.textContent = "…";
  try {
    const res  = await fetch(APPS_SCRIPT_URL, {method:"POST",
      body: JSON.stringify({_action:"markOrdersStatus",pin:S.sessionPin,date:_payDate,phone,status:newStatus})});
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    btn.className = `pay-toggle ${newStatus==="Paid"?"paid":"pending"}`;
    btn.textContent = newStatus==="Paid" ? "✓ Paid" : "⏳ Pending";
    btn.onclick = () => togglePayment(phone, newStatus);
    toast(`${newStatus==="Paid"?"✅":"⏳"} Marked ${newStatus}`);
  } catch(e) { 
    toast("Error: "+e.message); 
    btn.textContent = currentStatus==="Paid"?"✓ Paid":"⏳ Pending"; 
  }
  btn.disabled = false;
}
async function markAllPaid() {
  if (!_payDate) { toast("Load a date first"); return; }
  const pendingBtns = [...document.querySelectorAll(".pay-toggle.pending")];
  if (!pendingBtns.length) { toast("All customers already paid! ✅"); return; }
  if (!(await showUIConfirm(`Mark all ${pendingBtns.length} pending customer(s) as Paid?`, "Bulk Action", "⚡"))) return;
  const phones = pendingBtns.map(b => b.id.replace("paybtn_",""));
  sLoading(true, "Updating records...");
  try {
    await Promise.all(phones.map(ph => fetch(APPS_SCRIPT_URL, {method:"POST",
      body:JSON.stringify({_action:"markOrdersStatus",pin:S.sessionPin,date:_payDate,phone:ph,status:"Paid"})}).then(r=>r.json())));
    sLoading(false);
    toast(`✅ ${phones.length} customer(s) marked as Paid`);
    loadPayments();
  } catch(e) { 
    sLoading(false);
    toast("Error: "+e.message); 
  }
}

let _currentBillingCycle = 'Daily';

function switchBillingTab(cycle) {
  _currentBillingCycle = cycle;
  ['Daily','Weekly','Monthly'].forEach(c => {
    const el = document.getElementById(`billingTab${c}`);
    if (el) el.classList.toggle('active', c === cycle);
    const filter = document.getElementById(`bf_${c}`);
    if (filter) filter.style.display = (c === cycle) ? 'block' : 'none';
  });
  loadBillingTab(cycle);
}

async function loadBillingTab(cycle) {
  const content = document.getElementById('billingContent');
  const label   = document.getElementById('billingPeriodLabel');
  
  let filterValue = '';
  if (cycle === 'Daily') filterValue = $('bf_daily_date').value;
  else if (cycle === 'Weekly') filterValue = $('bf_weekly_date').value;
  else if (cycle === 'Monthly') filterValue = $('bf_monthly_select').value;

  content.innerHTML = `<div style="text-align:center;padding:32px;"><div class="spinner"></div><p style="font-size:.78rem;color:#888;margin-top:8px;">Loading ${cycle} billing data…</p></div>`;
  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ _action: 'getBillingData', pin: S.sessionPin, cycle, filterValue })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Unknown error');
    const fmtDate = d => d ? d.split('-').reverse().join(' / ') : '';
    if (cycle === 'Daily') {
      label.textContent = `📅 Date: ${fmtDate(data.from)}`;
    } else if (cycle === 'Weekly') {
      label.textContent = `📆 Week (Mon-Sat): ${fmtDate(data.from)} — ${fmtDate(data.to)}`;
    } else {
      label.textContent = `🗓️ Month: ${fmtDate(data.from)} — ${fmtDate(data.to)}`;
    }
    content.innerHTML = renderBillingCards(data.customers, cycle);
  } catch(e) {
    content.innerHTML = `<p style="color:#c0392b;padding:16px;">Error: ${e.message}</p>`;
  }
}

function _parseItems(jsonStr) {
  try {
    const obj = JSON.parse(jsonStr);
    return Object.entries(obj).filter(([,q])=>Number(q)>0)
      .map(([k,q])=>`${q}× ${colKeyToDisplayName(k)}`).join(', ') || '—';
  } catch(e) { return jsonStr || '—'; }
}

function renderBillingCards(customers, cycle) {
  if (!customers || !customers.length) {
    return `<p class="billing-empty">✅ No outstanding On Account orders for ${cycle} billing.</p>`;
  }
  const mealIcon = m => m==='Breakfast'?'🍳':m==='Lunch'?'🍱':'🍽️';
  const fmtDate  = d => d ? d.split('-').reverse().join('/') : '';
  return customers.map(c => {
    // Sort orders by date
    const orders = [...c.orders].sort((a,b)=>a.date.localeCompare(b.date));
    const allSids = orders.map(o=>o.sid);

    const rows = orders.map(o => {
      const chkbox = cycle === 'Daily'
        ? `<input type="checkbox" class="billing-chk" data-sid="${o.sid}" data-phone="${c.phone}" style="width:14px;height:14px;cursor:pointer;">`
        : '';
      return `<tr>
        <td>${chkbox}</td>
        <td style="white-space:nowrap;">${fmtDate(o.date)}</td>
        <td>${mealIcon(o.meal)} ${o.meal}</td>
        <td style="font-size:.76rem;max-width:200px;">${_parseItems(o.items)}</td>
        <td style="text-align:right;font-weight:700;">₹${o.net}</td>
      </tr>`;
    }).join('');

    const addrParts = [c.wing && `Wing ${c.wing}`, c.flat && `Flat ${c.flat}`, c.floor && `${c.floor} Floor`, c.society, c.area].filter(Boolean).join(', ');

    const bulkBtn = cycle !== 'Daily'
      ? `<button class="btn-mark-collected" onclick="markBillingPaidJS(${JSON.stringify(allSids).replace(/"/g,'&quot;')},'${c.phone}')">✅ Mark All Paid</button>`
      : `<button class="btn-mark-collected" onclick="markSelectedPaid('${c.phone}')">✅ Mark Selected Paid</button>`;

    return `<div class="billing-cust-card" id="billingCard_${c.phone.replace(/\D/g,'')}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:4px;">
        <div>
          <div class="billing-cust-name">${c.name}</div>
          <div class="billing-cust-meta">📞 ${c.phone} &nbsp;|&nbsp; ${addrParts || '—'} &nbsp;|&nbsp; ${c.billing_cycle} billing</div>
        </div>
        <div style="font-size:1.2rem;font-weight:800;color:var(--red);">₹${c.total.toFixed(2)}</div>
      </div>
      <table class="billing-order-table">
        <thead><tr><th style="width:28px;"></th><th>Date</th><th>Meal</th><th>Items</th><th style="text-align:right;">Amount</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="billing-total-row"><td colspan="4">Total Due</td><td style="text-align:right;">₹${c.total.toFixed(2)}</td></tr></tfoot>
      </table>
      <div class="billing-actions">
        <button class="btn-gen-pdf" onclick="generateBillPDF(${JSON.stringify(c).replace(/"/g,'&quot;')})">📄 Generate PDF Bill</button>
        ${bulkBtn}
      </div>
    </div>`;
  }).join('');
}

async function markBillingPaidJS(sids, phone) {
  if (!sids || !sids.length) { toast('No orders selected.'); return; }
  const ok = await sConfirm(`Mark ${sids.length} order(s) as Paid?`, 'Confirm Payment', '✅');
  if (!ok) return;
  sLoading(true, 'Updating payment status…');
  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ _action: 'markBillingCollected', pin: S.sessionPin, submissionIds: sids })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    // Show toast with 8-second undo window
    _toastWithUndo(`✅ ${data.count} order(s) marked as Paid`, sids, _currentBillingCycle);
    loadBillingTab(_currentBillingCycle);
  } catch(e) {
    toast('Error: ' + e.message);
  } finally {
    sLoading(false);
  }
}

// ── MARK PAID UNDO ────────────────────────────────────────────
let _undoTimer = null;
function _toastWithUndo(msg, sids, cycle) {
  if (_undoTimer) clearTimeout(_undoTimer);
  const toastEl = document.getElementById("toast");
  if (!toastEl) { toast(msg); return; }
  toastEl.innerHTML = `${msg} &nbsp;
    <button onclick="_undoMarkPaid(${JSON.stringify(sids).replace(/"/g,"'")},'${cycle}')"
      style="margin-left:10px;background:#fff;color:#c0392b;border:1.5px solid #c0392b;border-radius:6px;padding:2px 8px;font-size:0.72rem;font-weight:700;cursor:pointer;">Undo</button>`;
  toastEl.classList.add("show");
  _undoTimer = setTimeout(() => { toastEl.classList.remove("show"); toastEl.innerHTML = ""; }, 8000);
}
async function _undoMarkPaid(sids, cycle) {
  if (_undoTimer) { clearTimeout(_undoTimer); _undoTimer = null; }
  const toastEl = document.getElementById("toast");
  if (toastEl) { toastEl.classList.remove("show"); toastEl.innerHTML = ""; }
  sLoading(true, 'Undoing…');
  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ _action: 'undoMarkPaid', pin: S.sessionPin, submissionIds: sids })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Undo failed');
    toast('↩ Mark Paid reversed — orders set back to Pending');
    loadBillingTab(cycle);
  } catch(e) {
    toast('Undo error: ' + e.message);
  } finally { sLoading(false); }
}

async function markSelectedPaid(phone) {
  const checked = [...document.querySelectorAll(`.billing-chk[data-phone="${phone}"]:checked`)];
  if (!checked.length) { toast('Please tick at least one order.'); return; }
  const sids = checked.map(el => el.dataset.sid);
  await markBillingPaidJS(sids, phone);
}

function generateBillPDF(cust) {
  const mealIcon = m => m==='Breakfast'?'🍳':m==='Lunch'?'🍱':'🍽️';
  const fmtDate  = d => d ? d.split('-').reverse().join(' Apr '.includes(d) ? ' ' : '/') : '';
  const fmtDateFull = d => {
    if (!d) return '';
    const [y,m,day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
  };
  const orders = [...cust.orders].sort((a,b)=>a.date.localeCompare(b.date));
  const addrParts = [cust.wing&&`Wing ${cust.wing}`,cust.flat&&`Flat ${cust.flat}`,cust.floor&&`${cust.floor} Floor`,cust.society,cust.area].filter(Boolean).join(', ');
  const cycleLabel = cust.billing_cycle === 'Daily'
    ? `Daily Bill — ${fmtDateFull(cust.from)}`
    : cust.billing_cycle === 'Weekly'
    ? `Weekly Bill — ${fmtDateFull(cust.from)} to ${fmtDateFull(cust.to)}`
    : `Monthly Bill — ${fmtDateFull(cust.from)} to ${fmtDateFull(cust.to)}`;

  const orderRows = orders.map(o => `
    <tr>
      <td style="padding:8px 10px;border-bottom:1px solid #eee;white-space:nowrap;color:#555;">${fmtDateFull(o.date)}</td>
      <td style="padding:8px 10px;border-bottom:1px solid #eee;">${mealIcon(o.meal)} ${o.meal}</td>
      <td style="padding:8px 10px;border-bottom:1px solid #eee;font-size:.8rem;color:#555;">${_parseItems(o.items)}</td>
      <td style="padding:8px 10px;border-bottom:1px solid #eee;text-align:right;font-weight:600;">₹${o.net}</td>
    </tr>`).join('');

  // Build filename: CustomerName_DD-Mon_to_DD-Mon_SvaadhBill
  const _firstName = (cust.name || "Customer").trim().split(" ")[0];
  const _sortedOrders = [...orders];
  const _fmtFN = d => { if (!d) return ''; const [y,m,day]=d.split('-'); const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${parseInt(day)}-${mo[parseInt(m)-1]}`; };
  const _fnFrom = _sortedOrders.length ? _fmtFN(_sortedOrders[0].date) : '';
  const _fnTo   = _sortedOrders.length > 1 ? _fmtFN(_sortedOrders[_sortedOrders.length-1].date) : '';
  const _period = _fnTo && _fnTo !== _fnFrom ? `${_fnFrom}_to_${_fnTo}` : _fnFrom;
  const _pdfTitle = `${_firstName}_${_period}_SvaadhBill`;

  const billHTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${_pdfTitle}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

function switchApprovalTab(tab) {

  document.querySelectorAll(".approvals-tab").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".approval-panel").forEach(el=>el.classList.remove("active"));
  
  if (tab === "refunds") {

  } else if (tab === "payments") {
