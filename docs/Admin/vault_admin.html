  Dal:"दाल", Rice:"भात", Salad:"स", Curd:"दही",
  "Kanda Poha":"कांपो", "Ghee Upma":"घीऊ", "Thalipeeth":"था",
  "Paneer Paratha":"पनपरा", "Methi Thepla":"मेथी", "Sabudana Khichdi":"साबु",
};
const LD_COLS = ["Chapati","Without_Oil_Chapati","Phulka","Ghee_Phulka","Jowar_Bhakri","Bajra_Bhakri",
                 "Dry_Sabji_Mini","Dry_Sabji_Full","Curry_Sabji_Mini","Curry_Sabji_Full","Dal","Rice","Salad","Curd"];

function getItemSummary(order, meal, lang) {
  const lbl = lang === "Devanagari" ? LABEL_MR : LABEL_EN;
  const parts = [];
  if (meal === "Breakfast") {
    for (let n = 1; n <= 4; n++) {
      const item = order["BF_Item_"+n], qty = Number(order["BF_Qty_"+n]) || 0;
      if (item && qty > 0) {
        // look up by name or name-with-underscores
        const a = lbl[item] || lbl[item.replace(/ /g,"_")] || item;
        parts.push(qty + "x" + a);
      }
    }
    const curdQty = Number(order.Curd) || 0;
    if (curdQty > 0) parts.push(curdQty + "x" + lbl.Curd);
  } else {
    LD_COLS.forEach(col => {
      const q = Number(order[col]) || 0;
      if (q > 0) parts.push(q + "x" + (lbl[col] || col));
    });
  }
  return parts.join(", ");
}

function renderLabelPreview(orders, meal, lang, date) {

function wrapTextCanvas(ctx, text, x, y, maxW, lineH) {
  const words = text.split(" ");
  let line = "";
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + " ";
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line.trim(), x, y);
      line = words[i] + " ";
      y += lineH;
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(), x, y);
}

async function saveLabelsToDrive() {
  const date = document.getElementById("labelDate").value;
  const meal = document.getElementById("labelMeal").value;
  const lang = document.getElementById("labelLang").value;
  const btn  = document.getElementById("downloadLabelBtn");

  if (!labelOrders.length) { showToast("Generate labels first"); return; }

  btn.disabled    = true;
  btn.textContent = "⏳ Generating PDF…";

  // Load jsPDF if not already loaded
  if (!window.jspdf) {
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  try {
    const { jsPDF } = window.jspdf;
    const W   = 50;            // label width mm
    const LH  = 25;            // label height mm
    const customGap = parseFloat(document.getElementById('labelGap').value) || 2.7;
    const GAP = customGap;     // dynamic gap between labels mm
    const isTest = document.getElementById('labelMode').value === "Test";
    
    // Test mode: print top 5 labels
    const currentLabels = isTest ? labelOrders.slice(0, 5) : labelOrders;
    
    const BLOCK = LH + GAP;    
    const n     = currentLabels.length;
    const totalH = n * BLOCK;  // single tall page — all labels stacked
    const isMR   = lang === "Devanagari";
    const TW = W - 4, LM = 2;  // 46mm text width, 2mm left margin

    // Single page, portrait for tall stacks
    const orient = totalH >= W ? "portrait" : "landscape";
    const doc = new jsPDF({ unit:"mm", format:[W, totalH], orientation: orient });

    if (!isMR) {
      // ── English: jsPDF native text per label block ──
      currentLabels.forEach((order, idx) => {
        const BY = idx * BLOCK;   // block top y
        const summary = getItemSummary(order, meal, lang);

        // Name (bold)
        doc.setFont("helvetica", "bold");
        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0);
        const nameLines = doc.splitTextToSize("Name: " + order.name, TW);
        let y = BY + 7;
        doc.text(nameLines, LM, y);
        y += nameLines.length * 5 + 1.5;

        // Summary
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        const sumLines = doc.splitTextToSize(summary, TW);
        doc.text(sumLines, LM, y);
        y += sumLines.length * 4 + 1;

        // Notes
        if (order.notes) {
          doc.setFontSize(8);
          doc.setTextColor(184, 96, 0);
          doc.text("* " + order.notes, LM, Math.min(y, BY + LH - 2));
          doc.setTextColor(0, 0, 0);
        }

        // Separator line in the gap (not after last label)
        if (idx < n - 1) {
          doc.setDrawColor(0, 0, 0);
          doc.setLineWidth(0.2);
          doc.line(1, BY + LH + GAP / 2, W - 1, BY + LH + GAP / 2);
        }
      });

    } else {
      // ── Devanagari: single tall canvas, all labels drawn into it ──
      const SCALE = 10;
      const PW = Math.round(W * SCALE);
      const PH = Math.round(totalH * SCALE);
      const mm = v => Math.round(v * SCALE);
      const maxW = mm(TW);
      const devFont = "'Hind','Noto Sans Devanagari',sans-serif";

      const cv = document.createElement("canvas");
      cv.width = PW; cv.height = PH;
      const ctx = cv.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, PW, PH);

      function cvWrap(text, bold, fSize, x, startY, lH) {
        ctx.font = (bold ? "bold " : "") + `${fSize}px ${devFont}`;
        const words = text.split(" ");
        let line = "", cy = startY;
        for (const w of words) {
          const test = line ? line + " " + w : w;
          if (ctx.measureText(test).width > maxW && line) {
            ctx.fillText(line, x, cy); cy += lH; line = w;
          } else line = test;
        }
        if (line) { ctx.fillText(line, x, cy); cy += lH; }
        return cy;
      }

      currentLabels.forEach((order, idx) => {
        const BY = mm(idx * BLOCK);
        const summary = getItemSummary(order, meal, lang);

        // Name
        ctx.fillStyle = "#000";
        let y = cvWrap("Name: " + order.name, true, mm(3.0), mm(LM), BY + mm(5.5), mm(4.2));
        y += mm(1);

        // Summary
        ctx.fillStyle = "#222";
        y = cvWrap(summary, false, mm(2.6), mm(LM), y, mm(3.6));

        // Notes
        if (order.notes) {
          ctx.fillStyle = "#b86000";
          ctx.font = `${mm(2.2)}px ${devFont}`;
          ctx.fillText("* " + order.notes, mm(LM), Math.min(y, BY + mm(LH - 2)));
        }

        // Separator line
        if (idx < n - 1) {
          const lineY = BY + mm(LH) + mm(GAP / 2);
          ctx.strokeStyle = "#000";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(mm(1), lineY);
          ctx.lineTo(PW - mm(1), lineY);
          ctx.stroke();
        }
      });

      doc.addImage(cv.toDataURL("image/png"), "PNG", 0, 0, W, totalH);
    }

    btn.textContent = "⏳ Saving to Drive…";

    const pdfB64 = doc.output("datauristring").split(",")[1];
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ _action:"saveLabels", pin:S.sessionPin, date, meal, lang, pdf:pdfB64 })
    });
    const data = await res.json();

    if (data.url) {
      btn.innerHTML = `<a href="${data.url}" target="_blank" style="color:#fff;text-decoration:none;">✅ Saved — Open in Drive (${data.name})</a>`;
      btn.disabled = false;
    } else {
      showToast("Error: " + (data.error || "Unknown error"));
      btn.textContent = "💾 Save to Drive";
      btn.disabled = false;
    }
  } catch(e) {
    showToast("PDF error: " + e.message);
    btn.textContent = "💾 Save to Drive";
    btn.disabled = false;
  }
}

  const fmtD = d => d?(p=>p[2]+"/"+p[1]+"/"+p[0])(d.split("-")):"—";
  if (!data.customers.length) return `<div class="no-orders-msg">😴 No orders for this period.</div>`;

  const summary = `<div class="pay-summary-strip">
    <div class="pay-sum-card"><div class="sv">${fmtM(data.grandTotal)}</div><div class="sl">Total Billed</div></div>
    <div class="pay-sum-card" style="border-color:var(--green-border);"><div class="sv" style="color:var(--green);">${fmtM(data.grandPaid)}</div><div class="sl">Collected</div></div>
    <div class="pay-sum-card" style="border-color:var(--gold-border);"><div class="sv" style="color:var(--gold);">${fmtM(data.grandPending)}</div><div class="sl">Outstanding</div></div>
    <div class="pay-sum-card"><div class="sv">${data.customers.length}</div><div class="sl">Customers</div></div>
  </div>`;

  const rows = data.customers.map(c => {
    const isPaid = c.status==="Paid";
    return `<tr>
      <td><strong>${c.name}</strong><br><span style="font-size:.7rem;color:var(--muted);">${c.phone}</span></td>
      <td style="text-align:center;">${c.orders}</td>
      <td style="text-align:right;">${fmtM(c.total)}</td>
      <td style="text-align:right;color:var(--green);font-weight:600;">${fmtM(c.paid)}</td>
      <td style="text-align:right;color:var(--gold);font-weight:700;">${c.pending>0?fmtM(c.pending):"—"}</td>
      <td><button class="pay-toggle ${isPaid?"paid":"pending"}" id="tdpaybtn_${c.phone}"
          onclick="tendayToggle('${c.phone}','${c.status}')">${isPaid?"✓ Paid":"⏳ Pending"}</button></td>
    </tr>`;
  }).join("");

  const tfoot = `<tr>
    <td>Total (${data.customers.length} customers)</td>
    <td></td>
    <td style="text-align:right;">${fmtM(data.grandTotal)}</td>
    <td style="text-align:right;color:var(--green);">${fmtM(data.grandPaid)}</td>
    <td style="text-align:right;color:var(--gold);font-weight:700;">${fmtM(data.grandPending)}</td>
    <td></td>
  </tr>`;

  return summary + `<div class="billing-table-wrap"><table class="billing-table">
    <thead><tr><th>Customer</th><th style="text-align:center;">Orders</th><th style="text-align:right;">Total</th><th style="text-align:right;">Paid</th><th style="text-align:right;">Due</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody><tfoot>${tfoot}</tfoot>
  </table></div>`;
}
async function tendayToggle(phone, currentStatus) {
  const from = document.getElementById("tendayFrom").value;
  const to   = document.getElementById("tendayTo").value;
  const newStatus = currentStatus==="Paid" ? "Pending" : "Paid";
  const btn = document.getElementById(`tdpaybtn_${phone}`);
  btn.disabled = true; btn.textContent = "…";
  try {
    const res = await fetch(APPS_SCRIPT_URL, {method:"POST",
      body:JSON.stringify({_action:"markCustomersPaid", pin:S.sessionPin,
        phones:[phone], dateFrom:from, dateTo:to,
        ...(newStatus==="Pending"&&{reverseToPending:true})})});
    // For "Pending" we use markOrdersStatus across the range instead
    if (newStatus==="Pending") {
      // Call markOrdersStatus for each date in range — simpler: reload
      await fetch(APPS_SCRIPT_URL, {method:"POST",
        body:JSON.stringify({_action:"markCustomersPaid", pin:S.sessionPin, phones:[phone], dateFrom:from, dateTo:to})});
    }
    toast(`${newStatus==="Paid"?"✅":"⏳"} ${newStatus}`);
    loadTenday();
  } catch(e) { toast("Error: "+e.message); btn.disabled=false; btn.textContent=currentStatus==="Paid"?"✓ Paid":"⏳ Pending"; }
}
function tendayShareWhatsApp() {
  if (!_tendayData) return;
  const fmtD = d => d?(p=>p[2]+"/"+p[1]+"/"+p[0])(d.split("-")):"—";
  const from = fmtD(document.getElementById("tendayFrom").value);
  const to   = fmtD(document.getElementById("tendayTo").value);
  const pending = _tendayData.customers.filter(c=>c.pending>0);
  if (!pending.length) { toast("No pending amounts to share!"); return; }
  let msg = `*Svaadh Kitchen — Bill Summary*\n📅 ${from} to ${to}\n\n`;
  pending.forEach(c => { msg += `• ${c.name}: ₹${c.pending} pending\n`; });
  msg += `\n*Total Outstanding: ₹${_tendayData.grandPending}*\n\nPlease settle at your earliest convenience 🙏\nUPI: 9819969682@hdfc`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
}

function histSetRange(daysBack) {
  const today = getIST();
  const from  = new Date(today); from.setDate(from.getDate() - daysBack);
  document.getElementById("histFrom").value = toISO(from);
  document.getElementById("histTo").value   = toISO(today);
  loadHistory();
}
function histSetPeriod(period) {
  const ist = getIST();
  const y = ist.getFullYear(), m = ist.getMonth();
  let from, to;
  if      (period==="1-10")   { from=new Date(y,m,1);  to=new Date(y,m,10); }
  else if (period==="11-20")  { from=new Date(y,m,11); to=new Date(y,m,20); }
  else                        { from=new Date(y,m,21); to=new Date(y,m+1,0); }
  document.getElementById("histFrom").value = toISO(from);
  document.getElementById("histTo").value   = toISO(to);
  loadHistory();
}
let _histAllOrders = [];
let _histSort = {col:'date', dir:'asc'};
let _histFilter = 'all';

async function loadHistory() {
  const from = document.getElementById("histFrom").value;
  const to   = document.getElementById("histTo").value;
  if (!from || !to) { toast("Pick a date range first"); return; }
  const statsEl = document.getElementById("histStats");
  const ctrlEl  = document.getElementById("histTableControls");
  const tableEl = document.getElementById("histTableWrap");
  statsEl.innerHTML = `<div style="text-align:center;padding:40px;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  ctrlEl.style.display = "none";
  tableEl.innerHTML = "";
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getOrderHistory&dateFrom=${from}&dateTo=${to}&pin=${S.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    // Pre-apply meal filter from dropdown (still reduces dataset)
    const meal = document.getElementById("histMeal").value;
    _histAllOrders = meal ? data.orders.filter(o=>o.meal===meal) : data.orders;
    _histFilter = "all";
    _histSort   = {col:"date", dir:"asc"};
    // Reset status chips
    ["all","paid","pending","tenday"].forEach(id => document.getElementById("hf-"+id)?.classList.remove("sel"));
    document.getElementById("hf-all")?.classList.add("sel");
    // Render stats (based on all loaded orders)
    const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
    const s = data.summary;
    statsEl.innerHTML = `<div class="stat-grid" style="margin-bottom:16px;">
      <div class="stat-card"><div class="sv">${s.orderCount}</div><div class="sl">Orders</div></div>
      <div class="stat-card"><div class="sv">${s.uniqueCustomers}</div><div class="sl">Customers</div></div>
      <div class="stat-card green"><div class="sv">${fmtM(s.totalRevenue)}</div><div class="sl">Revenue</div></div>
      <div class="stat-card green"><div class="sv">${fmtM(s.totalPaid)}</div><div class="sl">Paid</div></div>
      <div class="stat-card orange"><div class="sv">${fmtM(s.totalPending)}</div><div class="sl">Pending</div></div>
    </div>`;
    ctrlEl.style.display = "block";
    renderHistTable();
  } catch(e) {
    statsEl.innerHTML = `<p style="color:#c0392b;text-align:center;padding:30px;">Error: ${e.message}</p>`;
  }
}

function setHistFilter(f) {
  _histFilter = f;
  ["all","paid","pending","tenday"].forEach(id => document.getElementById("hf-"+id)?.classList.remove("sel"));
  const map = {all:"hf-all", Paid:"hf-paid", Pending:"hf-pending"};
  document.getElementById(map[f] || "hf-all")?.classList.add("sel");
  renderHistTable();
}

function histSortBy(col) {
  if (_histSort.col === col) _histSort.dir = _histSort.dir==="asc" ? "desc" : "asc";
  else { _histSort.col = col; _histSort.dir = "asc"; }
  renderHistTable();
}

function renderHistTable() {
  const el = document.getElementById("histTableWrap");
  // Apply status filter
  let list = _histFilter==="all" ? [..._histAllOrders]
    : _histAllOrders.filter(o => o.status === _histFilter);
  // Apply sort
  const {col, dir} = _histSort;
  const mul = dir==="asc" ? 1 : -1;
  list.sort((a,b) => {
    if (col==="date")   return mul * a.date.localeCompare(b.date);
    if (col==="meal")   return mul * a.meal.localeCompare(b.meal);
    if (col==="name")   return mul * a.name.localeCompare(b.name);
    if (col==="area")   return mul * a.area.localeCompare(b.area);
    if (col==="amount") return mul * (a.total - b.total);
    if (col==="status") return mul * a.status.localeCompare(b.status);
    return 0;
  });
  document.getElementById("histRowCount").textContent = `${list.length} row${list.length!==1?"s":""}`;
  if (!list.length) { el.innerHTML=`<div class="no-orders-msg">No orders match the current filters.</div>`; return; }

  const fmtD = d => { const p=d.split("-"); return `${p[2]}/${p[1]}/${p[0]}`; };
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
  const mChip = m => { const c=m==="Breakfast"?"bf":m==="Lunch"?"ln":"dn"; return `<span class="meal-chip ${c}">${m}</span>`; };
  const pBadge = s => {
    if (s==="Paid" || s==="Wallet Paid") return `<span class="pay-badge paid">✓ Paid</span>`;
    return `<span class="pay-badge pending">⏳ Pending</span>`;
  };
  const th = (label, colKey, align="") => {
    const active = _histSort.col === colKey;
    const arrow  = active ? (_histSort.dir==="asc" ? "↑" : "↓") : "↕";
    const cls    = `sortable${active ? " sort-"+_histSort.dir : ""}`;
    return `<th class="${cls}" style="${align}" onclick="histSortBy('${colKey}')">${label} <span class="sort-arrow">${arrow}</span></th>`;
  };
  const rows = list.map(o => `<tr>
    <td style="white-space:nowrap;">${fmtD(o.date)}</td>
    <td>${mChip(o.meal)}</td>
    <td><strong>${o.name}</strong><br><span style="font-size:.7rem;color:var(--muted);">${o.phone}</span></td>
    <td><span class="area-chip">${o.area}</span></td>
    <td style="text-align:right;font-weight:700;white-space:nowrap;">${fmtM(o.total)}</td>
    <td>${pBadge(o.status)}</td>
  </tr>`).join("");
  el.innerHTML = `<div class="hist-table-wrap"><table class="hist-table">
    <thead><tr>
      ${th("Date","date")}${th("Meal","meal")}${th("Customer","name")}${th("Area","area")}
      ${th("Amount","amount","text-align:right;")}${th("Status","status")}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

let _custData = [];
let _custPayFilter = "all";
let _custSortKey   = "recent";

async function loadCustomers() {
  const el = document.getElementById("custGridWrap");
  el.innerHTML = `<div style="text-align:center;padding:40px;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  document.getElementById("custDetailWrap").innerHTML = "";
  document.getElementById("custSearch").value = "";
  _custPayFilter = "all";
  _custSortKey   = "recent";
  ["cpf-all","cpf-pending","cpf-paid"].forEach(id=>document.getElementById(id)?.classList.remove("sel"));
  document.getElementById("cpf-all")?.classList.add("sel");
  ["csort-recent","csort-name","csort-spent","csort-pending"].forEach(id=>document.getElementById(id)?.classList.remove("sel"));
  document.getElementById("csort-recent")?.classList.add("sel");
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getCustomerList&pin=${S.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    _custData = data.customers;
    applyCustomerFilters();
  } catch(e) {
    el.innerHTML = `<p style="color:#c0392b;text-align:center;padding:30px;">Error: ${e.message}</p>`;
  }
}
function setCustPayFilter(f) {
  _custPayFilter = f;
  ["cpf-all","cpf-pending","cpf-paid"].forEach(id=>document.getElementById(id)?.classList.remove("sel"));
  document.getElementById(`cpf-${f}`)?.classList.add("sel");
  applyCustomerFilters();
}
function setCustSort(key) {
  _custSortKey = key;
  ["csort-recent","csort-name","csort-spent","csort-pending"].forEach(id=>document.getElementById(id)?.classList.remove("sel"));
  document.getElementById(`csort-${key}`)?.classList.add("sel");
  applyCustomerFilters();
}
function filterCustomers() { applyCustomerFilters(); }
function applyCustomerFilters() {
  const q = (document.getElementById("custSearch").value||"").toLowerCase().trim();
  let list = [..._custData];
  // Search
  if (q) list = list.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q));
  // Payment filter
  if (_custPayFilter==="pending") list = list.filter(c=>c.pendingAmt>0);
  else if (_custPayFilter==="paid") list = list.filter(c=>c.pendingAmt===0);
  // Sort
  if      (_custSortKey==="recent")  list.sort((a,b)=>b.lastDate.localeCompare(a.lastDate));
  else if (_custSortKey==="name")    list.sort((a,b)=>a.name.localeCompare(b.name));
  else if (_custSortKey==="spent")   list.sort((a,b)=>b.totalSpent-a.totalSpent);
  else if (_custSortKey==="pending") list.sort((a,b)=>b.pendingAmt-a.pendingAmt);
  renderCustomerGrid(list);
}
function renderCustomerGrid(list) {
  const el = document.getElementById("custGridWrap");
  const fmtD = d => d ? (p=>p[2]+"/"+p[1]+"/"+p[0])(d.split("-")) : "—";
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
  if (!list.length) { el.innerHTML=`<div class="no-orders-msg">No customers found.</div>`; return; }
  el.innerHTML = `<div class="cust-grid">${list.map(c=>`
    <div class="cust-card" onclick="loadCustomerDetail('${c.phone}')">
      <div class="cust-card-name">${c.name}</div>
      <div class="cust-card-phone">📱 ${c.phone} &nbsp;·&nbsp; <span class="area-chip" style="font-size:.68rem;">${c.area}</span></div>
      <div class="cust-card-meta">
        <div class="cust-card-stat"><strong>${c.orderCount}</strong> orders</div>
        <div class="cust-card-stat"><strong>${fmtM(c.totalSpent)}</strong> total</div>
        <div class="cust-card-stat">Last: <strong>${fmtD(c.lastDate)}</strong></div>
      </div>
      ${c.pendingAmt>0?`<div class="pending-tag">⏳ ${fmtM(c.pendingAmt)} pending</div>`:""}
    </div>`).join("")}</div>`;
}

function renderCustomerDetail(data) {
  const fmtD = d => d ? (p=>p[2]+"/"+p[1]+"/"+p[0])(d.split("-")) : "—";

      </div>
      <div style="display:flex;gap:14px;align-items:center;">
        <div style="text-align:right;">
          <div style="font-size:1.05rem;font-weight:700;">${fmtM(data.totalSpent)} total</div>
          <div style="font-size:.8rem;margin-top:2px;">
            ${data.pending>0?`<span style="color:var(--gold);">⏳ ${fmtM(data.pending)} pending</span>`:`<span style="color:var(--green);">✓ Fully paid</span>`}
          </div>

        <button class="cust-detail-close" onclick="document.getElementById('custDetailWrap').innerHTML=''" title="Close">✕</button>

}

let _payDate = "";
async function loadPayments() {
  const date = document.getElementById("payDate").value;

  _payDate = date;
  const el = document.getElementById("payContent");
  el.innerHTML = `<div style="text-align:center;padding:40px;"><div class="spinner" style="margin:0 auto;"></div></div>`;
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getDatePayments&date=${date}&pin=${S.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    el.innerHTML = renderPayments(data);
  } catch(e) {
    el.innerHTML = `<p style="color:#c0392b;text-align:center;padding:30px;">Error: ${e.message}</p>`;

}
function renderPayments(data) {
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
  const fmtD = d => { const p=d.split("-"); return `${p[2]}/${p[1]}/${p[0]}`; };
  if (!data.customers.length) return `<div class="no-orders-msg">😴 No orders found for ${fmtD(data.date)}</div>`;
  const summary = `<div class="pay-summary-strip">
    <div class="pay-sum-card"><div class="sv">${fmtM(data.grandTotal)}</div><div class="sl">Total</div></div>
    <div class="pay-sum-card" style="border-color:var(--green-border);"><div class="sv" style="color:var(--green);">${fmtM(data.grandPaid)}</div><div class="sl">Collected</div></div>
    <div class="pay-sum-card" style="border-color:var(--gold-border);"><div class="sv" style="color:var(--gold);">${fmtM(data.grandPending)}</div><div class="sl">Pending</div></div>
    <div class="pay-sum-card"><div class="sv">${data.customers.length}</div><div class="sl">Customers</div></div>
  </div>`;
  const rows = data.customers.map(c => {
    const isPaid = c.status === "Paid";
    return `<tr id="payrow_${c.phone}">
      <td><strong>${c.name}</strong><br><span style="font-size:.7rem;color:var(--muted);">${c.phone}</span></td>
      <td style="font-size:.8rem;">${c.meals.join(", ")}</td>
      <td style="text-align:right;font-weight:700;">${fmtM(c.total)}</td>
      <td style="text-align:center;">${c.daily?'<span style="color:var(--green);font-weight:700;font-size:.9rem;">✓</span>':'<span style="color:var(--muted);">—</span>'}</td>
      <td><button class="pay-toggle ${isPaid?"paid":"pending"}" id="paybtn_${c.phone}"
          onclick="togglePayment('${c.phone}','${c.status}')">${isPaid?"✓ Paid":"⏳ Pending"}</button></td>
    </tr>`;
  }).join("");
  const tfoot = `<tr><td colspan="2" style="font-size:.8rem;color:var(--muted);">Total — ${data.customers.length} customers</td>
    <td style="text-align:right;">${fmtM(data.grandTotal)}</td><td></td><td></td></tr>`;
  return summary + `<div class="pay-table-wrap"><table class="pay-table">
    <thead><tr><th>Customer</th><th>Meals</th><th style="text-align:right;">Amount</th><th style="text-align:center;">Daily?</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody><tfoot>${tfoot}</tfoot>
  </table></div>`;
}
async function togglePayment(phone, currentStatus) {
  const newStatus = currentStatus==="Paid" ? "Pending" : "Paid";
  const btn = document.getElementById(`paybtn_${phone}`);
  btn.disabled = true; btn.textContent = "…";
  try {
    const res  = await fetch(APPS_SCRIPT_URL, {method:"POST",
      body: JSON.stringify({_action:"markOrdersStatus",pin:S.sessionPin,date:_payDate,phone,status:newStatus})});
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    btn.className = `pay-toggle ${newStatus==="Paid"?"paid":"pending"}`;
    btn.textContent = newStatus==="Paid" ? "✓ Paid" : "⏳ Pending";
    btn.onclick = () => togglePayment(phone, newStatus);
    toast(`${newStatus==="Paid"?"✅":"⏳"} Marked ${newStatus}`);
  } catch(e) { 
    toast("Error: "+e.message); 
    btn.textContent = currentStatus==="Paid"?"✓ Paid":"⏳ Pending"; 
  }
  btn.disabled = false;
}
async function markAllPaid() {
  if (!_payDate) { toast("Load a date first"); return; }
  const pendingBtns = [...document.querySelectorAll(".pay-toggle.pending")];
  if (!pendingBtns.length) { toast("All customers already paid! ✅"); return; }
  if (!(await showUIConfirm(`Mark all ${pendingBtns.length} pending customer(s) as Paid?`, "Bulk Action", "⚡"))) return;
  const phones = pendingBtns.map(b => b.id.replace("paybtn_",""));
  sLoading(true, "Updating records...");
  try {
    await Promise.all(phones.map(ph => fetch(APPS_SCRIPT_URL, {method:"POST",
      body:JSON.stringify({_action:"markOrdersStatus",pin:S.sessionPin,date:_payDate,phone:ph,status:"Paid"})}).then(r=>r.json())));
    sLoading(false);
    toast(`✅ ${phones.length} customer(s) marked as Paid`);
    loadPayments();
  } catch(e) { 
    sLoading(false);
    toast("Error: "+e.message); 
  }
}

// ── APPROVALS SUB-TABS ──
async function refreshApprovalCounts() {
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getPendingCounts&pin=${S.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (data.error) return;
    
    const r = document.getElementById("tabRefunds");
    const p = document.getElementById("tabPayments");
    const w = document.getElementById("tabWallet");
    
    if (r) r.innerHTML = `💸 Refunds ${data.refunds > 0 ? `[${data.refunds}]` : ''}`;
    if (p) p.innerHTML = `💳 UPI Payments ${data.payments > 0 ? `[${data.payments}]` : ''}`;
    if (w) w.innerHTML = `💼 Wallet Recharges ${data.wallet > 0 ? `[${data.wallet}]` : ''}`;
  } catch(e) { console.warn("Count refresh failed", e); }
}

function switchApprovalTab(tab) {
  document.querySelectorAll(".approvals-tab").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".approval-panel").forEach(el=>el.classList.remove("active"));
  
  if (tab === "refunds") {
    document.getElementById("tabRefunds").classList.add("active");
    document.getElementById("panelRefunds").classList.add("active");
    loadRefunds();
  } else if (tab === "payments") {
    document.getElementById("tabPayments").classList.add("active");
    document.getElementById("panelPayments").classList.add("active");
    loadPendingPayments();
  } else if (tab === "wallet") {
    document.getElementById("tabWallet").classList.add("active");
    document.getElementById("panelWallet").classList.add("active");
    loadPendingRecharges();
  }
}

// ── UPI PAYMENTS APPROVAL ──
async function loadPendingPayments() {
  sLoading(true, "Fetching pending payments...");
  const wrap = document.getElementById("pendingPaymentsContent");
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getPendingUPIPayments&pin=${S.sessionPin}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (!data.length) {
      wrap.innerHTML = `<div class="empty-msg">No pending UPI payments to verify. ✅</div>`;
      sLoading(false);
      return;
    }

    let html = `<div class="pay-table-wrap"><table class="pay-table">
      <thead><tr>
        <th>Customer</th>
        <th>Order</th>
        <th>Amount</th>
        <th>Action</th>
      </tr></thead>
      <tbody>`;
    data.forEach(p => {
      const isCancelled = p.status === "Cancelled (Verify UPI)";
      const rowStyle = isCancelled ? 'background:#fff3e0; border-left: 4px solid #f57c00;' : '';
      const pref = String(p.refund_preference || "upi").toLowerCase();
      const prefLabel = pref === "wallet" ? "💼 Wallet" : "💸 UPI";
      
      html += `<tr style="${rowStyle}">
        <td>
          <div style="font-weight:700;">${p.customer}</div>
          <div style="font-size:0.75rem;color:var(--muted);">${p.phone}</div>
        </td>
        <td>
          <div style="font-size:0.8rem;">${p.meal} - ${p.date}</div>
          <div style="font-size:0.65rem;color:var(--muted);">${p.id}</div>
          ${isCancelled ? `<div style="font-size:0.7rem;color:#e65100;font-weight:600;margin-top:4px;">⚠️ CANCELLED - Refund to ${prefLabel}</div>` : ''}
        </td>
        <td style="font-weight:700;">₹${p.amount}</td>
        <td>
          <button class="${isCancelled ? 'btn-orange':'btn-green'}" 
                  style="${isCancelled ? 'background:#f57c00;color:white;border:none;padding:8px 12px;border-radius:6px;font-weight:600;':''}"
                  onclick="approveUPIPayment('${p.phone}', '${p.date}', '${p.id}', ${isCancelled}, '${p.customer}', ${p.amount})">
            ${isCancelled ? 'Verify & Refund' : 'Confirm Paid'}
          </button>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    wrap.innerHTML = html;
    sLoading(false); } catch(e) { sLoading(false); wrap.innerHTML = `<div class="empty-msg" style="color:var(--red);">Error: ${e.message}</div>`; }
}

async function approveUPIPayment(phone, date, sid, isCancelled=false, name="", amt=0) {
  const quest = isCancelled 
    ? `Verify payment of ₹${amt} for ${name} (Order ${sid}) and process refund?` 
    : `Confirm you have received ₹${amt} from ${name} for Order ${sid}?`;
  if (!(await showUIConfirm(quest, isCancelled ? "Verify & Refund" : "Confirm Payment", isCancelled ? "💸" : "💰"))) return;
  sLoading(true, isCancelled ? "Processing refund..." : "Verifying payment...");
  try {
    const res = await fetch(APPS_SCRIPT_URL, {method:"POST",
      body: JSON.stringify({_action:"markOrdersStatus", pin:S.sessionPin, phone, date, sid, status:"Paid"})});
    const data = await res.json();
    if (data.success) {
      toast(isCancelled ? "Refund Processed ✅" : "Payment Verified ✅");
      await loadPendingPayments();
      refreshApprovalCounts();
    } else throw new Error(data.error);
  } catch(e) { 
    sLoading(false);
    toast("Error: " + e.message); 
  }
}

// ── WALLET RECHARGE APPROVAL ──
async function loadPendingRecharges() {
  sLoading(true, "Fetching recharge requests...");
  const wrap = document.getElementById("pendingRechargesContent");
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getPendingRecharges&pin=${S.sessionPin}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (!data.length) {
      wrap.innerHTML = `<div class="empty-msg">No pending wallet recharges. ✅</div>`;
      sLoading(false);
      return;
    }

    let html = `<div class="pay-table-wrap"><table class="pay-table">
      <thead><tr>
        <th>Customer</th>
        <th>Amount</th>
        <th>Requested At</th>
        <th>Action</th>
      </tr></thead>
      <tbody>`;
    data.forEach(r => {
      html += `<tr>
        <td>
          <div style="font-weight:700;">${r.Customer_Name}</div>
          <div style="font-size:0.75rem;color:var(--muted);">${r.Phone}</div>
        </td>
        <td style="font-weight:700;color:var(--green);">₹${r.Amount}</td>
        <td style="font-size:0.8rem;color:var(--muted);">${r.Timestamp}</td>
        <td>
          <button class="btn-primary" onclick="activateWalletRecharge('${r.Phone}', '${r.Timestamp}', ${r.Amount}, '${r.Customer_Name}')">Activate Credits</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    wrap.innerHTML = html;
    sLoading(false); } catch(e) { sLoading(false); wrap.innerHTML = `<div class="empty-msg" style="color:var(--red);">Error: ${e.message}</div>`; }
}

async function activateWalletRecharge(phone, timestamp, amt, name) {
  if (!(await showUIConfirm(`Activate ₹${amt} credits for ${name || phone}?`, "Activate Credits", "💼"))) return;
  sLoading(true, "Activating credits...");
  try {
    const res = await fetch(APPS_SCRIPT_URL, {method:"POST",
      body: JSON.stringify({_action:"approveWalletRecharge", pin:S.sessionPin, phone, timestamp})});
    const data = await res.json();
    if (data.success) {
      toast("Wallet Activated ✅");
      await loadPendingRecharges();
      refreshApprovalCounts();
    } else throw new Error(data.error);
  } catch(e) { 
    sLoading(false);
    toast("Error: " + e.message); 
  }
}

// ── REFUND MANAGEMENT (Manual UPI) ──
async function loadRefunds() {
  sLoading(true, "Fetching refund requests...");
  const wrap = document.getElementById("refundsContent");
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getPendingRefunds&pin=${S.sessionPin}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    
    if (!data.length) {
      wrap.innerHTML = `<div class="empty-msg">No pending UPI refund requests. ✅</div>`;
      sLoading(false);
      return;
    }

    let html = `<div class="pay-table-wrap"><table class="pay-table">
      <thead><tr>
        <th>Customer</th>
        <th>Amount</th>
        <th>Order Details</th>
        <th>Requested At</th>
        <th>Action</th>
      </tr></thead>
      <tbody>`;
    
    data.forEach(r => {
      const isUnverified = (r.Status === "Verification Required");
      const mode = String(r.Refund_Mode || "upi").toLowerCase();
      const modeIcon = mode === "wallet" ? "💼" : "💸";
      const modeLabel = mode === "wallet" ? "Wallet" : "Original UPI";
      const rowStyle = isUnverified ? 'background:#fff9c4; border-left: 4px solid #f57f17;' : '';
      
      const ts = new Date(r.Timestamp).toLocaleString('en-IN', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
      html += `<tr style="${rowStyle}">
        <td>
          <div style="font-weight:700;">${r.Name}</div>
          <div style="font-size:0.75rem;color:var(--muted);">${r.Phone}</div>
        </td>
        <td style="font-weight:700;color:var(--red);">₹${r.Amount}</td>
        <td>
          <div style="font-size:0.8rem;">${r.Meal} - ${r.Date}</div>
          <div style="font-size:0.65rem;color:var(--muted);">ID: ${r.Submission_ID}</div>
          <div style="font-size:0.7rem;margin-top:5px;color:#1a6640;background:rgba(26,102,64,0.05);display:inline-block;padding:2px 6px;border-radius:4px;">
            Target: <strong>${modeIcon} ${modeLabel}</strong>
          </div>
          ${r.Adjustment_Note ? `<div style="font-size:0.65rem;color:#744210;font-style:italic;margin-top:5px;line-height:1.3;">⚠️ ${r.Adjustment_Note}</div>` : ""}
        </td>
        <td style="font-size:0.75rem;color:var(--muted);">${ts}</td>
        <td>
          <button class="${isUnverified ? 'btn-orange':'btn-green'}" 
                  style="${isUnverified ? 'background:#f57f17;color:white;border:none;padding:8px 12px;border-radius:6px;font-weight:600;':''}"
                  onclick="markAsRefunded('${r.Submission_ID}', '${r.Name}', ${r.Amount})">
            ${isUnverified ? 'Verify & Refund' : 'Apply Refund'}
          </button>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    wrap.innerHTML = html;
    sLoading(false);
  } catch(e) {
    sLoading(false);
    wrap.innerHTML = `<div class="empty-msg" style="color:var(--red);">Error: ${e.message}</div>`;
  }
}

async function markAsRefunded(subId, name, amt) {
  if (!(await showUIConfirm(`Confirm you have paid ₹${amt} to ${name} via UPI? This will mark it as refunded.`, "Confirm Refund", "💸"))) return;
  sLoading(true, "Processing refund...");
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ _action: "markRefunded", pin: S.sessionPin, submissionId: subId })
    });
    const data = await res.json();
    if (data.success) {
      toast("Marked as Refunded ✅");
      await loadRefunds();
      refreshApprovalCounts();
    } else throw new Error(data.error);
  } catch(e) { 
    sLoading(false);
    toast("Error: " + e.message, 4000); 
  }
}

// ── REVIEW REWARDS MANAGEMENT ──
let _reviewUsers = [];
async function loadReviewUsers() {
  const wrap = document.getElementById("reviewGridWrap");
  wrap.innerHTML = `<div style="text-align:center;padding:40px;grid-column:1/-1;"><div class="spinner" style="margin:0 auto;"></div><p style="color:#aaa;margin-top:12px;font-size:0.85rem;">Loading customers…</p></div>`;
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getCustomerList&pin=${S.sessionPin}&_t=${Date.now()}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    _reviewUsers = data.customers;
    renderReviewUsers(_reviewUsers);
  } catch(e) {
    wrap.innerHTML = `<div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--red);">Error: ${e.message}</div>`;
  }
}

function renderReviewUsers(list) {
  const wrap = document.getElementById("reviewGridWrap");
  if (!list.length) {
    wrap.innerHTML = `<div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--muted);">No customers found.</div>`;
    return;
  }
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;
  const fmtD = d => d ? (p=>p[2]+"/"+p[1]+"/"+p[0])(d.split("-")) : "—";
  
  wrap.innerHTML = list.map(c => `
    <div class="cust-card" style="cursor:default;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div>
          <div class="cust-card-name">${c.name}</div>
          <div class="cust-card-phone">📱 ${c.phone}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;font-weight:700;">Promo Credits</div>
          <div style="font-size:1.1rem;font-weight:800;color:${c.promoCount > 0 ? "var(--green)" : "var(--muted)"};">${c.promoCount}</div>
        </div>
      </div>
      <div style="font-size:0.75rem;color:var(--muted);margin-bottom:12px;">
         Total Orders: <strong>${c.orderCount}</strong> &nbsp;·&nbsp; Last: <strong>${fmtD(c.lastDate)}</strong>
      </div>
      <button class="btn-green" style="width:100%;padding:8px;font-size:0.8rem;display:flex;align-items:center;justify-content:center;gap:8px;" 
              onclick="grantReviewReward('${c.phone}', '${c.name.replace(/'/g,"\\'")}')">
         <span>🎁</span> Mark Reviewed (+3)
      </button>
    </div>
  `).join("");
}

function filterReviewUsers() {
  const q = document.getElementById("reviewUserSearch").value.toLowerCase();
  const filtered = _reviewUsers.filter(c => 
    c.name.toLowerCase().includes(q) || c.phone.replace(/\D/g,"").includes(q)
  );
  renderReviewUsers(filtered);
}

async function grantReviewReward(phone, name) {
  if (!(await showUIConfirm(`Mark ${name} as Reviewed?\nThis will add 3 discount credits (10% off each).`, "Add Review Reward", "🎁"))) return;
  sLoading(true, "Updating customer...");
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ _action: "markReviewed", pin: S.sessionPin, phone: phone })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    toast(`✅ Added 3 credits to ${name}! New balance: ${data.newCount}`);
    loadReviewUsers(); // refresh
  } catch(e) {
    toast("Error: " + e.message);
  } finally {
    sLoading(false);
  }
}

</script>
