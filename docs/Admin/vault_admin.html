// ── UPI PAYMENTS APPROVAL ──
async function loadPendingPayments() {
  sLoading(true, "Fetching pending payments...");
  const wrap = document.getElementById("pendingPaymentsContent");
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getPendingUPIPayments&pin=${S.sessionPin}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (!data.length) {
      wrap.innerHTML = `<div class="empty-msg">No pending UPI payments to verify. ✅</div>`;
      sLoading(false);
      updateBatchBar('payments');
      return;
    }

    let html = `<div class="pay-table-wrap"><table class="pay-table">
      <thead><tr>
        <th style="width:40px;"><input type="checkbox" id="selectAllPayments" onclick="toggleSelectAll('payments')"></th>
        <th>Customer</th>
        <th>Order</th>
        <th>Amount</th>
        <th>Action</th>
      </tr></thead>
      <tbody>`;
    data.forEach(p => {
      const isCancelled    = p.status === "Cancelled (Verify UPI)";
      const isSplit        = String(p.payment_method || "").toLowerCase() === "split";
      const isSplitCancelled = isCancelled && isSplit;
      const pref = String(p.refund_preference || "upi").toLowerCase();
      const prefLabel = pref === "wallet" ? "💳 Wallet" : "💸 UPI";

      // Row highlight: cancelled-split = red+purple; plain split = purple; cancelled = orange; normal = none
      const rowStyle = isSplitCancelled ? 'background:#fdf4ff; border-left: 4px solid #7b2ff7;'
                     : isCancelled      ? 'background:#fff3e0; border-left: 4px solid #f57c00;'
                     : isSplit          ? 'background:#f5f0ff; border-left: 4px solid #7b2ff7;' : '';

      // Amount column: for split, show only the UPI-due portion with wallet note
      const loyaltyNote = p.is_loyalty && p.loyalty_discount > 0
        ? `<div style="font-size:0.68rem;color:#047857;font-weight:600;margin-top:3px;">🏆 6-Day Loyalty Reward: −₹${p.loyalty_discount} applied — customer paid ₹${p.amount} (not ₹${(Number(p.amount) + Number(p.loyalty_discount)).toFixed(0)})</div>`
        : '';
      const amountLabel = isSplit
        ? `₹${p.amount} <span style="font-size:0.65rem;color:#5b21b6;font-weight:500;">(UPI due — ₹${p.wallet_credit} already from Wallet)</span>`
        : `₹${p.amount}`;

      // Info labels below the order ID
      const cancelledNote = isCancelled && !isSplit
        ? `<div style="font-size:0.7rem;color:#e65100;font-weight:600;margin-top:4px;">⚠️ CANCELLED — Refund to ${prefLabel}</div>`
        : '';
      const splitPendingNote = isSplit && !isCancelled
        ? `<div style="font-size:0.7rem;color:#5b21b6;font-weight:600;margin-top:4px;">🔀 SPLIT — ₹${p.wallet_credit} Wallet deducted · ₹${p.amount} UPI awaiting</div>`
        : '';
      const splitCancelledNote = isSplitCancelled
        ? `<div style="font-size:0.7rem;color:#7b2ff7;font-weight:600;margin-top:4px;">⚠️ SPLIT CANCELLED — ₹${p.wallet_credit} already refunded to Wallet · confirm ₹${p.amount} UPI received → add to Wallet</div>`
        : '';

      // Button label and colour
      const btnStyle  = isCancelled ? 'background:#f57c00;' : isSplit ? 'background:#7b2ff7;' : '';
      const btnLabel  = isSplitCancelled ? 'Verify & Refund (Split)'
                      : isCancelled      ? 'Verify & Refund'
                      : isSplit          ? 'Confirm UPI Paid'
                      : 'Confirm Paid';

      html += `<tr style="${rowStyle}" class="payment-row">
        <td>
          <input type="checkbox" class="payment-check"
                 data-phone="${p.phone}" data-date="${p.date}" data-sid="${p.id}" data-iscancelled="${isCancelled}" data-name="${p.customer}" data-amount="${p.amount}"
                 onchange="updateBatchBar('payments')">
        </td>
        <td>
          <div style="font-weight:700;">${p.customer}</div>
          <div style="font-size:0.75rem;color:var(--muted);">${p.phone}</div>
        </td>
        <td>
          <div style="font-size:0.8rem;">${p.meal} - ${p.date}</div>
          <div style="font-size:0.65rem;color:var(--muted);">${p.id}</div>
          ${cancelledNote}${splitPendingNote}${splitCancelledNote}${loyaltyNote}
        </td>
        <td style="font-weight:700;">${amountLabel}</td>
        <td>
          <div style="display:flex;gap:6px;">
            <button class="approve-row-btn" style="${btnStyle}"
                    onclick="approveUPIPayment('${p.phone}', '${p.date}', '${p.id}', ${isCancelled}, '${p.customer}', ${p.amount}, this, ${p.wallet_credit || 0})">
              ${btnLabel}
            </button>
            <button class="reject-row-btn" onclick="rejectUPIPayment('${p.phone}', '${p.date}', '${p.id}', '${p.customer}')">Reject</button>
          </div>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    wrap.innerHTML = html;
    sLoading(false);
    updateBatchBar('payments');
  } catch(e) { sLoading(false); wrap.innerHTML = `<div class="empty-msg" style="color:var(--red);">Error: ${e.message}</div>`; }
}

async function rejectUPIPayment(phone, date, sid, name) {
  if (!(await showUIConfirm(`Reject payment for ${name}? This will mark it as "Payment Rejected".`, "Reject Payment", "❌"))) return;
  sLoading(true, "Rejecting payment...");
  try {
    const res = await fetch(APPS_SCRIPT_URL, {method:"POST",
      body: JSON.stringify({_action:"rejectUPIPayment", pin:S.sessionPin, phone, date, sid})});
    const data = await res.json();
    if (data.success) {
      toast("Payment Rejected ❌");
      await loadPendingPayments();
      refreshApprovalCounts();
    } else throw new Error(data.error);
  } catch(e) { sLoading(false); toast("Error: " + e.message); }
}

async function approveUPIPayment(phone, date, sid, isCancelled=false, name="", amt=0, btn=null, walletCredit=0) {
  // Disable button immediately to prevent double-click / duplicate refund
  if (btn) { btn.disabled = true; btn.style.opacity = "0.5"; }

  let quest, title, icon;
  if (isCancelled && walletCredit > 0) {
    quest = `Confirm ₹${amt} UPI was received from ${name} (${sid})?\n\n₹${walletCredit} was already refunded to their Wallet.\nConfirming will add ₹${amt} to their Wallet too.`;
    title = "Verify & Add to Wallet";
    icon  = "🔀";
  } else if (isCancelled) {
    quest = `Verify payment of ₹${amt} for ${name} (${sid}) and process refund?`;
    title = "Verify & Refund";
    icon  = "💸";
  } else if (walletCredit > 0) {
    quest = `Confirm ₹${amt} UPI received from ${name} (${sid})?\n(₹${walletCredit} wallet was already deducted at order time)`;
    title = "Confirm UPI Part";
    icon  = "🔀";
  } else {
    quest = `Confirm you have received ₹${amt} from ${name} for Order ${sid}?`;
    title = "Confirm Payment";
    icon  = "💰";
  }

  if (!(await showUIConfirm(quest, title, icon))) {
    if (btn) { btn.disabled = false; btn.style.opacity = ""; }
    return;
  }
  sLoading(true, isCancelled ? "Processing refund..." : "Verifying payment...");
  try {
    const res = await fetch(APPS_SCRIPT_URL, {method:"POST",
      body: JSON.stringify({_action:"markOrdersStatus", pin:S.sessionPin, phone, date, sid, status:"Paid"})});
    const data = await res.json();
    if (data.success) {
      toast(isCancelled ? "Refund Processed ✅" : "Payment Verified ✅");
      await loadPendingPayments();
      refreshApprovalCounts();
    } else throw new Error(data.error);
  } catch(e) {
    sLoading(false);
    if (btn) { btn.disabled = false; btn.style.opacity = ""; }
    toast("Error: " + e.message);
  }
}

/**
 * Multi-select Logic
 */
function toggleSelectAll(tabId) {
  const master = $(`selectAll${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`);
  const key = tabId.replace(/s$/, ""); // 'refund', 'payment', 'wallet'
  const checks = document.querySelectorAll(`.${key}-check`);
  checks.forEach(c => c.checked = master.checked);
  updateBatchBar(tabId);
}

function updateBatchBar(tabId) {
  const key = tabId.replace(/s$/, ""); 
  const checks = document.querySelectorAll(`.${key}-check`);
  const selected = Array.from(checks).filter(c => c.checked).length;
  const bar = $(`batch${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`);
  
  if (bar) {
    if (selected > 0) {
      bar.classList.add('on');
      const labelId = `batch${key.charAt(0).toUpperCase() + key.slice(1)}Count`;
      const label = $(labelId);
      if (label) label.textContent = `${selected} items selected`;
    } else {
      bar.classList.remove('on');
    }
  }
}

async function handleBatchAction(tabId, actionType) {
  const checks = document.querySelectorAll(`.${tabId.slice(0,-1)}-check, .${tabId}-check`);
  const selectedItems = Array.from(checks).filter(c => c.checked).map(c => ({...c.dataset}));
  if (!selectedItems.length) return;

  const actionLabel = actionType === 'approve' ? 'APPROVE' : 'REJECT';
  const icon = actionType === 'approve' ? '✅' : '❌';
  if (!(await showUIConfirm(`Are you sure you want to ${actionLabel} ${selectedItems.length} selected items?`, `Batch ${actionLabel}`, icon))) return;

  sLoading(true, `Processing ${selectedItems.length} items...`);
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        _action: "batchProcessApprovals",
        pin: S.sessionPin,
        tab: tabId,
        action: actionType,
        items: selectedItems
      })
    });
    const data = await res.json();
    if (data.success) {
      toast(`${data.successCount} of ${data.total} items processed! ${icon}`);
      if (tabId === 'refunds') await loadRefunds();
      else if (tabId === 'payments') await loadPendingPayments();
      else if (tabId === 'wallet') await loadPendingRecharges();
      refreshApprovalCounts();
    } else throw new Error(data.error);
  } catch(e) {
    sLoading(false);
    toast("Batch Error: " + e.message, 4000);
  }
}

function generateCalendar(year, month, selectedDates = [], onToggleFnName = null) {
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayISO = toISO(getIST());

  let html = `<div class="cal-dow">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div>${d}</div>`).join("")}</div>`;
  html += `<div class="cal-grid">`;
  
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day disabled"></div>`;
  
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isActive = selectedDates.includes(iso);
    const isToday = iso === todayISO;
    const isPast = iso < todayISO;
    
    // For bulk tool, we pass toggleBulkDate(this, '...')
    // For modal, we'll attach listeners manually after rendering
    const clickAttr = onToggleFnName ? `onclick="${onToggleFnName}(this, '${iso}')"` : "";
    
    html += `<div class="cal-day ${isActive?'active':''} ${isToday?'today':''} ${isPast?'disabled':''}" 
              data-date="${iso}" ${clickAttr}>${d}</div>`;
  }
  html += `</div>`;
  return html;
}

function _getAvailableItemsForMeal(mealType) {
  const staples = [
    {key: 'Chapati', label: 'Chapati', price: 9},
    {key: 'Without Oil Chapati', label: 'Without Oil Chapati', price: 8},
    {key: 'Phulka', label: 'Phulka', price: 7},
    {key: 'Ghee Phulka', label: 'Ghee Phulka', price: 10},
    {key: 'Jowar Bhakri', label: 'Jowar Bhakri', price: 20},
    {key: 'Bajra Bhakri', label: 'Bajra Bhakri', price: 20},
    {key: 'Dry Sabji Mini', label: 'Dry Sabji Mini', price: 22},
    {key: 'Dry Sabji Full', label: 'Dry Sabji Full', price: 45},
    {key: 'Curry Sabji Mini', label: 'Curry Sabji Mini', price: 22},
    {key: 'Curry Sabji Full', label: 'Curry Sabji Full', price: 45},
    {key: 'Dal', label: 'Dal', price: 22},
    {key: 'Rice', label: 'Rice', price: 12},
    {key: 'Salad', label: 'Salad', price: 6},
    {key: 'Curd', label: 'Curd', price: 12},
  ];
  if (mealType === 'Breakfast') {
    return S.bfMaster.map(x => ({key: x.id||x.name, label: x.name, price: Number(x.price)||0}));
  }
  // Lunch/Dinner — also add dynamic sabjis from master if present
  const dynamic = (S.sabjiMaster||[]).map(x => ({key:x.id||x.name, label:x.name, price:Number(x.price)||22}));
  const existingKeys = new Set(staples.map(s=>s.key));
  dynamic.forEach(d => { if (!existingKeys.has(d.key)) staples.push(d); });
  return staples;
}

function _calcSubtotal(itemsObj) {
  let sub = 0;
  Object.entries(itemsObj).forEach(([key,qty]) => {
    const n = Number(qty)||0;
    if (n <= 0) return;
    
    // Canonicalize key for lookup
    let canon = colKeyToDisplayName(key);
    
    if (GLOBAL_STAPLE_PRICES[canon]) { 
      sub += GLOBAL_STAPLE_PRICES[canon] * n; 
      return; 
    }

    const found = [...(S.bfMaster||[]),...(S.sabjiMaster||[])].find(x=>x.id===key||x.name===key);
    if (found) {
      sub += (Number(found.price)|| (canon.toLowerCase().includes('full') ? 45 : 22)) * n;
    } else {
      sub += (canon.toLowerCase().includes('full') ? 45 : 22) * n;
    }
  });
  return sub;
}

function sQuickEditModal(customerName, favName, initialItems, defaultMeal) {
  return new Promise((resolve) => {
    const ist = getIST();
    let selDate = toISO(ist);
    let selMeal = defaultMeal || (ist.getHours() < 9 ? 'Breakfast' : ist.getHours() < 16 ? 'Lunch' : 'Dinner');

    // Working copy of items {key: qty}
    let editItems = {};
    let rawObj = initialItems;
    if (typeof rawObj === 'string') { try { rawObj = JSON.parse(rawObj); } catch(e){ rawObj={}; } }
    if (Array.isArray(rawObj)) {
      rawObj.forEach(({colKey,qty}) => { editItems[colKey] = Number(qty)||0; });
    } else {
      Object.entries(rawObj).forEach(([k,v]) => { if (Number(v) > 0) editItems[k] = Number(v); });
    }

    const overlay = document.createElement('div');
    overlay.className = 's-modal-overlay';
    overlay.style.cssText = 'z-index:5000;';
    document.body.appendChild(overlay);

    const closeModal = (val) => { document.body.removeChild(overlay); resolve(val); };

    const render = () => {
      const avail = _getAvailableItemsForMeal(selMeal);
      const existingKeys = new Set(Object.keys(editItems).filter(k => editItems[k] > 0));
      const addableItems = avail.filter(a => !existingKeys.has(a.key));

      const itemRows = Object.entries(editItems)
        .filter(([,q]) => q > 0)
        .map(([key,qty]) => {
          const label = colKeyToDisplayName ? colKeyToDisplayName(key) : key.replace(/_/g,' ');
          
          // Helper to get real price for display
          let price = 0;
          if (GLOBAL_STAPLE_PRICES[key]) {
            price = GLOBAL_STAPLE_PRICES[key];
          } else {
            const normKey = key.replace(/\s+/g, '_');
            if (GLOBAL_STAPLE_PRICES[normKey]) {
              price = GLOBAL_STAPLE_PRICES[normKey];
            } else {
              const found = [...(S.bfMaster||[]), ...(S.sabjiMaster||[])].find(x => x.id === key || x.name === key);
              price = found ? (Number(found.price) || (key.toLowerCase().includes('full') ? 45 : 22)) : (key.toLowerCase().includes('full') ? 45 : 22);
            }
          }

          return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;">
            <div>
              <span style="font-size:.83rem;font-weight:600;">${label}</span>
              <span style="font-size:.72rem;color:#888;margin-left:6px;">₹${price} each</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              <button onclick="_qtyChange('${key}',-1)" style="width:26px;height:26px;border:1px solid #ddd;border-radius:6px;background:#f5f5f5;cursor:pointer;font-size:1rem;line-height:1;">−</button>
              <span id="qty_${key}" style="min-width:20px;text-align:center;font-weight:700;font-size:.9rem;">${qty}</span>
              <button onclick="_qtyChange('${key}',1)" style="width:26px;height:26px;border:1px solid #ddd;border-radius:6px;background:#f5f5f5;cursor:pointer;font-size:1rem;line-height:1;">+</button>
              <button onclick="_qtyRemove('${key}')" style="width:26px;height:26px;border:1px solid #ffcccc;border-radius:6px;background:#fff5f5;cursor:pointer;font-size:.8rem;">✕</button>
            </div>
          </div>`;
        }).join('');

      const addOptions = addableItems.map(a =>
        `<option value="${a.key}">${a.label} (₹${a.price})</option>`
      ).join('');

      const sub = _calcSubtotal(editItems);

      overlay.innerHTML = `
        <div class="s-modal" style="max-width:440px;max-height:90vh;overflow-y:auto;">
          <div class="s-modal-title" style="font-size:1rem;">⚡ Place Order — ${favName}</div>
          <div style="font-size:.78rem;color:var(--muted);margin-bottom:12px;">Customer: <strong>${customerName}</strong></div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
            <div>
              <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;margin-bottom:4px;color:var(--muted);">Date</div>
              <input type="date" id="qeDate" value="${selDate}" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:.83rem;">
            </div>
            <div>
              <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;margin-bottom:4px;color:var(--muted);">Meal</div>
              <div style="display:flex;gap:4px;">
                ${['Breakfast','Lunch','Dinner'].map(m =>
                  `<button class="meal-btn ${selMeal===m?'active':''}" data-m="${m}" onclick="_qeMeal('${m}')" style="flex:1;padding:6px 4px;font-size:.72rem;">${m.slice(0,3)}</button>`
                ).join('')}
              </div>
            </div>
          </div>

          <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;margin-bottom:8px;color:var(--muted);">Items</div>
          <div id="qeItemRows">${itemRows || '<p style="color:#aaa;font-size:.8rem;">No items yet — add from below.</p>'}</div>

          ${addOptions ? `
          <div style="display:flex;gap:6px;align-items:center;margin-top:10px;">
            <select id="qeAddSel" style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:.8rem;">
              <option value="">+ Add item…</option>
              ${addOptions}
            </select>
            <button onclick="_qeAdd()" style="padding:7px 14px;background:var(--red);color:#fff;border:none;border-radius:7px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;">Add</button>
          </div>` : ''}

          <div style="margin-top:14px;padding:10px 14px;background:#fff8f0;border-radius:8px;border:1px solid #ffe0b0;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:.8rem;color:#856404;">Subtotal (food only)</span>
            <span id="qeSubtotal" style="font-size:1rem;font-weight:800;color:var(--red);">₹${sub}</span>
          </div>

          <div class="s-modal-footer" style="margin-top:14px;">
            <button class="s-btn s-btn-secondary" onclick="_qeClose(null)">Cancel</button>
            <button class="s-btn s-btn-primary" onclick="_qeConfirm()" style="background:var(--red);border-color:var(--red);">⚡ Place as On Account</button>
          </div>
        </div>`;

      // Wire up dynamic functions scoped to this modal
      window._qtyChange = (key, delta) => {
        editItems[key] = Math.max(0, (editItems[key]||0) + delta);
        if (editItems[key] === 0) delete editItems[key];
        render();
      };
      window._qtyRemove = (key) => { delete editItems[key]; render(); };
      window._qeMeal   = (m)   => { selMeal = m; render(); };
      window._qeClose  = (v)   => closeModal(v);
      window._qeAdd    = ()    => {
        const sel = document.getElementById('qeAddSel');
        if (!sel || !sel.value) return;
        editItems[sel.value] = (editItems[sel.value]||0) + 1;
        render();
      };
      window._qeConfirm = () => {
        selDate = document.getElementById('qeDate')?.value || selDate;
        closeModal({ date: selDate, meal: selMeal, items: {...editItems} });
      };
    };

    render();
  });
}

async function quickOrderStandard(phone, name, rawItems, favName, mealType) {
  // Fix double-escaped &apos; from HTML attribute passing
  if (typeof name === 'string') name = name.replace(/&apos;/g, "'");
  if (typeof favName === 'string') favName = favName.replace(/&apos;/g, "'");

  const result = await sQuickEditModal(name, favName, rawItems, mealType);
  if (!result) return;

  const { date, meal, items } = result;
  const itemsObj = items;

  // Build [{colKey, qty}] list
  const itemList = Object.entries(itemsObj)
    .filter(([,q]) => Number(q) > 0)
    .map(([colKey,qty]) => ({ colKey, qty: Number(qty) }));

  if (!itemList.length) { toast('No items in order — nothing placed.'); return; }

  const subtotal = _calcSubtotal(itemsObj);

  sLoading(true, 'Placing order as On Account…');
  try {
    const customer = _custData.find(c => c.phone === phone);
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        _action: 'processOrder', pin: S.sessionPin,
        profile: { 
          phone, name,
          area:           customer?.area || "",
          wing:           customer?.wing || "",
          flat:           customer?.flat || "",
          floor:          customer?.floor || "",
          society:        customer?.society || "",
          maps:           customer?.maps || "",
          landmark:       customer?.landmark || "",
          delivery_point: customer?.delivery_point || ""
        },
        orders: [{ date, meals: [{ type: meal, items: itemList, subtotal }] }],
        payment_method: 'On Account',
        payment_status: 'On Account'
      })
    });
    const data = await res.json();
    if (data.success) {
      toast(`✅ Order placed as On Account for ${name}!`);
      loadCustomers(true);
    } else throw new Error(data.error);
  } catch(e) { sAlert('Error: ' + e.message); }
  finally { sLoading(false); }
}


/**
 * Bulk Order Placement Logic
 */
async function handleBulkOrderTrigger(phone, name) {
  const selectedDates = [...document.querySelectorAll(".cal-day.active")].map(d => d.dataset.date);
  const selectedFavs = [...document.querySelectorAll(".fav-bulk-check:checked")];
  
  if (!selectedDates.length) return sAlert("Please select at least one date on the calendar.");
  if (!selectedFavs.length) return sAlert("Please tick at least one favorite above to use as a template.");
  
  const customer = _custData.find(c => c.phone === phone);
  if (!customer) return sAlert("Customer session lost. Please reload.");
  
  // Build templates object
  const templates = selectedFavs.map(chk => {
    const favName = chk.value;
    const favs = JSON.parse(customer.standardOrder || "[]");
    return favs.find(f => f.name === favName);
  }).filter(Boolean);

  placeBulkOrders(customer, selectedDates, templates);
}

function syncFavToggles(chk) {
  const meal = chk.dataset.meal;
  if (!chk.checked || meal === "Other") return;
  // If a Breakfast/Lunch/Dinner is checked, uncheck others of SAME category
  document.querySelectorAll(`.fav-bulk-check[data-meal="${meal}"]`).forEach(c => {
    if (c !== chk) c.checked = false;
  });
}

/**
 * Bulk Order Placement Logic
 */
async function placeBulkOrders(customer, selectedDates, templates) {
  const totalOrders = selectedDates.length * templates.length;
  const confirmed = await sConfirm(`Place ${totalOrders} orders for ${customer.name}?`, "Bulk Order", "🚚");
  if (!confirmed) return;

  const orders = [];
  selectedDates.forEach(date => {
    const dailyMeals = templates.map(fav => {
      // Safely parse items in case they are stringified
      let itemsObj = fav.items;
      if (typeof itemsObj === "string") {
        try { itemsObj = JSON.parse(itemsObj); } catch(e) { itemsObj = {}; }
      }

      // Calculate subtotal using shared robust logic
      const subtotal = _calcSubtotal(itemsObj);

      const mType = fav.name.toLowerCase().includes("breakfast") ? "Breakfast" : (fav.name.toLowerCase().includes("lunch") ? "Lunch" : "Dinner");

      return {
        type: mType,
        items: Object.entries(itemsObj).map(([colKey, qty]) => ({ colKey, qty })),
        subtotal: subtotal
      };
    });
    orders.push({ date, meals: dailyMeals });
  });

  if (!orders.length) {
    sAlert("No matching favorite templates found for the selected meals. Please set templates named 'Breakfast', 'Lunch', or 'Dinner' first.");
    return;
  }

  sLoading(true, "Placing Bulk Orders...");
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        _action: "processOrder",
        pin: S.sessionPin,
        profile: { 
          phone: customer.phone, 
          name: customer.name,
          area:           customer.area || "",
          wing:           customer.wing || "",
          flat:           customer.flat || "",
          floor:          customer.floor || "",
          society:        customer.society || "",
          maps:           customer.maps || "",
          landmark:       customer.landmark || "",
          delivery_point: customer.delivery_point || ""
        },
        orders: orders,
        payment_method: "Wallet",
        payment_status: "Paid"
      })
    });
    const data = await res.json();
    if (data.success) {
      sAlert(`Successfully placed ${orders.reduce((s,o)=>s+o.meals.length,0)} orders!`, "Success", "✅");
      loadCustomers(true);
    } else throw new Error(data.error);
  } catch(e) { sAlert("Bulk Order Error: " + e.message); }
  finally { sLoading(false); }
}

async function submitManualEntry() {
  const date      = document.getElementById('manualDate').value;
  const name      = document.getElementById('manualName').value.trim();
  const phone     = document.getElementById('manualPhone').value.trim();
  const amount    = document.getElementById('manualAmount').value;
  const meal      = document.getElementById('manualMealType').value;
  const payMethod = document.getElementById('manualPaymentMethod').value;
  const cycle     = document.getElementById('manualBillingCycle').value;
  const btn       = document.getElementById('manualSubmitBtn');

  if (!date || !name || !phone || !amount) {
    sAlert('Please fill all required fields.', 'Missing Info', '⚠️');
    return;
  }
  if (phone.length !== 10 || isNaN(phone)) {
    sAlert('Please enter a valid 10-digit mobile number.', 'Invalid Phone', '⚠️');
    return;
  }
  if (Number(amount) <= 0) {
    sAlert('Amount must be greater than zero.', 'Invalid Amount', '⚠️');
    return;
  }

  // Automated Status Mapping
  // UPI -> Pending, On Account -> On Account
  const payStatus = (payMethod === 'UPI') ? 'Pending' : 'On Account';
  const displayCycle = (payMethod === 'On Account') ? ` (${cycle})` : '';

  const ok = await sConfirm(`Add "${payMethod}${displayCycle}" order for ${name} (₹${amount})?\n\nStatus will be set to: ${payStatus}`, 'Confirm Manual Entry', '🚀');
  if (!ok) return;

  sBtnLoading(btn, true, 'Submitting…');
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        _action: 'submitManualOrder',
        pin: S.sessionPin,
        date: date,
        name: name,
        phone: phone,
        amount: amount,
        mealType: meal,
        paymentMethod: payMethod,
        billingCycle: (payMethod === 'On Account' ? cycle : 'Daily'),
        paymentStatus: payStatus
      })
    });
    const data = await res.json();
    sBtnLoading(btn, false);
    if (!data.success) throw new Error(data.error || 'Submission failed');

    sAlert(`Order logged successfully!\nStatus: ${payStatus}`, 'Success', '✅');
    // Clear form
    document.getElementById('manualName').value = '';
    document.getElementById('manualPhone').value = '';
    document.getElementById('manualAmount').value = '';
    
  } catch(e) {
    sBtnLoading(btn, false);
    sAlert(e.message, 'Error', '❌');
  }
}

function toggleManualBillingCycle() {
  const method = document.getElementById('manualPaymentMethod').value;
  const wrap = document.getElementById('manualBillingCycleWrap');
  const note = document.getElementById('manualAmountNote');
  if (method === 'On Account') {
    wrap.style.display = 'block';
    if (note) {
      note.textContent = '(On Account)';
      note.style.color = 'var(--red)';
    }
  } else {
    wrap.style.display = 'none';
    if (note) {
      note.textContent = '(UPI)';
      note.style.color = 'var(--muted)';
    }
  }
}

// ── EXPENSES ───────────────────────────────────────────────────────────────
const EXP_CATEGORIES = {
  "🥦 Raw Materials":       ["Vegetables & Greens","Fruits","Dairy (Milk/Curd/Paneer/Butter)","Oil & Ghee","Spices & Masala","Dry Groceries (Dal/Rice/Atta)","Other Raw Material"],
  "📦 Packaging":           ["Containers / Boxes","Bags & Covers","Labels & Stickers","Tissue & Napkins","Other Packaging"],
  "⛽ Fuel & Transport":    ["Petrol / CNG","Vehicle Maintenance","Delivery Outsourcing","Other Transport"],
  "👨‍🍳 Staff":              ["Cook Salary","Helper Salary","Delivery Person Salary","Part-time Staff","Other Staff"],
  "🔌 Utilities":           ["LPG Cylinder","Electricity Bill","Water Bill","Internet / Phone","Other Utility"],
  "🍳 Kitchen & Equipment": ["Equipment Purchase","Equipment Repair / Service","Utensils","Cleaning Supplies","Other Kitchen"],
  "📣 Marketing":           ["Printing / Pamphlets","Online Advertising","Branding / Design","Other Marketing"],
  "🏦 Finance & Admin":     ["Bank Charges","Platform / Software Fees","GST / Tax","Other Finance"],
  "📝 Miscellaneous":       ["Miscellaneous"]
};

let _expInitDone      = false;
let _expLastEntries   = []; // cache for recurring templates
let _expCustomCats    = {}; // custom categories from backend

function initExpensePage() {
  const today = toISO(getIST());
  if ($("expDate")) $("expDate").value = today;

  const ist = getIST();
  const monthStart = `${ist.getFullYear()}-${String(ist.getMonth()+1).padStart(2,"0")}-01`;
  if ($("expLogFrom") && !$("expLogFrom").value) $("expLogFrom").value = monthStart;
  if ($("expLogTo")   && !$("expLogTo").value)   $("expLogTo").value   = today;
  if ($("expAnaFrom") && !$("expAnaFrom").value) $("expAnaFrom").value = monthStart;
  if ($("expAnaTo")   && !$("expAnaTo").value)   $("expAnaTo").value   = today;

  if (!_expInitDone) {
    _expInitDone = true;
    loadExpenseMeta(); // loads custom cats, then populates dropdowns + templates
  } else {
    _populateExpCategoryDropdown(); // always re-populate in case custom cats changed
  }
}

async function loadExpenseMeta() {
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getCustomExpenseCategories&pin=${S.sessionPin}`);
    const data = await res.json();
    if (data.success) _expCustomCats = data.categories || {};
  } catch(e) { _expCustomCats = {}; }
  _populateExpCategoryDropdown();
  loadRecurringTemplates();
}

function _allExpCategories() {
  // Merge defaults + custom, custom at bottom
  const merged = { ...EXP_CATEGORIES };
  Object.entries(_expCustomCats).forEach(([cat, items]) => {
    if (merged[cat]) {
      // add any custom items not already in default
      items.forEach(i => { if (!merged[cat].includes(i)) merged[cat].push(i); });
    } else {
      merged[cat] = items;
    }
  });
  return merged;
}

function _populateExpCategoryDropdown() {
  const catSel = $("expCategory");
  if (!catSel) return;
  const current = catSel.value; // preserve selection if any
  catSel.innerHTML = `<option value="">— Select category —</option>`;
  const all = _allExpCategories();
  Object.keys(all).forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat; opt.textContent = cat;
    catSel.appendChild(opt);
  });
  // Add new category option at bottom
  const addOpt = document.createElement("option");
  addOpt.value = "__addcat__"; addOpt.textContent = "➕ Add new category…";
  catSel.appendChild(addOpt);
  if (current) catSel.value = current;
}

function switchExpTab(tab) {
  ["add","log","analytics"].forEach(t => {
    $(`expTab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle("active", t === tab);
    $(`expPanel${t.charAt(0).toUpperCase()+t.slice(1)}`).style.display = t === tab ? "block" : "none";
  });
}

function onExpCategoryChange() {
  const catSel = $("expCategory");
  const cat    = catSel.value;

  // "Add new category" selected
  if (cat === "__addcat__") {
    catSel.value = "";
    showAddCustomCategoryModal();
    return;
  }

  const all   = _allExpCategories();
  const items = all[cat] || [];
  const sel   = $("expItem");
  sel.innerHTML = `<option value="">— Select item —</option>`;
  items.forEach(it => {
    const opt = document.createElement("option");
    opt.value = it; opt.textContent = it;
    sel.appendChild(opt);
  });
  // Add custom item option
  const addOpt = document.createElement("option");
  addOpt.value = "__additem__"; addOpt.textContent = "➕ Add new item to this category…";
  sel.appendChild(addOpt);
}

function onExpItemChange() {
  const sel = $("expItem");
  if (sel.value === "__additem__") {
    sel.value = "";
    showAddCustomItemModal($("expCategory").value);
  }
}

// ── CUSTOM CATEGORY / ITEM MODALS ────────────────────────────
function showAddCustomCategoryModal() {
  const name = window.prompt("Enter new category name:\n(e.g. 🚗 Vehicle, 🏠 Rent)");
  if (!name || !name.trim()) return;
  const item = window.prompt(`Add a first item under "${name.trim()}":\n(optional — press Cancel to skip)`);
  _saveCustomCategory(name.trim(), item ? item.trim() : "");
}

function showAddCustomItemModal(category) {
  if (!category) { toast("Please select a category first."); return; }
  const item = window.prompt(`Add new item under "${category}":`);
  if (!item || !item.trim()) return;
  _saveCustomCategory(category, item.trim());
}

async function _saveCustomCategory(category, item) {
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify({
      _action:"saveCustomExpenseCategory", pin:S.sessionPin, category, item
    })});
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    _expCustomCats = data.categories || {};
    _populateExpCategoryDropdown();
    // Auto-select the newly created category and item
    if ($("expCategory")) $("expCategory").value = category;
    onExpCategoryChange();
    if (item && $("expItem")) {
      setTimeout(() => { $("expItem").value = item; }, 50);
    }
    toast(`✅ "${category}${item ? " → "+item : ""}" saved for future use.`);
  } catch(e) {
    toast("Error: " + e.message);
  }
}

async function submitExpense() {
  const date     = $("expDate").value;
  const category = $("expCategory").value;
  const item     = $("expItem").value;
  const amount   = parseFloat($("expAmount").value);
  const freq     = document.querySelector('input[name="expFreq"]:checked')?.value || "One-time";
  const payMode  = $("expPayMode").value;
  const notes    = $("expNotes").value.trim();
  const status   = $("expSaveStatus");

  if (!date)     { status.innerHTML = `<span style="color:#dc2626;">⚠ Please select a date.</span>`; return; }
  if (!category) { status.innerHTML = `<span style="color:#dc2626;">⚠ Please select a category.</span>`; return; }
  if (!item)     { status.innerHTML = `<span style="color:#dc2626;">⚠ Please select an item.</span>`; return; }
  if (!amount || amount <= 0) { status.innerHTML = `<span style="color:#dc2626;">⚠ Enter a valid amount.</span>`; return; }

  status.innerHTML = `<span style="color:#64748b;">Saving…</span>`;
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify({
      _action:"saveExpense", pin:S.sessionPin, date, category, item, amount, frequency:freq, payment_mode:payMode, notes
    })});
    const data = await res.json();
    if (!data.success) throw new Error(data.error || "Failed");
    status.innerHTML = `<span style="color:#16a34a;font-weight:700;">✅ Saved! (${data.id})</span>`;
    // Reset form
    $("expCategory").value = "";
    $("expItem").innerHTML = `<option value="">— Select category first —</option>`;
    $("expAmount").value = ""; $("expNotes").value = "";
    document.querySelector('input[name="expFreq"][value="One-time"]').checked = true;
    _expInitDone = false; loadRecurringTemplates(); // refresh templates
    setTimeout(() => { if (status) status.innerHTML = ""; }, 4000);
  } catch(e) {
    status.innerHTML = `<span style="color:#dc2626;">❌ ${e.message}</span>`;
  }
}

async function loadRecurringTemplates() {
  // Load last 90 days of monthly/weekly expenses as quick re-enter chips
  try {
    const ist = getIST();
    const to  = toISO(ist);
    const from = (() => { const d = new Date(ist); d.setDate(d.getDate()-90); return toISO(d); })();
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getExpenses&pin=${S.sessionPin}&from=${from}&to=${to}`);
    const data = await res.json();
    if (!data.success) return;
    // Keep only recurring entries, deduplicate by item
    const seen = {}; const templates = [];
    (data.expenses || []).forEach(e => {
      if ((e.frequency === "Monthly" || e.frequency === "Weekly") && !seen[e.item]) {
        seen[e.item] = true;
        templates.push(e);
      }
    });
    _expLastEntries = templates;
    renderRecurringTemplates(templates);
  } catch(e) {}
}

function renderRecurringTemplates(templates) {
  const wrap  = $("expRecurringTemplates");
  const chips = $("expTemplateChips");
  if (!templates.length) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  chips.innerHTML = templates.slice(0,8).map(e =>
    `<button onclick="quickReEnter(${JSON.stringify(e).replace(/"/g,'&quot;')})"
      style="padding:6px 12px;border:1.5px solid #cbd5e1;border-radius:20px;font-size:.75rem;
             background:#fff;cursor:pointer;color:#374151;font-weight:600;">
       ${e.category.split(" ")[0]} ${e.item} · ₹${e.amount}
     </button>`
  ).join("");
}

function quickReEnter(e) {
  // Pre-fill form with last entry values
  $("expDate").value = toISO(getIST());
  $("expCategory").value = e.category;
  onExpCategoryChange();
  setTimeout(() => { $("expItem").value = e.item; }, 50);
  $("expAmount").value = e.amount;
  $("expPayMode").value = e.payment_mode || "Cash";
  $("expNotes").value = e.notes || "";
  const radio = document.querySelector(`input[name="expFreq"][value="${e.frequency}"]`);
  if (radio) radio.checked = true;
  $("expSaveStatus").innerHTML = `<span style="color:#0369a1;">📋 Pre-filled from last entry — review and save.</span>`;
  window.scrollTo(0, 0);
}

// ── EXPENSE LOG ────────────────────────────────────────────────
function expLogSetRange(days) {
  const ist = getIST(), to = toISO(ist);
  const from = (() => { const d = new Date(ist); d.setDate(d.getDate()-days); return toISO(d); })();
  $("expLogFrom").value = from; $("expLogTo").value = to;
  loadExpenseLog();
}

async function loadExpenseLog() {
  const from = $("expLogFrom").value, to = $("expLogTo").value;
  const el = $("expLogContent");
  el.innerHTML = `<div style="text-align:center;padding:30px;color:#94a3b8;">Loading…</div>`;
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getExpenses&pin=${S.sessionPin}&from=${from}&to=${to}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    renderExpenseLog(data.expenses || []);
  } catch(e) {
    el.innerHTML = `<div style="color:#dc2626;padding:20px;">Error: ${e.message}</div>`;
  }
}

function renderExpenseLog(expenses) {
  const el = $("expLogContent");
  if (!expenses.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px;color:#94a3b8;">No expenses in this period.</div>`;
    return;
  }
  const total = expenses.reduce((s,e) => s + e.amount, 0);
  // Group by date
  const byDate = {};
  expenses.forEach(e => { if (!byDate[e.date]) byDate[e.date] = []; byDate[e.date].push(e); });
  const dates = Object.keys(byDate).sort().reverse();

  let html = `<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:12px;">
    <div style="padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:.78rem;color:#64748b;font-weight:600;">${expenses.length} entries</span>
      <span style="font-weight:800;color:#1a1a1a;font-size:.95rem;">Total: ₹${total.toLocaleString("en-IN")}</span>
    </div>`;

  dates.forEach(date => {
    const dayTotal = byDate[date].reduce((s,e) => s + e.amount, 0);
    const [y,m,d] = date.split("-");
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const label = `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
    html += `<div style="padding:8px 16px;background:#f1f5f9;font-size:.75rem;font-weight:700;color:#475569;display:flex;justify-content:space-between;">
      <span>${label}</span><span>₹${dayTotal.toLocaleString("en-IN")}</span></div>`;
    byDate[date].forEach(e => {
      html += `<div class="exp-log-row">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;color:#1a1a1a;font-size:.83rem;">${e.item}</div>
          <div style="display:flex;gap:6px;margin-top:3px;align-items:center;flex-wrap:wrap;">
            <span class="exp-cat-badge">${e.category}</span>
            <span class="exp-freq-badge ${e.frequency}">${e.frequency}</span>
            ${e.payment_mode ? `<span style="font-size:.65rem;color:#94a3b8;">${e.payment_mode}</span>` : ""}
            ${e.notes ? `<span style="font-size:.68rem;color:#64748b;font-style:italic;">${e.notes}</span>` : ""}
          </div>
        </div>
        <div style="font-weight:800;color:#1a1a1a;font-size:.9rem;white-space:nowrap;margin-left:8px;">₹${e.amount.toLocaleString("en-IN")}</div>
        <button onclick="deleteExpenseEntry('${e.id}')" title="Delete"
          style="background:none;border:none;color:#fca5a5;cursor:pointer;font-size:.9rem;padding:4px;margin-left:4px;">🗑️</button>
      </div>`;
    });
  });
  html += `</div>`;
  el.innerHTML = html;
}

async function deleteExpenseEntry(id) {
  if (!await sConfirm("Delete this expense entry?", "Confirm", "🗑️")) return;
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify({ _action:"deleteExpense", pin:S.sessionPin, id }) });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    toast("✅ Deleted");
    loadExpenseLog();
  } catch(e) { toast("Error: " + e.message); }
}

function expAnaSetRange(days) {
  const ist = getIST(), to = toISO(ist);
  const from = (() => { const d = new Date(ist); d.setDate(d.getDate()-days); return toISO(d); })();
  $("expAnaFrom").value = from; $("expAnaTo").value = to;
  loadExpenseAnalytics();
}

async function loadExpenseAnalytics() {
  const from = $("expAnaFrom").value, to = $("expAnaTo").value;
  const el = $("expAnaContent");
  el.innerHTML = `<div style="text-align:center;padding:30px;color:#94a3b8;">Loading…</div>`;
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getExpenseAnalytics&pin=${S.sessionPin}&from=${from}&to=${to}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    renderExpenseAnalytics(data);
  } catch(e) {
    el.innerHTML = `<div style="color:#dc2626;padding:20px;">Error: ${e.message}</div>`;
  }
}

function renderExpenseAnalytics(d) {
  const el = $("expAnaContent");
  const fmtM = v => `₹${Number(v).toLocaleString("en-IN")}`;

  // KPI cards
  const dailyAvg = d.byDay.length > 0 ? Math.round(d.total / d.byDay.length) : 0;
  let html = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;">
    <div class="exp-kpi"><div class="exp-kpi-val">${fmtM(d.total)}</div><div class="exp-kpi-lbl">Total Spent</div></div>
    <div class="exp-kpi"><div class="exp-kpi-val">${d.count}</div><div class="exp-kpi-lbl">Entries</div></div>
    <div class="exp-kpi"><div class="exp-kpi-val">${fmtM(dailyAvg)}</div><div class="exp-kpi-lbl">Daily Average</div></div>
    <div class="exp-kpi" style="border-color:#c084fc;"><div class="exp-kpi-val" style="color:#7e22ce;">${fmtM(d.monthlyFixed)}</div><div class="exp-kpi-lbl">Monthly Fixed</div></div>
  </div>`;

  // Category breakdown (bar chart)
  if (d.byCategory.length) {
    const maxAmt = d.byCategory[0].amount;
    html += `<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px 18px;margin-bottom:14px;">
      <div style="font-size:.75rem;font-weight:700;letter-spacing:.06em;color:#64748b;margin-bottom:12px;">📊 BY CATEGORY</div>`;
    d.byCategory.forEach(c => {
      const pct = maxAmt > 0 ? Math.round((c.amount/maxAmt)*100) : 0;
      html += `<div class="exp-bar-row">
        <div class="exp-bar-label">${c.category}</div>
        <div class="exp-bar-track"><div class="exp-bar-fill" style="width:${pct}%"></div></div>
        <div class="exp-bar-amt">${fmtM(c.amount)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Frequency + Payment mode split
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">`;

  // Frequency
  html += `<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px 16px;">
    <div style="font-size:.75rem;font-weight:700;letter-spacing:.06em;color:#64748b;margin-bottom:10px;">🔁 BY FREQUENCY</div>`;
  ["Monthly","Weekly","Daily","One-time"].forEach(f => {
    const amt = d.byFrequency[f] || 0;
    if (!amt) return;
    html += `<div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:6px;">
      <span class="exp-freq-badge ${f}" style="font-size:.72rem;">${f}</span>
      <span style="font-weight:700;">${fmtM(amt)}</span></div>`;
  });
  html += `</div>`;

  // Payment mode
  html += `<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px 16px;">
    <div style="font-size:.75rem;font-weight:700;letter-spacing:.06em;color:#64748b;margin-bottom:10px;">💳 BY PAYMENT</div>`;
  Object.entries(d.byPayMode).forEach(([mode, amt]) => {
    html += `<div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:6px;">
      <span style="color:#475569;">${mode}</span>
      <span style="font-weight:700;">${fmtM(amt)}</span></div>`;
  });
  html += `</div></div>`;

  // Top items
  if (d.topItems.length) {
    html += `<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px 18px;margin-bottom:14px;">
      <div style="font-size:.75rem;font-weight:700;letter-spacing:.06em;color:#64748b;margin-bottom:10px;">🔝 TOP EXPENSE ITEMS</div>
      <table style="width:100%;font-size:.8rem;border-collapse:collapse;">`;
    d.topItems.forEach((it, i) => {
      html += `<tr style="border-bottom:1px solid #f1f5f9;">
        <td style="padding:7px 4px;color:#64748b;">${i+1}</td>
        <td style="padding:7px 4px;font-weight:600;">${it.item}</td>
        <td style="padding:7px 4px;text-align:right;font-weight:800;">${fmtM(it.amount)}</td>
      </tr>`;
    });
    html += `</table></div>`;
  }

  // Day-wise trend
  if (d.byDay.length) {
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    html += `<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px 18px;">
      <div style="font-size:.75rem;font-weight:700;letter-spacing:.06em;color:#64748b;margin-bottom:10px;">📅 DAY-WISE SPENDING</div>
      <table style="width:100%;font-size:.78rem;border-collapse:collapse;">
        <thead><tr style="color:#64748b;border-bottom:2px solid #e2e8f0;">
          <th style="padding:6px 4px;text-align:left;">Date</th>
          <th style="padding:6px 4px;text-align:right;">Amount</th>
        </tr></thead><tbody>`;
    [...d.byDay].reverse().forEach(row => {
      const [y,m,dy] = row.date.split("-");
      html += `<tr style="border-bottom:1px solid #f8fafc;">
        <td style="padding:6px 4px;">${parseInt(dy)} ${months[parseInt(m)-1]} ${y}</td>
        <td style="padding:6px 4px;text-align:right;font-weight:700;">${fmtM(row.amount)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  el.innerHTML = html || `<div style="text-align:center;padding:40px;color:#94a3b8;">No expense data for this period.</div>`;
}

// ── INVENTORY ──────────────────────────────────────────────────────────────
let _invData       = null; // cached from last load
let _invInitDone   = false;

// Default units per item keyword
const INV_DEFAULT_UNITS = {
  "Milk":"litre","Cooking Oil":"litre","Mustard Oil":"litre","Curd":"kg","Ghee":"kg","Butter":"kg",
  "LPG Cylinder":"cylinder","Green Chilli":"kg","Coriander Leaves":"kg",
};

function initInventoryPage() {
  const today = toISO(getIST());
  if ($("invDate") && !$("invDate").value) $("invDate").value = today;
  if (!_invInitDone) { _invInitDone = true; loadInventory(); }
}

function switchInvTab(tab) {
  ["add","summary","history"].forEach(t => {
    const btn = $(`invTab${t.charAt(0).toUpperCase()+t.slice(1)}`);
    const panel = $(`invPanel${t.charAt(0).toUpperCase()+t.slice(1)}`);
    if (btn)   btn.classList.toggle("active", t === tab);
    if (panel) panel.style.display = t === tab ? "block" : "none";
  });
}

function onInvItemSelect() {
  const sel = $("invItemSelect"), custom = $("invItemCustom");
  if (sel.value === "__custom__") {
    custom.style.display = "flex"; custom.focus();
    sel.style.display = "none";
  } else {
    custom.style.display = "none"; sel.style.display = "";
    // Auto-set unit
    const item = sel.value;
    const unit = INV_DEFAULT_UNITS[item] || "kg";
    if ($("invUnit")) $("invUnit").value = unit;
    // Show last purchase info
    showLastPurchaseInfo(item);
  }
}

function showLastPurchaseInfo(itemName) {
  const card = $("invLastInfo");
  if (!_invData || !itemName) { card.style.display = "none"; return; }
  const entry = (_invData.items || []).find(i => i.item === itemName);
  if (!entry) { card.style.display = "none"; return; }

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const fmtDate = d => { if (!d) return "—"; const [y,m,dy]=d.split("-"); return `${parseInt(dy)} ${months[parseInt(m)-1]}`; };

  card.style.display = "block";
  card.innerHTML = `
    <div style="font-weight:700;margin-bottom:6px;">📋 Last purchase of <em>${itemName}</em></div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:.8rem;">
      <span>📅 <strong>${fmtDate(entry.last_purchased)}</strong></span>
      <span>⚖️ <strong>${entry.last_qty} ${entry.unit}</strong></span>
      ${entry.avg_days ? `<span>⏱ Avg lasts <strong>${entry.avg_days} days</strong></span>` : ""}
      ${entry.avg_daily_rate ? `<span>📉 ~<strong>${entry.avg_daily_rate} ${entry.unit}/day</strong></span>` : ""}
      ${entry.next_buy_est ? `<span>🛒 Next buy est. <strong>${fmtDate(entry.next_buy_est)}</strong></span>` : ""}
    </div>`;
}

async function submitInventoryEntry() {
  const sel    = $("invItemSelect");
  const custom = $("invItemCustom");
  const item   = sel.style.display === "none"
                   ? custom.value.trim()
                   : sel.value;
  const date   = $("invDate").value;
  const qty    = parseFloat($("invQty").value);
  const unit   = $("invUnit").value;
  const price  = parseFloat($("invPrice").value) || 0;
  const notes  = $("invNotes").value.trim();
  const status = $("invSaveStatus");

  if (!item || item === "__custom__") { status.innerHTML = `<span style="color:#dc2626;">⚠ Select or enter an item.</span>`; return; }
  if (!date) { status.innerHTML = `<span style="color:#dc2626;">⚠ Select a date.</span>`; return; }
  if (!qty || qty <= 0) { status.innerHTML = `<span style="color:#dc2626;">⚠ Enter a valid quantity.</span>`; return; }

  status.innerHTML = `<span style="color:#64748b;">Saving…</span>`;
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify({
      _action:"saveInventoryEntry", pin:S.sessionPin, item, date, quantity:qty, unit, price, notes
    })});
    const data = await res.json();
    if (!data.success) throw new Error(data.error || "Failed");
    status.innerHTML = `<span style="color:#16a34a;font-weight:700;">✅ Logged! (${data.id})</span>`;
    // Reset
    sel.value = ""; sel.style.display = ""; custom.style.display = "none"; custom.value = "";
    $("invQty").value = ""; $("invPrice").value = ""; $("invNotes").value = "";
    $("invLastInfo").style.display = "none";
    _invInitDone = false; loadInventory();
    setTimeout(() => { if (status) status.innerHTML = ""; }, 4000);
  } catch(e) {
    status.innerHTML = `<span style="color:#dc2626;">❌ ${e.message}</span>`;
  }
}

async function loadInventory() {
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getInventoryData&pin=${S.sessionPin}`);
    const data = await res.json();
    if (!data.success) return;
    _invData = data;
    renderInventorySummary(data.items || []);
    renderInventoryHistory();
    populateInvHistoryFilter(data.items || []);
  } catch(e) { console.error("Inventory load failed:", e); }
}

function populateInvHistoryFilter(items) {
  const sel = $("invHistoryFilter");
  if (!sel) return;
  sel.innerHTML = `<option value="">All items</option>`;
  items.forEach(i => {
    const opt = document.createElement("option");
    opt.value = i.item; opt.textContent = i.item;
    sel.appendChild(opt);
  });
}

function renderInventorySummary(items) {
  const el = $("invSummaryContent");
  if (!el) return;
  if (!items.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px;color:#94a3b8;">No inventory entries yet. Log your first purchase!</div>`;
    return;
  }

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const fmtDate = d => { if (!d) return "—"; const [y,m,dy]=d.split("-"); return `${parseInt(dy)} ${months[parseInt(m)-1]}`; };
  const today   = toISO(getIST());

  // Colour-code next buy estimate
  function nextBuyStyle(nextDate) {
    if (!nextDate) return "";
    if (nextDate < today) return "color:#dc2626;font-weight:800;"; // overdue
    const diff = Math.round((new Date(nextDate) - new Date(today)) / 86400000);
    if (diff <= 2) return "color:#ea580c;font-weight:700;"; // buy soon
    return "color:#16a34a;font-weight:700;";
  }

  let html = `<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;overflow:hidden;">
    <table style="width:100%;border-collapse:collapse;font-size:.8rem;">
      <thead>
        <tr style="background:#f8fafc;border-bottom:2px solid #e2e8f0;color:#64748b;font-size:.72rem;font-weight:700;letter-spacing:.04em;">
          <th style="padding:10px 14px;text-align:left;">ITEM</th>
          <th style="padding:10px 8px;text-align:center;">LAST BUY</th>
          <th style="padding:10px 8px;text-align:center;">QTY</th>
          <th style="padding:10px 8px;text-align:center;">AVG LASTS</th>
          <th style="padding:10px 8px;text-align:center;">DAILY USE</th>
          <th style="padding:10px 8px;text-align:center;">NEXT BUY EST.</th>
          <th style="padding:10px 8px;text-align:center;">ENTRIES</th>
        </tr>
      </thead><tbody>`;

  items.forEach(i => {
    const overdueFlag = i.next_buy_est && i.next_buy_est < today
      ? `<span style="font-size:.65rem;background:#fee2e2;color:#dc2626;padding:1px 6px;border-radius:10px;margin-left:4px;">BUY NOW</span>`
      : (i.next_buy_est && Math.round((new Date(i.next_buy_est)-new Date(today))/86400000) <= 2
          ? `<span style="font-size:.65rem;background:#fff7ed;color:#ea580c;padding:1px 6px;border-radius:10px;margin-left:4px;">SOON</span>` : "");

    html += `<tr style="border-bottom:1px solid #f1f5f9;" onclick="showItemDrilldown('${i.item.replace(/'/g,"\\'")}');" style="cursor:pointer;">
      <td style="padding:10px 14px;font-weight:700;cursor:pointer;" onclick="showItemDrilldown('${i.item.replace(/'/g,"\\'")}')">
        ${i.item}${overdueFlag}
      </td>
      <td style="padding:10px 8px;text-align:center;color:#475569;">${fmtDate(i.last_purchased)}</td>
      <td style="padding:10px 8px;text-align:center;font-weight:600;">${i.last_qty} ${i.unit}</td>
      <td style="padding:10px 8px;text-align:center;">${i.avg_days ? i.avg_days+" days" : "<span style='color:#94a3b8;'>need more data</span>"}</td>
      <td style="padding:10px 8px;text-align:center;">${i.avg_daily_rate ? i.avg_daily_rate+" "+i.unit : "—"}</td>
      <td style="padding:10px 8px;text-align:center;${nextBuyStyle(i.next_buy_est)}">${fmtDate(i.next_buy_est)}</td>
      <td style="padding:10px 8px;text-align:center;color:#64748b;">${i.entry_count}</td>
    </tr>`;
  });

  html += `</tbody></table></div>
  <div style="font-size:.72rem;color:#94a3b8;margin-top:8px;padding-left:4px;">
    🔴 Buy Now = past estimated date &nbsp;|&nbsp; 🟠 Soon = within 2 days &nbsp;|&nbsp; Click any row to see history
  </div>`;
  el.innerHTML = html;
}

function showItemDrilldown(itemName) {
  $("invHistoryFilter").value = itemName;
  switchInvTab("history");
  renderInventoryHistory();
}

function renderInventoryHistory() {
  const el     = $("invHistoryContent");
  const filter = ($("invHistoryFilter") && $("invHistoryFilter").value) || "";
  if (!_invData) { el.innerHTML = `<div style="color:#94a3b8;padding:20px;text-align:center;">Loading…</div>`; return; }

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const fmtDate = d => { if (!d) return "—"; const [y,m,dy]=d.split("-"); return `${parseInt(dy)} ${months[parseInt(m)-1]} ${y}`; };

  const items = filter
    ? (_invData.items || []).filter(i => i.item === filter)
    : (_invData.items || []);

  if (!items.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px;color:#94a3b8;">No entries found.</div>`;
    return;
  }

  let html = "";
  items.forEach(item => {
    html += `<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:14px;">
      <div style="padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:800;font-size:.9rem;">${item.item}</span>
        <span style="font-size:.75rem;color:#64748b;">${item.entry_count} purchase${item.entry_count!==1?"s":""} · avg ${item.avg_days ? item.avg_days+" days" : "insufficient data"}</span>
      </div>`;

    item.entries.forEach((e, idx) => {
      const isLatest = idx === 0;
      html += `<div class="exp-log-row">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-weight:700;">${fmtDate(e.date)}</span>
            <span style="font-size:.78rem;color:#475569;">— ${e.qty} ${e.unit}</span>
            ${e.price ? `<span style="font-size:.72rem;color:#94a3b8;">₹${e.price}</span>` : ""}
            ${isLatest ? `<span style="font-size:.65rem;background:#f0fdf4;color:#16a34a;padding:2px 7px;border-radius:10px;font-weight:700;">LATEST</span>` : ""}
          </div>
          ${e.lasted_days !== null
            ? `<div style="margin-top:4px;font-size:.75rem;color:#0369a1;">
                ⏱ Lasted <strong>${e.lasted_days} days</strong>
                ${e.daily_rate ? `· used ~<strong>${e.daily_rate} ${e.unit}/day</strong>` : ""}
               </div>`
            : (isLatest ? `<div style="margin-top:4px;font-size:.72rem;color:#94a3b8;">⏳ Currently in use — duration calculated on next purchase</div>` : "")}
          ${e.notes ? `<div style="font-size:.7rem;color:#64748b;font-style:italic;margin-top:2px;">${e.notes}</div>` : ""}
        </div>
        <button onclick="deleteInvEntry('${e.id}')" title="Delete"
          style="background:none;border:none;color:#fca5a5;cursor:pointer;font-size:.9rem;padding:4px;">🗑️</button>
      </div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
}

async function deleteInvEntry(id) {
  if (!await sConfirm("Delete this inventory entry?", "Confirm", "🗑️")) return;
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify({ _action:"deleteInventoryEntry", pin:S.sessionPin, id }) });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    toast("✅ Deleted");
    _invInitDone = false; loadInventory();
  } catch(e) { toast("Error: " + e.message); }
}

// ── ARCHIVE PANEL ──────────────────────────────────────────────────────────
function _initArchivePage() {
  const now = new Date();
  document.getElementById("archiveYear").value = now.getFullYear();
  // Default to previous completed quarter
  const q = Math.floor(now.getMonth() / 3); // 0-based current quarter
  const prevQ = q === 0 ? 4 : q;
  document.getElementById("archiveQuarter").value = String(prevQ);
}

async function runManualArchive() {
  const year    = parseInt(document.getElementById("archiveYear").value);
  const quarter = parseInt(document.getElementById("archiveQuarter").value);
  const statusEl = document.getElementById("archiveStatus");

  if (!year || !quarter || quarter < 1 || quarter > 4) {
    statusEl.innerHTML = `<div style="color:#e74c3c;font-size:.82rem;">❌ Please select a valid year and quarter.</div>`;
    return;
  }

  const qLabels = { 1:"Jan–Mar", 2:"Apr–Jun", 3:"Jul–Sep", 4:"Oct–Dec" };
  const confirmMsg = `Archive Q${quarter} ${year} (${qLabels[quarter]})?\n\nThis will:\n• Copy SK_Orders + SK_Wallet rows to a new file\n• Write Balance Carry Forward snapshots\n• DELETE archived rows from the live sheet\n\nThis CANNOT be undone. Proceed?`;
  if (!confirm(confirmMsg)) return;

  statusEl.innerHTML = `<div style="color:#0369a1;font-size:.82rem;">⏳ Archiving… this may take 30–60 seconds. Please wait.</div>`;

  try {
    const res = await fetch(APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify({ _action:"triggerManualArchive", year, quarter, pin: S.sessionPin }) }).then(r=>r.json());
    if (res.error) {
      statusEl.innerHTML = `<div style="color:#e74c3c;font-size:.82rem;">❌ ${res.error}</div>`;
      return;
    }
    if (!res.success) {
      statusEl.innerHTML = `<div style="color:#e74c3c;font-size:.82rem;">❌ ${res.error || "Archive failed"}</div>`;
      return;
    }
    statusEl.innerHTML = `
      <div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 14px;font-size:.82rem;color:#14532d;line-height:1.7;">
        <div style="font-weight:700;margin-bottom:4px;">✅ Archive complete!</div>
        <div>📄 <strong>${res.archiveName}</strong></div>
        ${res.archiveUrl ? `<div>🔗 <a href="${res.archiveUrl}" target="_blank" style="color:#0369a1;">Open archive file</a></div>` : ""}
        <div>📦 Orders archived: <strong>${res.ordersArchived}</strong></div>
        <div>💳 Wallet txns archived: <strong>${res.walletArchived}</strong></div>
        <div>🏦 Balance snapshots: <strong>${res.snapshots}</strong></div>
        ${res.log && res.log.length ? `<details style="margin-top:6px;"><summary style="cursor:pointer;color:#475569;">View log (${res.log.length} steps)</summary><pre style="font-size:.72rem;margin-top:4px;white-space:pre-wrap;">${res.log.join("\n")}</pre></details>` : ""}
      </div>`;
  } catch(e) {
    statusEl.innerHTML = `<div style="color:#e74c3c;font-size:.82rem;">❌ Error: ${e.message}</div>`;
  }
}

async function setupAutoTrigger() {
  const statusEl = document.getElementById("triggerStatus");
  statusEl.innerHTML = `<div style="color:#0369a1;font-size:.82rem;">⏳ Setting up trigger…</div>`;
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify({ _action:"setupQuarterlyArchiveTrigger", pin: S.sessionPin }) }).then(r=>r.json());
    if (res && res.success) {
      statusEl.innerHTML = `<div style="color:#166534;font-size:.82rem;">✅ Trigger registered! Auto-archive will run on Apr 10, Jul 10, Oct 10, and Jan 10 each year.</div>`;
    } else {
      statusEl.innerHTML = `<div style="color:#e74c3c;font-size:.82rem;">❌ ${(res && res.error) || "Failed to set up trigger"}</div>`;
    }
  } catch(e) {
    statusEl.innerHTML = `<div style="color:#e74c3c;font-size:.82rem;">❌ Error: ${e.message}</div>`;
  }
}
</script>
